name: Actualizar picks diariamente

on:
  schedule:
    - cron: '0 5 * * *'   # 1:00 AM Venezuela (UTC-4) → 5:00 UTC
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalar dependencias
        run: |
          pip install --upgrade pip
          pip install requests pandas nba_api statsapi nhl-api-py

      - name: Ejecutar script generate_data.py
        run: python generate_data.py

      - name: Commit y push del data.js actualizado
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add data.js
          git diff --quiet && git diff --staged --quiet || git commit -m "Actualización automática de picks"
          git push
