name: Actualizar picks diariamente

on:
  schedule:
    - cron: '0 10 * * *'      # Todos los días a las 10:00 UTC (6:00 AM Venezuela)
  workflow_dispatch:          # Permite ejecutar manualmente

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalar dependencias
        run: pip install requests

      - name: Ejecutar script generate_data.py
        run: python generate_data.py
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}

      - name: Commit y push del data.js actualizado
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add data.js
          git diff --quiet && git diff --staged --quiet || git commit -m "Actualización automática de picks"
          git push
