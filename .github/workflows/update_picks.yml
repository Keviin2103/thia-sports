name: Actualizar picks diariamente

on:
  schedule:
    - cron: '0 05 * * *'   # 1:00 AM Venezuela (11:00 UTC)
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Instalar dependencias
        run: pip install requests pandas nba_api statsapi
      - name: Ejecutar script
        run: python generate_data.py
      - name: Commit y push del data.js actualizado
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add data.js
          git diff --quiet && git diff --staged --quiet || git commit -m "Actualización automática de picks"
          git push
