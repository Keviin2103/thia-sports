        { partido: "Tigers vs Twins", awayTeam: "Tigers", homeTeam: "Twins", principal: "Tigers Moneyline (1.58) | stake 2% | EV+12.5%", secundaria: "Under 6.5 (1.90) | stake 1%", prop: "Tarik Skubal – Over 7.5 ponches (1.85) | stake 1%" },
        { partido: "Mariners vs Rangers", awayTeam: "Mariners", homeTeam: "Rangers", principal: "Mariners Moneyline (1.83) | stake 1.5% | EV+7.5%", secundaria: "Over 7.5 (1.85) | stake 1%", prop: "George Kirby – Over 5.5 ponches (1.80) | stake 0.5%" },
        { partido: "Astros vs Rockies", awayTeam: "Astros", homeTeam: "Rockies", principal: "Astros Moneyline (1.57) | stake 2% | EV+14.5%", secundaria: "Over 10.5 (1.90) | stake 1%", prop: "Kyle Freeland – Over 3.5 ponches (1.80) | stake 0.5%" },
        { partido: "Braves vs Angels", awayTeam: "Braves", homeTeam: "Angels", principal: "Braves Moneyline (1.71) | stake 2% | EV+12.5%", secundaria: "Under 8.5 (1.88) | stake 0.5%", prop: "Reynaldo Lopez – Over 5.5 ponches (1.85) | stake 0.5%" },
        { partido: "Phillies vs Giants", awayTeam: "Phillies", homeTeam: "Giants", principal: "Phillies Moneyline (1.65) | stake 1.5% | EV+6.5%", secundaria: "Under 7 (1.85) | stake 1%", prop: "Cristopher Sanchez – Over 4.5 ponches (1.80) | stake 0.5%" }
    ];
    // NHL (según momios)
    const nhlPicks = [
        { partido: "Panthers vs Canadiens", awayTeam: "Panthers", homeTeam: "Canadiens", principal: "Canadiens Moneyline (1.45) | stake 1.5% | EV+6.5%", secundaria: "Under 5.5 (1.85) | stake 0.5%", prop: "Nick Suzuki – Over 0.5 puntos (1.65) | stake 1%" },
        { partido: "Lightning vs Senators", awayTeam: "Lightning", homeTeam: "Senators", principal: "Senators Moneyline (1.78) | stake 1.5% | EV+8.5%", secundaria: "Over 6.5 (1.85) | stake 0.5%", prop: "Tim Stutzle – Over 0.5 goles (2.10) | stake 0.5%" },
        { partido: "Blue Jackets vs Red Wings", awayTeam: "Blue Jackets", homeTeam: "Red Wings", principal: "Red Wings Moneyline (1.83) | stake 1.5% | EV+5.5%", secundaria: "Over 6 (1.85) | stake 0.5%", prop: "Alex DeBrincat – Over 0.5 goles (2.00) | stake 0.5%" },
        { partido: "Flyers vs Devils", awayTeam: "Flyers", homeTeam: "Devils", principal: "Devils Moneyline (1.80) | stake 1.5% | EV+5.5%", secundaria: "Under 5.5 (1.85) | stake 0.5%", prop: "Jack Hughes – Over 0.5 puntos (1.55) | stake 1%" },
        { partido: "Bruins vs Hurricanes", awayTeam: "Bruins", homeTeam: "Hurricanes", principal: "Hurricanes Moneyline (1.53) | stake 1.5% | EV+6.5%", secundaria: "Under 6.5 (1.85) | stake 0.5%", prop: "Sebastian Aho – Over 0.5 goles (2.10) | stake 0.5%" },
        { partido: "Avalanche vs Blues", awayTeam: "Avalanche", homeTeam: "Blues", principal: "Avalanche Moneyline (1.65) | stake 2% | EV+8.5%", secundaria: "Over 6.5 (1.85) | stake 0.5%", prop: "Nathan MacKinnon – Over 1.5 puntos (1.80) | stake 1%" },
        { partido: "Flames vs Stars", awayTeam: "Flames", homeTeam: "Stars", principal: "Stars Moneyline (1.38) | stake 1.5% | EV+6.5%", secundaria: "Under 5.5 (1.85) | stake 0.5%", prop: "Jason Robertson – Over 0.5 goles (2.00) | stake 0.5%" },
        { partido: "Kraken vs Wild", awayTeam: "Kraken", homeTeam: "Wild", principal: "Wild Moneyline (1.39) | stake 1.5% | EV+6.5%", secundaria: "Under 6 (1.85) | stake 0.5%", prop: "Kirill Kaprizov – Over 0.5 goles (1.90) | stake 0.5%" },
        { partido: "Golden Knights vs Canucks", awayTeam: "Golden Knights", homeTeam: "Canucks", principal: "Golden Knights Moneyline (1.56) | stake 1.5% | EV+7.5%", secundaria: "Over 5.5 (1.85) | stake 0.5%", prop: "Jack Eichel – Over 0.5 goles (2.00) | stake 0.5%" },
        { partido: "Predators vs Ducks", awayTeam: "Predators", homeTeam: "Ducks", principal: "Ducks Moneyline (1.85) | stake 1.5% | EV+6.5%", secundaria: "Under 5.5 (1.85) | stake 0.5%", prop: "Cutter Gauthier – Over 0.5 goles (2.10) | stake 0.5%" }
    ];

    // Parlays (igual que antes)
    const parlaysData = [
        { name: "DIRECTA DEL DÍA", type: "green", picks: ["MLB | Orioles vs White Sox | Orioles Moneyline (1.70)"], odds: "1.70", stake: "2-3%", desc: "La apuesta más sólida del día (EV+ >12%)" },
        { name: "MOROCHA 2 PICKS", type: "orange", picks: ["NBA | Warriors -14.5 (1.90)", "MLB | Astros Moneyline (1.57)"], odds: "2.98", stake: "1.5%", desc: "Combinada de dos picks con alto valor" },
        { name: "PARLEY SEGURO 4 PICKS", type: "purple", picks: ["MLB | Marlins Moneyline (1.74)", "NBA | Celtics -4.5 (1.90)", "NHL | Avalanche Moneyline (1.65)", "Fútbol | Always Ready Moneyline (2.27)"], odds: "12.4", stake: "1%", desc: "Cuatro selecciones con alta probabilidad individual" },
        { name: "MILLONARIO TODOS", type: "gold", picks: ["Fútbol: Arsenal ML", "Fútbol: Fluminense ML", "Fútbol: Always Ready ML", "NBA: Celtics -4.5", "NBA: Warriors -14.5", "NBA: Thunder -15.5", "MLB: Rays ML", "MLB: Marlins ML", "MLB: Yankees -1.5", "MLB: Blue Jays ML", "MLB: Orioles ML", "MLB: Tigers ML", "MLB: Mariners ML", "MLB: Astros ML", "MLB: Braves ML", "NHL: Canadiens ML", "NHL: Senators ML", "NHL: Red Wings ML", "NHL: Devils ML", "NHL: Hurricanes ML", "NHL: Avalanche ML", "NHL: Stars ML", "NHL: Wild ML", "NHL: Golden Knights ML", "NHL: Ducks ML"], odds: ">15000", stake: "0.1%", desc: "Combinada de 25 picks, solo entretenimiento" }
    ];

    let currentSport = "futbol";
    let currentMain = "picks";

    function renderGames() {
        let games = [];
        if (currentSport === "futbol") games = futbolPicks;
        else if (currentSport === "nba") games = nbaPicks;
        else if (currentSport === "mlb") games = mlbPicks;
        else games = nhlPicks;
        const container = document.getElementById('gamesContainer');
        const acceso = currentUser !== null;
        if (!games.length) { container.innerHTML = '<div style="text-align:center; padding:2rem;">No hay juegos disponibles.</div>'; return; }
        let html = '';
        for (let g of games) {
            const awayEmoji = getTeamEmoji(g.awayTeam, currentSport);
            const homeEmoji = getTeamEmoji(g.homeTeam, currentSport);
            html += `<div class="game-card">
                <div class="card-header">
                    <span class="league-badge">${currentSport.toUpperCase()}</span>
                    <span>${g.partido}</span>
                </div>
                <div style="display: flex; align-items: center; justify-content: space-between; padding: 0.8rem 1rem;">
                    <div class="team-container">
                        <div class="team-emoji">${awayEmoji}</div>
                        <div class="team-name">${g.awayTeam}</div>
                    </div>
                    <div class="vs">VS</div>
                    <div class="team-container">
                        <div class="team-emoji">${homeEmoji}</div>
                        <div class="team-name">${g.homeTeam}</div>
                    </div>
                </div>
                <div class="premium-block">${!acceso ? `<div style="background:#1e293b; padding:0.8rem; text-align:center; border-radius:12px;"><i class="fas fa-lock"></i> Inicia sesión para ver los picks</div>` : `
                    <div class="pick-item pick-main"><strong>🎯 JUGADA PRINCIPAL:</strong> ${g.principal}</div>
                    <div class="pick-item pick-secondary"><strong>🔄 JUGADA SECUNDARIA:</strong> ${g.secundaria}</div>
                    <div class="pick-item pick-prop"><strong>🎲 PROP DESTACADO:</strong> ${g.prop}</div>
                `}</div>
            </div>`;
        }
        container.innerHTML = html;
    }

    function renderResults() {
        const wins = resultadosEjemplo.filter(p=>p.ok===true).length;
        const losses = resultadosEjemplo.filter(p=>p.ok===false).length;
        const hitRate = wins+losses ? Math.round(wins/(wins+losses)*100) : 0;
        document.getElementById('statsSummary').innerHTML = `<div class="stat-card"><div class="stat-value">${wins}</div><div>HITS ✅</div></div><div class="stat-card"><div class="stat-value">${losses}</div><div>FAILS ❌</div></div><div class="stat-card"><div class="stat-value">${hitRate}%</div><div>EFECT.</div></div>`;
        const tbody = document.getElementById('resultsTableBody');
        tbody.innerHTML = '';
        resultadosEjemplo.forEach(p => {
            const row = tbody.insertRow();
            row.insertCell(0).innerText = p.pick;
            row.insertCell(1).innerHTML = p.ok === true ? '<span class="result-hit">✅ '+p.res+'</span>' : (p.ok === false ? '<span class="result-fail">❌ '+p.res+'</span>' : '⏸️ Pendiente');
            row.insertCell(2).innerText = p.nota;
        });
        document.getElementById('leccionesList').innerHTML = lecciones.map(l => `<div>• ${l}</div>`).join('');
    }

    function renderParlays() {
        const container = document.getElementById('parlaysContainer');
        let html = '';
        parlaysData.forEach(p => {
            let colorClass = p.type === 'gold' ? 'parlay-gold' : (p.type === 'green' ? 'parlay-green' : (p.type === 'orange' ? 'parlay-orange' : 'parlay-purple'));
            html += `<div class="parlay-card ${colorClass}">
                <div class="font-black text-center text-lg mb-2" style="color:${p.type==='gold'?'#eab308':p.type==='green'?'#22c55e':p.type==='orange'?'#f97316':'#a855f7'}">${p.name}</div>
                <div class="bg-green-500 rounded-lg py-1.5 text-center text-black font-black text-xl mb-2">${p.odds}</div>
                <div class="text-center text-gray-400 text-xs">Stake: ${p.stake}</div>
                ${p.picks.map(pk => `<div class="bg-black/30 rounded px-2 py-1 my-1 text-sm">${pk}</div>`).join('')}
                <p class="text-gray-400 text-xs mt-2">${p.desc}</p>
            </div>`;
        });
        container.innerHTML = html;
    }

    function renderCurrentView() {
        if (currentMain === 'picks') {
            document.getElementById('picksSection').classList.remove('hidden');
            document.getElementById('resultsSection').classList.add('hidden');
            document.getElementById('parlaysSection').classList.add('hidden');
            renderGames();
        } else if (currentMain === 'resultados') {
            document.getElementById('picksSection').classList.add('hidden');
            document.getElementById('resultsSection').classList.remove('hidden');
            document.getElementById('parlaysSection').classList.add('hidden');
            renderResults();
        } else {
            document.getElementById('picksSection').classList.add('hidden');
            document.getElementById('resultsSection').classList.add('hidden');
            document.getElementById('parlaysSection').classList.remove('hidden');
            renderParlays();
        }
    }

    function initSportTabs() {
        const container = document.getElementById('sportTabs');
        const sports = ['futbol', 'nba', 'mlb', 'nhl'];
        const names = { futbol:'⚽ Fútbol', nba:'🏀 Baloncesto', mlb:'⚾ Béisbol', nhl:'🏒 Hockey' };
        container.innerHTML = sports.map(s => `<button class="sport-tab ${s === currentSport ? 'active' : ''}" data-sport="${s}">${names[s]}</button>`).join('');
        document.querySelectorAll('.sport-tab').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.sport-tab').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentSport = btn.getAttribute('data-sport');
                renderGames();
            });
        });
    }

    document.getElementById('homeLink')?.addEventListener('click', () => { currentMain = 'picks'; document.querySelector('.main-tab[data-main="picks"]').click(); renderCurrentView(); });
    document.getElementById('resultsLink')?.addEventListener('click', () => { currentMain = 'resultados'; document.querySelector('.main-tab[data-main="resultados"]').click(); renderCurrentView(); });
    document.getElementById('parlaysLink')?.addEventListener('click', () => { currentMain = 'parlays'; document.querySelector('.main-tab[data-main="parlays"]').click(); renderCurrentView(); });
    document.querySelectorAll('.main-tab').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.main-tab').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentMain = btn.getAttribute('data-main');
            renderCurrentView();
        });
    });

    const savedUser = localStorage.getItem('thia_user');
    if (savedUser) { try { currentUser = JSON.parse(savedUser); } catch(e) {} }
    updateUserUI();
    initSportTabs();
    renderCurrentView();
</script>
</body>
