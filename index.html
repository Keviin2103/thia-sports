    function renderResults() {
        const wins = resultadosEjemplo.filter(p=>p.ok===true).length;
        const losses = resultadosEjemplo.filter(p=>p.ok===false).length;
        const hitRate = wins+losses ? Math.round(wins/(wins+losses)*100) : 0;
        document.getElementById('statsSummary').innerHTML = `<div class="stat-card"><div class="stat-value">${wins}</div><div>HITS ✅</div></div><div class="stat-card"><div class="stat-value">${losses}</div><div>FAILS ❌</div></div><div class="stat-card"><div class="stat-value">${hitRate}%</div><div>EFECT.</div></div>`;
        const tbody = document.getElementById('resultsTableBody');
        tbody.innerHTML = '';
        resultadosEjemplo.forEach(p => {
            const row = tbody.insertRow();
            row.insertCell(0).innerText = p.pick;
            row.insertCell(1).innerHTML = p.ok === true ? '<span class="result-hit">✅ '+p.res+'</span>' : (p.ok === false ? '<span class="result-fail">❌ '+p.res+'</span>' : '⏸️ Pendiente');
            row.insertCell(2).innerText = p.nota;
        });
        document.getElementById('leccionesList').innerHTML = lecciones.map(l => `<div>• ${l}</div>`).join('');
    }

    function renderParlays() {
        const container = document.getElementById('parlaysContainer');
        let html = '';
        parlaysData.forEach(p => {
            let colorClass = p.type === 'gold' ? 'parlay-gold' : (p.type === 'green' ? 'parlay-green' : (p.type === 'orange' ? 'parlay-orange' : 'parlay-purple'));
            html += `<div class="parlay-card ${colorClass}">
                <div class="font-black text-center text-lg mb-2" style="color:${p.type==='gold'?'#eab308':p.type==='green'?'#22c55e':p.type==='orange'?'#f97316':'#a855f7'}">${p.name}</div>
                <div class="bg-green-500 rounded-lg py-1.5 text-center text-black font-black text-xl mb-2">${p.odds}</div>
                <div class="text-center text-gray-400 text-xs">Stake: ${p.stake}</div>
                ${p.picks.map(pk => `<div class="bg-black/30 rounded px-2 py-1 my-1 text-sm">${pk}</div>`).join('')}
                <p class="text-gray-400 text-xs mt-2">${p.desc}</p>
            </div>`;
        });
        container.innerHTML = html;
    }

    function renderCurrentView() {
        if (currentMain === 'picks') {
            document.getElementById('picksSection').classList.remove('hidden');
            document.getElementById('resultsSection').classList.add('hidden');
            document.getElementById('parlaysSection').classList.add('hidden');
            renderGames();
        } else if (currentMain === 'resultados') {
            document.getElementById('picksSection').classList.add('hidden');
            document.getElementById('resultsSection').classList.remove('hidden');
            document.getElementById('parlaysSection').classList.add('hidden');
            renderResults();
        } else {
            document.getElementById('picksSection').classList.add('hidden');
            document.getElementById('resultsSection').classList.add('hidden');
            document.getElementById('parlaysSection').classList.remove('hidden');
            renderParlays();
        }
    }

    function initSportTabs() {
        const container = document.getElementById('sportTabs');
        const sports = ['mlb', 'futbol', 'nba', 'nhl'];
        const names = { mlb:'⚾ Béisbol', futbol:'⚽ Fútbol', nba:'🏀 Baloncesto', nhl:'🏒 Hockey' };
        container.innerHTML = sports.map(s => `<button class="sport-tab ${s === currentSport ? 'active' : ''}" data-sport="${s}">${names[s]}</button>`).join('');
        document.querySelectorAll('.sport-tab').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.sport-tab').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentSport = btn.getAttribute('data-sport');
                renderGames();
            });
        });
    }

    document.getElementById('homeLink')?.addEventListener('click', () => { currentMain = 'picks'; document.querySelector('.main-tab[data-main="picks"]').click(); renderCurrentView(); });
    document.getElementById('resultsLink')?.addEventListener('click', () => { currentMain = 'resultados'; document.querySelector('.main-tab[data-main="resultados"]').click(); renderCurrentView(); });
    document.getElementById('parlaysLink')?.addEventListener('click', () => { currentMain = 'parlays'; document.querySelector('.main-tab[data-main="parlays"]').click(); renderCurrentView(); });
    document.querySelectorAll('.main-tab').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.main-tab').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentMain = btn.getAttribute('data-main');
            renderCurrentView();
        });
    });

    const savedUser = localStorage.getItem('thia_user');
    if (savedUser) { try { currentUser = JSON.parse(savedUser); } catch(e) {} }
    updateUserUI();
    initSportTabs();
    renderCurrentView();
</script>
</body>
</html>
