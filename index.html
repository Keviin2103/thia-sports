                    ${renderProbBar(g.prob_h, g.prob_d, g.prob_a)}
                    <div class="metrics-table">
                        <div class="metric-row"><div>${g.away}</div><div>MÉTRICA</div><div>${g.home}</div></div>
                        <div class="metric-row"><div>${g.form_a || '-'}</div><div>Forma 5P</div><div>${g.form_h || '-'}</div></div>
                        <div class="metric-row"><div>${g.goals_a || '-'}</div><div>Goles temp.</div><div>${g.goals_h || '-'}</div></div>
                    </div>
                    ${renderPicks(g.picks)}
                </div>`;
            });
            container.innerHTML = html;
        }

        // Renderizar resultados del sábado
        function renderResults() {
            const stats = saturdayResults;
            const hitRate = Math.round((stats.hits / stats.totalPicks) * 100);
            document.getElementById('statsSummary').innerHTML = `
                <div class="stat-card"><div class="stat-value">${stats.hits}</div><div>HITS ✅</div></div>
                <div class="stat-card"><div class="stat-value">${stats.fails}</div><div>FAILS ❌</div></div>
                <div class="stat-card"><div class="stat-value">${stats.blocked}</div><div>BLOQUEADOS ✓</div></div>
                <div class="stat-card"><div class="stat-value">${hitRate}%</div><div>EFECTIVIDAD</div></div>
                <div class="stat-card"><div class="stat-value">${stats.totalPicks}</div><div>TOTAL PICKS</div></div>
            `;
            let listHtml = '';
            stats.picksList.forEach(p => {
                listHtml += `<div class="result-row">
                    <span style="font-weight:bold;">${p.league}</span>
                    <span>${p.match}</span>
                    <span style="background:#1e293b; padding:0.2rem 0.5rem; border-radius:20px;">${p.pick}</span>
                    <span class="${p.result === '✅ HIT' ? 'text-green-400' : 'text-red-400'}">${p.result}</span>
                    <span style="color:#9ca3af;">${p.note}</span>
                </div>`;
            });
            document.getElementById('resultsList').innerHTML = listHtml;
            document.getElementById('leccionesList').innerHTML = lecciones.map(l => `<div>• ${l}</div>`).join('');
        }

        // Renderizar parlays
        function renderParlays() {
            const container = document.getElementById('parlaysContainer');
            let html = '';
            parlays.forEach(p => {
                let colorClass = p.color === 'gold' ? 'parlay-gold' : (p.color === 'green' ? 'parlay-green' : (p.color === 'orange' ? 'parlay-orange' : 'parlay-purple'));
                html += `<div class="parlay-card ${colorClass}">
                    <div class="font-black text-center text-lg mb-2" style="color:${p.color==='gold'?'#eab308':p.color==='green'?'#22c55e':p.color==='orange'?'#f97316':'#a855f7'}">${p.name}</div>
                    <div class="bg-green-500 rounded-lg py-1.5 text-center text-black font-black text-xl mb-2">${p.odds}</div>
                    <div class="text-center text-gray-400 text-xs">Stake: ${p.stake} · Prob: ${p.prob}</div>
                    ${p.picks.map(pk => `<div class="bg-black/30 rounded px-2 py-1 my-1 text-sm">${pk}</div>`).join('')}
                    <p class="text-gray-400 text-xs mt-2">${p.desc}</p>
                </div>`;
            });
            container.innerHTML = html;
        }

        // Navegación entre pestañas principales
        let currentMain = 'picks';
        function showSection(section) {
            document.getElementById('picksSection').classList.add('hidden');
            document.getElementById('resultsSection').classList.add('hidden');
            document.getElementById('parlaysSection').classList.add('hidden');
            if (section === 'picks') {
                document.getElementById('picksSection').classList.remove('hidden');
                renderGames(currentLeague);
            } else if (section === 'resultados') {
                document.getElementById('resultsSection').classList.remove('hidden');
                renderResults();
            } else if (section === 'parlays') {
                document.getElementById('parlaysSection').classList.remove('hidden');
                renderParlays();
            }
            // Actualizar clase activa en tabs
            document.querySelectorAll('.main-tab').forEach(btn => {
                if (btn.getAttribute('data-main') === section) btn.classList.add('active');
                else btn.classList.remove('active');
            });
        }

        // Inicializar subpestañas de ligas
        function initLeagueTabs() {
            const container = document.getElementById('leagueTabs');
            container.innerHTML = leagues.map(l => `<button class="league-tab ${l === currentLeague ? 'active' : ''}" data-league="${l}">${l}</button>`).join('');
            document.querySelectorAll('.league-tab').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.league-tab').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    currentLeague = btn.getAttribute('data-league');
                    renderGames(currentLeague);
                });
            });
        }

        // Simular sistema de usuarios (admin por defecto)
        let currentUser = null;
        function updateUserUI() {
            const authArea = document.getElementById('authArea');
            if (currentUser) {
                authArea.innerHTML = `<div class="user-greeting"><i class="fas fa-user"></i> ${currentUser.email} ${currentUser.isAdmin ? '👑 Admin' : ''} <button id="logoutBtn" class="btn-outline">Salir</button></div>`;
                document.getElementById('logoutBtn')?.addEventListener('click', () => { currentUser = null; updateUserUI(); });
            } else {
                authArea.innerHTML = `<button id="showAuthBtn" class="btn-outline">🔑 Acceder</button>`;
                document.getElementById('showAuthBtn')?.addEventListener('click', () => alert("Modo demo: credenciales admin@thiasports.com / admin123 (solo simulación)"));
            }
        }

        // Eventos
        document.getElementById('homeLink')?.addEventListener('click', () => showSection('picks'));
        document.getElementById('resultsLink')?.addEventListener('click', () => showSection('resultados'));
        document.getElementById('parlaysLink')?.addEventListener('click', () => showSection('parlays'));
        document.querySelectorAll('.main-tab').forEach(btn => {
            btn.addEventListener('click', () => showSection(btn.getAttribute('data-main')));
        });

        initLeagueTabs();
        renderGames(currentLeague);
        updateUserUI();
        // Mostrar picks por defecto
        showSection('picks');
    </script>
</body>
</html>
