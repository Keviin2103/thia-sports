<html lang="es">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>ThIA Sports | MLB + NBA + NHL Predicciones</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(145deg, #0b1120 0%, #111827 100%);

            padding: 1rem;
            min-height: 100vh;
        }
        .top-bar {

            padding: 0.5rem 1rem;

            backdrop-filter: blur(10px);
            border-radius: 60px;
        }
        .logo {
            font-size: 1.5rem;
            font-weight: bold;
            background: linear-gradient(135deg, #f97316, #facc15);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .logo span { color: #facc15; background: none; }
        .user-area { display: flex; align-items: center; gap: 0.8rem; }
        .user-info {
            font-size: 0.8rem;
            background: #1e293b;
            padding: 0.3rem 1rem;
            border-radius: 40px;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .btn {
            background: transparent;
            border: 1px solid #facc15;
            padding: 0.4rem 1rem;
            border-radius: 40px;
            color: #facc15;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            font-size: 0.8rem;
        }
        .btn:hover { background: #facc15; color: #0f172a; }
        .sport-tabs {
            display: flex;
            justify-content: center;
            gap: 0.8rem;
            margin: 1rem 0 1.5rem;
            flex-wrap: wrap;
        }
        .tab {
            background: #1e293b;
            border: none;
            padding: 0.6rem 1.2rem;
            border-radius: 40px;
            color: #cbd5e6;
            font-weight: bold;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.2s;
        }
        .tab.active { background: linear-gradient(95deg, #f97316, #facc15); color: #0f172a; }
        .games-grid { display: flex; flex-direction: column; gap: 1rem; max-width: 700px; margin: 0 auto; }
        .game-card { background: rgba(18, 25, 45, 0.85); border-radius: 24px; border: 1px solid rgba(250, 204, 21, 0.2); overflow: hidden; }
        .game-card.star { border: 2px solid #facc15; }
        .teams { display: flex; justify-content: space-between; align-items: center; padding: 1rem; gap: 0.5rem; flex-wrap: wrap; }
        .team { text-align: center; flex: 1; }
        .team-logo { font-size: 2rem; }
        .team-name { font-weight: bold; font-size: 0.9rem; }
        .team-record { font-size: 0.65rem; color: #9ca3af; }
        .vs { background: #facc15; color: #0f172a; width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; }
        .game-info { display: flex; justify-content: space-between; padding: 0 1rem 0.4rem; font-size: 0.7rem; color: #9ca3af; }
        .injury-note { font-size: 0.65rem; background: rgba(220, 38, 38, 0.2); padding: 0.3rem; margin: 0 1rem 0.5rem; border-radius: 10px; color: #fca5a5; }
        .locked-overlay { background: #1e293b; border-radius: 16px; padding: 0.8rem; text-align: center; margin: 0.5rem 1rem 1rem; }
        .prediction-block { padding: 0.7rem 1rem 1rem; background: rgba(0,0,0,0.2); border-top: 1px solid rgba(255,255,255,0.05); }
        .prediction-text { background: #0f172a; border-left: 4px solid #10b981; border-radius: 14px; padding: 0.7rem; font-size: 0.8rem; }
        .star-badge { background: #facc15; color: #0f172a; font-size: 0.65rem; font-weight: bold; padding: 0.15rem 0.5rem; border-radius: 20px; display: inline-block; margin-bottom: 0.3rem; }
        .modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); backdrop-filter: blur(8px);
            display: flex; align-items: center; justify-content: center; z-index: 1000;
        }
        .modal-content { background: #111827; padding: 1.8rem; border-radius: 32px; width: 90%; max-width: 380px; text-align: center; border: 1px solid #facc15; }
        .google-btn-container { display: flex; justify-content: center; margin: 1rem 0; }
        .plan-card { background: #1e293b; margin: 1rem 0; padding: 1rem; border-radius: 20px; cursor: pointer; }
        .hidden { display: none; }
        .footer { text-align: center; font-size: 0.65rem; color: #5b6e8c; margin-top: 2rem; }
        @media (max-width: 640px) {
            .teams { flex-direction: column; }
            .vs { margin: 0 auto; }
            .team-logo { font-size: 1.6rem; }
            .top-bar { flex-direction: column; text-align: center; }
        }
    </style>

</head>

        { away: "Portland Blazers", away_rec: "37-37", home: "New Orleans Pelicans", home_rec: "22-52", time: "10:00 PM", spread: "POR -10.5", total: "224.5", prediction: "OVER 222.5 • POR -10.5", injuries: "Lillard OUT", star: false },

    // ==================== DATOS NHL (6 juegos) ====================
    const nhlGames = [

    let currentUser = null;
    let currentSport = 'mlb';
    
    // ==================== FUNCIONES ====================
    function hasAccess() {
        return currentUser !== null;
    }
    
    function renderGames() {
        let games = currentSport === 'mlb' ? mlbGames : (currentSport === 'nba' ? nbaGames : nhlGames);
        const container = document.getElementById('gamesContainer');
        const acceso = hasAccess();
        let html = '';
        
        for (let g of games) {
            const starClass = g.star ? 'star' : '';
            const starBadge = g.star ? '<div class="star-badge">⭐ PICK ESTRELLA ⭐</div>' : '';
            
            if (currentSport === 'mlb') {
                if (!acceso) {
                    html += `<div class="game-card">
                        <div class="teams"><div class="team"><div class="team-logo">⚾</div><div class="team-name">${g.away}</div></div>
                        <div class="vs">VS</div><div class="team"><div class="team-logo">⚾</div><div class="team-name">${g.home}</div></div></div>
                        <div class="locked-overlay">🔒 Inicia sesión para ver la predicción</div>
                    </div>`;
                } else {
                    html += `<div class="game-card ${starClass}">
                        <div class="teams">
                            <div class="team"><div class="team-logo">⚾</div><div class="team-name">${g.away}</div><div class="team-record">Visitante</div></div>
                            <div class="vs">VS</div>
                            <div class="team"><div class="team-logo">⚾</div><div class="team-name">${g.home}</div><div class="team-record">Local</div></div>
                        </div>
                        <div class="game-info"><span>⏰ ${g.time}</span><span>⚾ ${g.spAway} @ ${g.spHome}</span></div>
                        <div class="prediction-block"><div class="prediction-text">🔮 ${starBadge}<strong>Predicción:</strong> ${g.prediction}</div></div>
                    </div>`;
                }
            } else {
                if (!acceso) {
                    html += `<div class="game-card">
                        <div class="teams"><div class="team"><div class="team-logo">${currentSport === 'nba' ? '🏀' : '🏒'}</div><div class="team-name">${g.away}</div></div>
                        <div class="vs">VS</div><div class="team"><div class="team-logo">${currentSport === 'nba' ? '🏀' : '🏒'}</div><div class="team-name">${g.home}</div></div></div>
                        <div class="locked-overlay">🔒 Inicia sesión para ver la predicción</div>
                    </div>`;
                } else {
                    html += `<div class="game-card ${starClass}">
                        <div class="teams">
                            <div class="team"><div class="team-logo">${currentSport === 'nba' ? '🏀' : '🏒'}</div><div class="team-name">${g.away}</div><div class="team-record">${g.away_rec || ''}</div></div>
                            <div class="vs">VS</div>
                            <div class="team"><div class="team-logo">${currentSport === 'nba' ? '🏀' : '🏒'}</div><div class="team-name">${g.home}</div><div class="team-record">${g.home_rec || ''}</div></div>
                        </div>
                        <div class="game-info"><span>⏰ ${g.time}</span><span>📊 ${g.spread || ''} | Total: ${g.total || ''}</span></div>
                        ${g.injuries ? `<div class="injury-note">⚠️ ${g.injuries}</div>` : ''}
                        <div class="prediction-block"><div class="prediction-text">🔮 ${starBadge}<strong>Predicción:</strong> ${g.prediction}</div></div>
                    </div>`;
                }
            }
        }
        container.innerHTML = html;
    }
    
    // ==================== GOOGLE LOGIN (sin Supabase) ====================
    function handleGoogleCredential(response) {
        const idToken = response.credential;
        const base64Url = idToken.split('.')[1];
        const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
        const jsonPayload = decodeURIComponent(atob(base64).split('').map(c => '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2)).join(''));
        const userInfo = JSON.parse(jsonPayload);
        
        currentUser = { email: userInfo.email, name: userInfo.name };
        localStorage.setItem('thia_current_user', JSON.stringify(currentUser));
        updateUserUI();
        renderGames();
        document.getElementById('authModal').classList.add('hidden');
    }
    
    function initGoogleSignIn() {
        if (typeof google === 'undefined') { setTimeout(initGoogleSignIn, 500); return; }
        google.accounts.id.initialize({
            client_id: "613468909873-vu4nc6ugbm5cpdovfmb5vfo3m2h2mu2u.apps.googleusercontent.com",
            callback: handleGoogleCredential,
            auto_select: false
        });
        google.accounts.id.renderButton(document.getElementById("googleBtnContainer"), { theme: "outline", size: "large" });
    }
    
    function updateUserUI() {
        const userArea = document.getElementById('userArea');
        if (currentUser) {
            userArea.innerHTML = `<div class="user-info">👤 ${currentUser.email} <button id="logoutBtn" class="btn">Salir</button></div>`;
            document.getElementById('logoutBtn')?.addEventListener('click', () => {
                currentUser = null;
                localStorage.removeItem('thia_current_user');
                updateUserUI();
                renderGames();
            });
        } else {
            userArea.innerHTML = `<button id="showAuthBtn" class="btn">🔑 Iniciar sesión</button>`;
            document.getElementById('showAuthBtn')?.addEventListener('click', () => document.getElementById('authModal').classList.remove('hidden'));
        }
    }
    
    // ==================== EVENTOS ====================
    document.querySelectorAll('.tab').forEach(tab => {
        tab.addEventListener('click', () => {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            tab.classList.add('active');
            currentSport = tab.getAttribute('data-sport');
            renderGames();
        });
    });
    
    document.getElementById('plan20Btn')?.addEventListener('click', () => alert("Plan $20: Envía comprobante a soporte@thiasports.com"));
    document.getElementById('plan30Btn')?.addEventListener('click', () => alert("Plan $30: Envía comprobante a soporte@thiasports.com"));
    
    // ==================== INICIO ====================
    const savedUser = localStorage.getItem('thia_current_user');
    if (savedUser) {
        try { currentUser = JSON.parse(savedUser); } catch(e) {}
    }
    updateUserUI();
    renderGames();
    initGoogleSignIn();
</script>
