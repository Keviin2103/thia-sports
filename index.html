            padding: 1rem;
            min-height: 100vh;
        }
        
        .logo {
            font-size: 1.8rem;
            font-weight: bold;
            text-align: center;
            background: linear-gradient(135deg, #f97316, #facc15);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin: 0.5rem 0 1rem;
        }
        .logo span { color: #facc15; background: none; }
        
        .sport-tabs {
            display: flex;
            justify-content: center;
            gap: 0.8rem;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
        }
        .tab {
            background: #1e293b;
            border: none;
            padding: 0.6rem 1.2rem;
            border-radius: 40px;
            color: #cbd5e6;
            font-weight: bold;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.2s;
        }
        .tab.active {
            background: linear-gradient(95deg, #f97316, #facc15);
            color: #0f172a;
            box-shadow: 0 0 10px rgba(250, 204, 21, 0.3);
        }
        
        .games-grid {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            max-width: 700px;
            margin: 0 auto;
        }
        .game-card {
            background: rgba(18, 25, 45, 0.85);
            backdrop-filter: blur(4px);
            border-radius: 24px;
            border: 1px solid rgba(250, 204, 21, 0.2);
            overflow: hidden;
            transition: transform 0.2s;
        }
        .game-card:hover {
            transform: translateY(-2px);
            border-color: rgba(250, 204, 21, 0.4);
        }
        .game-card.star { border: 2px solid #facc15; }
        
        .teams {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 1rem 0.5rem;
            gap: 0.5rem;
            flex-wrap: wrap;
        }
        .team { text-align: center; flex: 1; }
        .team-logo { font-size: 2rem; margin-bottom: 0.2rem; }
        .team-name { font-weight: bold; font-size: 0.9rem; }
        .team-record { font-size: 0.65rem; color: #9ca3af; }
        .vs {
            background: #facc15;
            color: #0f172a;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 0.8rem;
        }
        
        .game-info {
            display: flex;
            justify-content: space-between;
            padding: 0 1rem 0.4rem;
            font-size: 0.7rem;
            color: #9ca3af;
            flex-wrap: wrap;
            gap: 0.3rem;
        }
        .injury-note {
            font-size: 0.65rem;
            background: rgba(220, 38, 38, 0.2);
            padding: 0.3rem 0.6rem;
            margin: 0 1rem 0.5rem;
            border-radius: 10px;
            color: #fca5a5;
        }
        
        .prediction-block {
            padding: 0.7rem 1rem 1rem;
            background: rgba(0,0,0,0.2);
            border-top: 1px solid rgba(255,255,255,0.05);
        }
        .prediction-text {
            background: #0f172a;
            border-left: 4px solid #10b981;
            border-radius: 14px;
            padding: 0.7rem;
            font-size: 0.8rem;
            line-height: 1.4;
        }
        .star-badge {
            background: #facc15;
            color: #0f172a;
            font-size: 0.65rem;
            font-weight: bold;
            padding: 0.15rem 0.5rem;
            border-radius: 20px;
            display: inline-block;
            margin-bottom: 0.3rem;
        }
        
        .footer {
            text-align: center;
            font-size: 0.65rem;
            color: #5b6e8c;
            margin-top: 2rem;
            padding: 1rem;
        }
        
        @media (max-width: 640px) {
            .teams { flex-direction: column; gap: 0.3rem; }
            .vs { margin: 0 auto; }
            .team-logo { font-size: 1.6rem; }
            .tab { padding: 0.4rem 1rem; font-size: 0.8rem; }
