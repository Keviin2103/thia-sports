    // ---------- SISTEMA DE LOGIN (sin cambios) ----------
    let currentUser = null;
    function handleGoogleCredential(response) {
        const payload = JSON.parse(atob(response.credential.split('.')[1]));
        currentUser = { email: payload.email, name: payload.name };
        localStorage.setItem('thia_user', JSON.stringify(currentUser));
        updateUserUI();
        renderCurrentView();
        closeModal();
    }
    function initGoogleSignIn() {
        if (typeof google === 'undefined') { setTimeout(initGoogleSignIn, 500); return; }
        google.accounts.id.initialize({
            client_id: "613468909873-vu4nc6ugbm5cpdovfmb5vfo3m2h2mu2u.apps.googleusercontent.com",
            callback: handleGoogleCredential,
            auto_select: false
        });
        google.accounts.id.renderButton(document.getElementById("googleBtnContainer"), { theme: "outline", size: "large" });
    }
    function showLoginModal() {
        let modal = document.getElementById('authModal');
        if (!modal) {
            modal = document.createElement('div');
            modal.id = 'authModal';
            modal.className = 'modal';
            modal.innerHTML = `<div class="modal-content">
                <h2 style="color:#facc15">ThIA Sports</h2>
                <p>Accede con tu cuenta</p>
                <input type="email" id="loginEmail" placeholder="Email">
                <input type="password" id="loginPassword" placeholder="Contraseña">
                <button id="doLoginBtn" class="btn">Iniciar sesión</button>
                <button id="doRegisterBtn" class="btn-outline-light">Registrarse</button>
                <div style="margin:1rem 0;">━━━━━ o ━━━━━</div>
                <div id="googleBtnContainer"></div>
                <button class="btn-outline-light" style="margin-top:1rem;" id="closeModalBtn">Cerrar</button>
            </div>`;
            document.body.appendChild(modal);
            document.getElementById('closeModalBtn')?.addEventListener('click', closeModal);
            document.getElementById('doLoginBtn')?.addEventListener('click', () => {
                const email = document.getElementById('loginEmail').value;
                const pass = document.getElementById('loginPassword').value;
                const users = JSON.parse(localStorage.getItem('thia_local_users') || '[]');
                const user = users.find(u => u.email === email && u.password === pass);
                if (user) { currentUser = { email: user.email }; localStorage.setItem('thia_user', JSON.stringify(currentUser)); updateUserUI(); renderCurrentView(); closeModal(); }
                else alert("Credenciales incorrectas");
            });
            document.getElementById('doRegisterBtn')?.addEventListener('click', () => {
                const email = document.getElementById('loginEmail').value;
                const pass = document.getElementById('loginPassword').value;
                if (!email || !pass) return alert("Completa ambos campos");
                const users = JSON.parse(localStorage.getItem('thia_local_users') || '[]');
                if (users.find(u => u.email === email)) return alert("Email ya registrado");
                users.push({ email, password: pass });
                localStorage.setItem('thia_local_users', JSON.stringify(users));
                currentUser = { email };
                localStorage.setItem('thia_user', JSON.stringify(currentUser));
                updateUserUI(); renderCurrentView(); closeModal();
            });
            initGoogleSignIn();
        }
        modal.style.display = 'flex';
    }
    function closeModal() { const m = document.getElementById('authModal'); if (m) m.style.display = 'none'; }
    function logout() { currentUser = null; localStorage.removeItem('thia_user'); updateUserUI(); renderCurrentView(); }
    function updateUserUI() {
        const area = document.getElementById('authArea');
        if (currentUser) area.innerHTML = `<div class="user-greeting"><i class="fas fa-user-circle"></i> ${currentUser.email.split('@')[0]} <button id="logoutBtn" style="background:#facc15;color:#000;border:none;">Salir</button></div>`;
        else area.innerHTML = `<button id="showAuthBtn"><i class="fas fa-key"></i> Acceder</button>`;
        document.getElementById('logoutBtn')?.addEventListener('click', logout);
        document.getElementById('showAuthBtn')?.addEventListener('click', showLoginModal);
    }

    let currentSport = "mlb";
    let currentMain = "picks";

    function renderGames() {
        let games = [];
        if (currentSport === "futbol") games = futbolPicks;
        else if (currentSport === "mlb") games = mlbPicks;
        else if (currentSport === "nhl") games = nhlPicks;
        else games = nbaPicks;
        const container = document.getElementById('gamesContainer');
        const acceso = currentUser !== null;
        if (!games.length) { container.innerHTML = '<div style="text-align:center;">Sin juegos disponibles</div>'; return; }
        let html = '';
        for (let g of games) {
            const parts = g.partido.split(' vs ');
            const awayTeam = parts[0] || "Visitante";
            const homeTeam = parts[1] || "Local";
            const awayLogo = getTeamLogo(awayTeam, currentSport);
            const homeLogo = getTeamLogo(homeTeam, currentSport);
            const confianzaText = g.principal.confianza ? `<span class="confidence">Confianza: ${g.principal.confianza}</span>` : '';
            const secundariaHtml = g.secundaria ? `<div class="pick-card pick-secondary"><strong>📊 SECUNDARIA:</strong> ${g.secundaria.pick} (${g.secundaria.cuota}) stake ${g.secundaria.stake}<br><span class="confidence">Confianza: ${g.secundaria.confianza}</span></div>` : '';
            const propHtml = g.prop_jugador ? `<div class="pick-card pick-prop"><strong>🎲 PROP ${g.prop_jugador.jugador}:</strong> ${g.prop_jugador.prop} (${g.prop_jugador.cuota}) stake ${g.prop_jugador.stake}</div>` : '';
            const infoExtra = g.lanzadores ? `<div class="pitcher-info">📊 ${g.lanzadores}</div>` : (g.contexto ? `<div class="pitcher-info">🏆 ${g.contexto}</div>` : '');
            html += `<div class="game-card">
                <div class="card-header">
                    <span class="league">${currentSport.toUpperCase()}</span>
                    <span><i class="far fa-clock"></i> ${g.hora || "Horario local"}</span>
                </div>
                <div class="matchup">
                    <div class="team">
                        ${awayLogo ? `<img src="${awayLogo}" class="team-logo" alt="${awayTeam}">` : `<div class="team-logo" style="font-size:2rem;">🏆</div>`}
                        <div class="team-name">${awayTeam}</div>
                    </div>
                    <div class="vs-circle">VS</div>
                    <div class="team">
                        ${homeLogo ? `<img src="${homeLogo}" class="team-logo" alt="${homeTeam}">` : `<div class="team-logo" style="font-size:2rem;">🏆</div>`}
                        <div class="team-name">${homeTeam}</div>
                    </div>
                </div>
                ${infoExtra}
                ${!acceso ? `<div class="premium-lock"><i class="fas fa-lock"></i> Inicia sesión para ver los picks</div>` : `
                    <div class="pick-card pick-main"><strong>🎯 JUGADA PRINCIPAL:</strong> ${g.principal.pick} (${g.principal.cuota}) stake ${g.principal.stake}<br>${confianzaText}</div>
                    ${secundariaHtml}
                    ${propHtml}
                `}
            </div>`;
        }
        container.innerHTML = html;
    }

    function renderResults() {
        document.getElementById('statsSummary').innerHTML = `<div class="stat-card"><div class="stat-number">0</div><div>HITS</div></div><div class="stat-card"><div class="stat-number">0</div><div>FAILS</div></div><div class="stat-card"><div class="stat-number">0%</div><div>EFECT.</div></div>`;
        document.getElementById('resultsTableBody').innerHTML = '<tr><td colspan="3">Resultados en actualización (sistema en simulación)</td></tr>';
        document.getElementById('leccionesList').innerHTML = mejoras.map(l => `<div>• ${l}</div>`).join('');
    }

    function renderParlays() {
        const container = document.getElementById('parlaysContainer');
        let html = '';
        parlaysData.forEach(p => {
            let colorClass = p.type === 'gold' ? 'parlay-gold' : (p.type === 'green' ? 'parlay-green' : (p.type === 'orange' ? 'parlay-orange' : 'parlay-purple'));
            html += `<div class="parlay-card ${colorClass}">
                <div style="font-weight:800; font-size:1.2rem; margin-bottom:0.5rem;">${p.name}</div>
                <div style="background:#facc15; color:#000; border-radius:20px; padding:0.3rem; text-align:center; font-weight:800; margin-bottom:0.5rem;">${p.odds}</div>
                <div style="font-size:0.7rem; margin-bottom:0.5rem;">Stake: ${p.stake}</div>
                ${p.picks.map(pk => `<div style="background:rgba(0,0,0,0.5); padding:0.3rem; border-radius:12px; margin:0.2rem 0;">${pk}</div>`).join('')}
                <div style="font-size:0.7rem; margin-top:0.5rem;">${p.desc}</div>
            </div>`;
        });
        container.innerHTML = html;
    }

    function updateBodySportClass() {
        document.body.className = `sport-${currentSport}`;
    }

    function renderCurrentView() {
        if (currentMain === 'picks') {
            document.getElementById('picksSection').classList.remove('hidden');
            document.getElementById('resultsSection').classList.add('hidden');
            document.getElementById('parlaysSection').classList.add('hidden');
            renderGames();
        } else if (currentMain === 'resultados') {
            document.getElementById('picksSection').classList.add('hidden');
            document.getElementById('resultsSection').classList.remove('hidden');
            document.getElementById('parlaysSection').classList.add('hidden');
            renderResults();
        } else {
            document.getElementById('picksSection').classList.add('hidden');
            document.getElementById('resultsSection').classList.add('hidden');
            document.getElementById('parlaysSection').classList.remove('hidden');
            renderParlays();
        }
        updateBodySportClass();
    }

    function initSportFilters() {
        const container = document.getElementById('sportFilters');
        const sports = ['mlb', 'nba', 'nhl', 'futbol'];
        const names = { mlb:'⚾ Béisbol', nba:'🏀 Baloncesto', nhl:'🏒 Hockey', futbol:'⚽ Fútbol' };
        container.innerHTML = sports.map(s => `<div class="sport-chip ${s === currentSport ? 'active' : ''}" data-sport="${s}"><i class="fas ${s==='futbol'?'fa-futbol':s==='mlb'?'fa-baseball-ball':s==='nhl'?'fa-hockey-puck':'fa-basketball-ball'}"></i> ${names[s]}</div>`).join('');
        document.querySelectorAll('.sport-chip').forEach(chip => {
            chip.addEventListener('click', () => {
                document.querySelectorAll('.sport-chip').forEach(c => c.classList.remove('active'));
                chip.classList.add('active');
                currentSport = chip.getAttribute('data-sport');
                renderGames();
                updateBodySportClass();
            });
        });
    }

    document.querySelectorAll('.nav-tab').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.nav-tab').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentMain = btn.getAttribute('data-main');
            renderCurrentView();
        });
    });

    const savedUser = localStorage.getItem('thia_user');
    if (savedUser) { try { currentUser = JSON.parse(savedUser); } catch(e) {} }
    updateUserUI();
    initSportFilters();
    renderCurrentView();
</script>
