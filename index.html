<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>ThIA Sports | MLB + NBA Predicciones</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(145deg, #0b1120 0%, #111827 100%);
            color: #eef2ff;
            padding: 1rem;
            min-height: 100vh;
        }
        
        /* Header */
        .logo {
            font-size: 1.8rem;
            font-weight: bold;
            text-align: center;
            background: linear-gradient(135deg, #f97316, #facc15);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin: 0.5rem 0 1rem;
        }
        .logo span { color: #facc15; background: none; -webkit-background-clip: unset; background-clip: unset; }
        
        /* Pestañas */
        .sport-tabs {
            display: flex;
            justify-content: center;
            gap: 1rem;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
        }
        .tab {
            background: #1e293b;
            border: none;
            padding: 0.7rem 1.8rem;
            border-radius: 40px;
            color: #cbd5e6;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s;
        }
        .tab.active {
            background: linear-gradient(95deg, #f97316, #facc15);
            color: #0f172a;
            box-shadow: 0 0 10px rgba(250, 204, 21, 0.3);
        }
        
        /* Tarjetas */
        .games-grid {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            max-width: 700px;
            margin: 0 auto;
        }
        .game-card {
            background: rgba(18, 25, 45, 0.85);
            backdrop-filter: blur(4px);
            border-radius: 24px;
            border: 1px solid rgba(250, 204, 21, 0.2);
            overflow: hidden;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .game-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.4);
            border-color: rgba(250, 204, 21, 0.4);
        }
        .game-card.star {
            border: 2px solid #facc15;
            box-shadow: 0 0 15px rgba(250, 204, 21, 0.2);
        }
        
        /* Equipos */
        .teams {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.2rem 1rem 0.8rem;
            gap: 0.5rem;
            flex-wrap: wrap;
        }
        .team {
            text-align: center;
            flex: 1;
        }
        .team-logo {
            font-size: 2.5rem;
            margin-bottom: 0.3rem;
        }
        .team-name {
            font-weight: bold;
            font-size: 1rem;
        }
        .team-record {
            font-size: 0.7rem;
            color: #9ca3af;
        }
        .vs {
            background: #facc15;
            color: #0f172a;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 0.9rem;
        }
        
        /* Info */
        .game-info {
            display: flex;
            justify-content: space-between;
            padding: 0 1rem 0.5rem;
            font-size: 0.75rem;
            color: #9ca3af;
            flex-wrap: wrap;
            gap: 0.5rem;
        }
        .injury-note {
            font-size: 0.7rem;
            background: rgba(220, 38, 38, 0.2);
            padding: 0.4rem 0.8rem;
            margin: 0 1rem 0.5rem;
            border-radius: 12px;
            color: #fca5a5;
        }
        
        /* Predicción */
        .prediction-block {
            padding: 0.8rem 1rem 1.2rem;
            background: rgba(0,0,0,0.2);
            border-top: 1px solid rgba(255,255,255,0.05);
        }
        .prediction-text {
            background: #0f172a;
            border-left: 4px solid #10b981;
            border-radius: 16px;
            padding: 0.8rem;
            font-size: 0.85rem;
            line-height: 1.4;
        }
        .star-badge {
            background: #facc15;
            color: #0f172a;
            font-size: 0.7rem;
            font-weight: bold;
            padding: 0.2rem 0.6rem;
            border-radius: 20px;
            display: inline-block;
            margin-bottom: 0.5rem;
        }
        
        .footer {
            text-align: center;
            font-size: 0.7rem;
            color: #5b6e8c;
            margin-top: 2rem;
            padding: 1rem;
        }
        
        @media (max-width: 640px) {
            .teams { flex-direction: column; gap: 0.5rem; }
            .vs { margin: 0 auto; }
            .team-logo { font-size: 2rem; }
            .tab { padding: 0.5rem 1.2rem; font-size: 0.9rem; }
        }
    </style>
</head>

            { away: "LA Angels", home: "Chicago Cubs", time: "2:20 PM", spAway: "Y. Kikuchi (3.86)", spHome: "M. Boyd (3.21)", prediction: "CHC ML -118 • UNDER 8.5 • Bregman HR", star: false },

            { away: "Minnesota", home: "Kansas City", time: "7:40 PM", spAway: "J. Ryan (3.42)", spHome: "N. Cameron (4.08)", prediction: "KC ML -108 • UNDER 8.5 • Ryan 7K+", star: false },

        // ==================== DATOS NBA (EV Analytics 02/04/2026) ====================
        const nbaGames = [
            { away: "Detroit Pistons", away_rec: "54-21", home: "Minnesota T-Wolves", home_rec: "45-29", time: "7:00 PM ET", spread: "DET -3.0", total: "224.5", prediction: "⭐ UNDER 224.5 • DET ML -155 • DET -3.0 • Confianza: 72%", injuries: "Cade Cunningham OUT • McDaniels OUT • Edwards Q", star: false },

            { away: "OKC Thunder", away_rec: "58-17", home: "LA Lakers", home_rec: "48-27", time: "9:30 PM ET", spread: "OKC -9.5", total: "227.5", prediction: "OVER 227.5 • SKIP ML -430 • OKC -9.5 • Confianza: 66%", injuries: "LeBron Q • Ayton OUT • Reaves Q", star: false },

            { away: "LA Clippers", away_rec: "36-37", home: "San Antonio Spurs", home_rec: "56-19", time: "10:30 PM ET", spread: "SAS +1.5", total: "229.5", prediction: "⭐ UNDER 229.5 • SAS ML -105 • SAS +1.5 • Confianza: 70%", injuries: "Wemby ACTIVO ✅ • Kawhi Q", star: true }
        ];
        
        // ==================== RENDERIZAR ====================
        let currentSport = 'mlb';
        
        function renderGames() {
            const games = currentSport === 'mlb' ? mlbGames : nbaGames;
            const container = document.getElementById('gamesContainer');
            
            let html = '';
            for (let g of games) {
                const logoAway = logos[g.away] || (currentSport === 'mlb' ? "⚾" : "🏀");
                const logoHome = logos[g.home] || (currentSport === 'mlb' ? "⚾" : "🏀");
                const starClass = g.star ? 'star' : '';
                const starBadge = g.star ? '<div class="star-badge">⭐ PICK ESTRELLA ⭐</div>' : '';
                
                if (currentSport === 'mlb') {
                    html += `
                        <div class="game-card ${starClass}">
                            <div class="teams">
                                <div class="team"><div class="team-logo">${logoAway}</div><div class="team-name">${g.away}</div><div class="team-record">Visitante</div></div>
                                <div class="vs">VS</div>
                                <div class="team"><div class="team-logo">${logoHome}</div><div class="team-name">${g.home}</div><div class="team-record">Local</div></div>
                            </div>
                            <div class="game-info"><span>⏰ ${g.time}</span><span>⚾ ${g.spAway} @ ${g.spHome}</span></div>
                            <div class="prediction-block"><div class="prediction-text">🔮 ${starBadge}<strong>Predicción:</strong> ${g.prediction}</div></div>
                        </div>
                    `;
                } else {
                    html += `
                        <div class="game-card ${starClass}">
                            <div class="teams">
                                <div class="team"><div class="team-logo">${logoAway}</div><div class="team-name">${g.away}</div><div class="team-record">${g.away_rec}</div></div>
                                <div class="vs">VS</div>
                                <div class="team"><div class="team-logo">${logoHome}</div><div class="team-name">${g.home}</div><div class="team-record">${g.home_rec}</div></div>
                            </div>
                            <div class="game-info"><span>⏰ ${g.time}</span><span>📊 ${g.spread} | Total: ${g.total}</span></div>
                            ${g.injuries ? `<div class="injury-note"><i>⚠️</i> ${g.injuries}</div>` : ''}

                        </div>
                    `;
                }
            }
            container.innerHTML = html;
        }
        
        // ==================== PESTAÑAS ====================
        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                currentSport = tab.getAttribute('data-sport');
                renderGames();
            });
        });
        
        // Cargar MLB por defecto
        renderGames();
    </script>
</body>
</html>
