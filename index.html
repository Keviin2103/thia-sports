            color: #fff;
            min-height: 100vh;
            position: relative;
        }
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            opacity: 0.15;
            z-index: -2;
            transition: background-image 0.3s ease;
        }

        body.sport-nhl::before { background-image: url('https://images.unsplash.com/photo-1515704089429-fd06e6661ddd?q=80&w=2070&auto=format'); }
        body.sport-nba::before { background-image: url('https://images.unsplash.com/photo-1546519638-68e109498ffc?q=80&w=2090&auto=format'); }
        body::after {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 30%, rgba(0,0,0,0.7), #0a0c10);
            z-index: -1;
        }

        .top-bar {
            background: #1e1f24;
            border-bottom: 4px solid #facc15;
            padding: 0.5rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }
        .logo {
            font-size: 1.8rem;
            font-weight: 800;
            letter-spacing: -1px;
        }
        .logo span:first-child { color: #facc15; }
        .logo span:last-child { color: #fff; font-weight: 400; }
        .date-badge {
            background: #2c2e36;
            padding: 0.3rem 1rem;
            border-radius: 40px;
            font-size: 0.8rem;
            color: #ccc;
        }
        .user-area button {
            background: transparent;
            border: 1px solid #facc15;
            padding: 0.4rem 1.2rem;
            border-radius: 40px;
            color: #facc15;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }
        .user-area button:hover { background: #facc15; color: #000; }
        .user-greeting {
            background: #2c2e36;
            padding: 0.3rem 1rem;
            border-radius: 40px;
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .nav-tabs {
            display: flex;
            justify-content: center;
            gap: 0.2rem;
            background: #15171c;
            padding: 0.5rem 1rem;
            border-bottom: 1px solid #2c2e36;
        }
        .nav-tab {
            background: transparent;
            border: none;
            padding: 0.6rem 1.8rem;
            font-weight: 700;
            font-size: 0.9rem;
            color: #aaa;
            cursor: pointer;
            border-radius: 40px;
            transition: 0.2s;
        }
        .nav-tab i { margin-right: 8px; }
        .nav-tab.active {
            background: #facc15;
            color: #0a0c10;
        }
        .nav-tab:not(.active):hover { color: #facc15; background: #2c2e36; }

        .container {
            max-width: 1400px;
            margin: 2rem auto;
            padding: 0 1.5rem;
        }

        .sport-filters {
            display: flex;
            gap: 0.8rem;
            flex-wrap: wrap;
            margin-bottom: 2rem;
            justify-content: center;
        }
        .sport-chip {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 0.5rem 1.5rem;
            border-radius: 60px;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .sport-chip.active {
            background: #facc15;
            color: #0a0c10;
            border-color: #facc15;
        }

        .games-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
            gap: 1.8rem;
        }
        .league-section {
            margin-bottom: 2rem;
        }
        .league-title {
            font-size: 1.3rem;
            font-weight: 700;
            color: #facc15;
            margin-bottom: 1rem;
            padding-bottom: 0.5rem;
            border-bottom: 2px solid #facc15;
            display: inline-block;
        }
        .game-card {
            background: rgba(20, 22, 28, 0.85);
            backdrop-filter: blur(8px);
            border-radius: 24px;
            border: 1px solid rgba(250, 204, 21, 0.3);
            overflow: hidden;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
        }
        .game-card:hover {
            transform: translateY(-5px);
            border-color: #facc15;
            box-shadow: 0 15px 30px rgba(250,204,21,0.2);
        }
        .card-header {
            display: flex;
            justify-content: space-between;
            padding: 0.8rem 1rem;
            background: rgba(0,0,0,0.5);
            font-size: 0.7rem;
            font-weight: 500;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .league {
            background: #facc15;
            color: #000;
            padding: 0.2rem 0.7rem;
            border-radius: 20px;
            font-weight: bold;
        }
        .matchup {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1rem 1.2rem;
            gap: 0.5rem;
        }
        .team {
            text-align: center;
            flex: 1;
        }
        .team-logo {
            width: 60px;
            height: 60px;
            object-fit: contain;
            margin-bottom: 0.5rem;
        }
        .team-name {
            font-weight: 700;
            font-size: 0.9rem;
        }
        .vs-circle {
            background: #facc15;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            color: #0a0c10;
            font-size: 0.8rem;
        }
        .pick-card {
            padding: 0.8rem 1rem;
            background: rgba(0,0,0,0.4);
            margin: 0.5rem 1rem 1rem;
            border-radius: 16px;
            border-left: 4px solid;
        }
        .pick-main { border-left-color: #facc15; }
        .pick-secondary { border-left-color: #3b82f6; }
        .pick-prop { border-left-color: #a855f7; }
        .confidence {
            display: inline-block;
            font-size: 0.7rem;
            background: #2c2e36;
            padding: 0.2rem 0.6rem;
            border-radius: 20px;
            margin-top: 6px;
        }
        .premium-lock {
            text-align: center;
            padding: 1rem;
            background: rgba(0,0,0,0.6);
            margin: 0.5rem 1rem 1rem;
            border-radius: 16px;
            color: #aaa;
        }
        .stats-row {
            display: flex;
            gap: 1.5rem;
            margin-bottom: 2rem;
            flex-wrap: wrap;
        }
        .stat-card {
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(4px);
            border-radius: 20px;
            padding: 1rem 1.5rem;
            text-align: center;
            flex: 1;
            min-width: 120px;
            border: 1px solid rgba(250,204,21,0.3);
        }
        .stat-number {
            font-size: 2rem;
            font-weight: 800;
            color: #facc15;
        }
        .results-table {
            width: 100%;
            background: rgba(0,0,0,0.4);
            border-radius: 20px;
            overflow: hidden;
            margin-bottom: 2rem;
        }
        .results-table th, .results-table td {
            padding: 0.8rem;
            text-align: left;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .results-table th { color: #facc15; }
        .result-hit { color: #22c55e; font-weight: bold; }
        .result-fail { color: #ef4444; font-weight: bold; }

        .parlays-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 1.5rem;
        }
        .parlay-card {
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(8px);
            border-radius: 24px;
            padding: 1.2rem;
            border: 1px solid;
        }
        .parlay-gold { border-color: #eab308; }
        .parlay-green { border-color: #22c55e; }
        .parlay-orange { border-color: #f97316; }
        .parlay-purple { border-color: #a855f7; }

        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(12px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }
        .modal-content {
            background: #1a1c23;
            padding: 2rem;
            border-radius: 32px;
            width: 90%;
            max-width: 400px;
            text-align: center;
            border: 1px solid #facc15;
        }
        .modal-content input {
            width: 100%;
            padding: 0.7rem;
            margin: 0.5rem 0;
            background: #2c2e36;
            border: none;
            border-radius: 40px;
            color: white;
        }
        .btn {
            background: #facc15;
            color: #0a0c10;
            border: none;
            padding: 0.6rem 1.2rem;
            border-radius: 40px;
            font-weight: bold;
            cursor: pointer;
            margin: 0.3rem;
        }
        .btn-outline-light {
            background: transparent;
            border: 1px solid #facc15;
            color: #facc15;
            padding: 0.5rem 1rem;
            border-radius: 40px;
        }
        .hidden { display: none; }
        footer {
            text-align: center;
            padding: 2rem;
            font-size: 0.7rem;
            color: #5b6e8c;
        }
        @media (max-width: 640px) {
            .games-grid { grid-template-columns: 1fr; }
            .matchup { flex-direction: column; }
            .vs-circle { margin: 0.5rem 0; }
            .team-logo { width: 50px; height: 50px; }
        }
    </style>
</head>

    function renderCurrentView() {
        if (currentMain === 'picks') {
            document.getElementById('picksSection').classList.remove('hidden');
            document.getElementById('resultsSection').classList.add('hidden');
            document.getElementById('parlaysSection').classList.add('hidden');
            renderGames();
        } else if (currentMain === 'resultados') {
            document.getElementById('picksSection').classList.add('hidden');
            document.getElementById('resultsSection').classList.remove('hidden');
            document.getElementById('parlaysSection').classList.add('hidden');
            renderResults();
        } else {
            document.getElementById('picksSection').classList.add('hidden');

            renderParlays();
        }
        updateBodySportClass();

    function initSportFilters() {
        const container = document.getElementById('sportFilters');
        const sports = ['futbol', 'mlb', 'nba', 'nhl'];
        const names = { futbol:'⚽ Fútbol', mlb:'⚾ Béisbol', nba:'🏀 Baloncesto', nhl:'🏒 Hockey' };
        container.innerHTML = sports.map(s => `<div class="sport-chip ${s === currentSport ? 'active' : ''}" data-sport="${s}"><i class="fas ${s==='futbol'?'fa-futbol':s==='mlb'?'fa-baseball-ball':s==='nhl'?'fa-hockey-puck':'fa-basketball-ball'}"></i> ${names[s]}</div>`).join('');
        document.querySelectorAll('.sport-chip').forEach(chip => {
            chip.addEventListener('click', () => {
                document.querySelectorAll('.sport-chip').forEach(c => c.classList.remove('active'));
                chip.classList.add('active');
                currentSport = chip.getAttribute('data-sport');
                renderGames();
                updateBodySportClass();
            });
        });
    }

    document.querySelectorAll('.nav-tab').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.nav-tab').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentMain = btn.getAttribute('data-main');
            renderCurrentView();
        });
    });

    if (savedUser) { try { currentUser = JSON.parse(savedUser); } catch(e) {} }
    updateUserUI();
    initSportFilters();
