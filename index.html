    function handleGoogleCredential(response) {
        const payload = JSON.parse(atob(response.credential.split('.')[1]));

        updateUserUI();

    function initGoogleSignIn() {
        if (typeof google === 'undefined') { setTimeout(initGoogleSignIn, 500); return; }
        google.accounts.id.initialize({
            client_id: "613468909873-vu4nc6ugbm5cpdovfmb5vfo3m2h2mu2u.apps.googleusercontent.com",
            callback: handleGoogleCredential,
            auto_select: false
        });
        google.accounts.id.renderButton(document.getElementById("googleBtnContainer"), { theme: "outline", size: "large" });
    }
    function showLoginModal() {
        let modal = document.getElementById('authModal');
        if (!modal) {
            modal = document.createElement('div');
            modal.id = 'authModal';
            modal.className = 'modal';
            modal.innerHTML = `<div class="modal-content">
                <h2>ThIA Sports</h2>
                <p>Inicia sesión con Google o email local</p>
                <input type="email" id="loginEmail" placeholder="Email">
                <input type="password" id="loginPassword" placeholder="Contraseña">
                <button id="doLoginBtn" class="btn-outline" style="background:#facc15; color:#000;">Iniciar sesión</button>
                <button id="doRegisterBtn" class="btn-outline">Registrarse</button>
                <div style="margin:0.5rem 0;">━━━━━ o ━━━━━</div>
                <div id="googleBtnContainer"></div>
                <button class="btn-outline" style="margin-top:0.5rem;" id="closeModalBtn">Cerrar</button>
            </div>`;
            document.body.appendChild(modal);
            document.getElementById('closeModalBtn')?.addEventListener('click', closeModal);
            document.getElementById('doLoginBtn')?.addEventListener('click', () => {
                const email = document.getElementById('loginEmail').value;
                const pass = document.getElementById('loginPassword').value;
                const users = JSON.parse(localStorage.getItem('thia_local_users') || '[]');
                const user = users.find(u => u.email === email && u.password === pass);
                if (user) { currentUser = { email: user.email }; localStorage.setItem('thia_user', JSON.stringify(currentUser)); updateUserUI(); renderCurrentView(); closeModal(); }
                else alert("Credenciales incorrectas");
            });
            document.getElementById('doRegisterBtn')?.addEventListener('click', () => {
                const email = document.getElementById('loginEmail').value;
                const pass = document.getElementById('loginPassword').value;
                if (!email || !pass) return alert("Completa ambos campos");
                const users = JSON.parse(localStorage.getItem('thia_local_users') || '[]');
                if (users.find(u => u.email === email)) return alert("Email ya registrado");
                users.push({ email, password: pass });
                localStorage.setItem('thia_local_users', JSON.stringify(users));
                currentUser = { email };
                localStorage.setItem('thia_user', JSON.stringify(currentUser));
                updateUserUI(); renderCurrentView(); closeModal();
            });
            initGoogleSignIn();
        }
        modal.style.display = 'flex';
    }
    function closeModal() { const m = document.getElementById('authModal'); if (m) m.style.display = 'none'; }
    function logout() { currentUser = null; localStorage.removeItem('thia_user'); updateUserUI(); renderCurrentView(); }

        const area = document.getElementById('authArea');

        else area.innerHTML = `<button id="showAuthBtn" class="btn-outline">🔑 Acceder</button>`;
        document.getElementById('logoutBtn')?.addEventListener('click', logout);

    }

        { partido: "Wild vs Stars", awayTeam: "Stars", homeTeam: "Wild", time: "8:00 PM VEN", principal: "Under 6.0 goles (1.85) | stake 1.5%", confianza: "Media", prop: "Robertson over 0.5 goles (2.00)" },
        { partido: "Flames vs Avalanche", awayTeam: "Avalanche", homeTeam: "Flames", time: "9:00 PM VEN", principal: "Avalanche ML (1.28) | stake 2%", confianza: "Muy Alta" },
        { partido: "Predators vs Mammoth", awayTeam: "Mammoth", homeTeam: "Predators", time: "8:00 PM VEN", principal: "Mammoth ML (1.69) | stake 1.5%", confianza: "Media" },
        { partido: "Sharks vs Ducks", awayTeam: "Ducks", homeTeam: "Sharks", time: "10:30 PM VEN", principal: "Ducks ML (1.79) | stake 1.5%", confianza: "Media" },
        { partido: "Golden Knights vs Kraken", awayTeam: "Kraken", homeTeam: "Golden Knights", time: "10:00 PM VEN", principal: "Golden Knights ML (1.59) | stake 1.5%", confianza: "Media-Alta" },
        { partido: "Canucks vs Kings", awayTeam: "Kings", homeTeam: "Canucks", time: "10:00 PM VEN", principal: "Kings ML (1.39) | stake 2%", confianza: "Alta" }
    ];

    // Parlays de ejemplo basados en picks de muy alta confianza
    const parlaysData = [
        { name: "DIRECTA DEL DÍA", type: "green", picks: ["MLB | Padres vs Rockies | Padres ML (1.30)"], odds: "1.30", stake: "2-3%", desc: "Máxima confianza del día" },
        { name: "MOROCHA 2 PICKS", type: "orange", picks: ["NBA | Celtics ML (1.22)", "NHL | Hurricanes ML (1.27)"], odds: "1.55", stake: "1.5%", desc: "Combinada de dos picks muy seguros" },
        { name: "PARLEY SEGURO 4 PICKS", type: "purple", picks: ["Fútbol | Real Madrid ML (1.28)", "MLB | Brewers ML (1.22)", "NBA | Bucks ML (1.32)", "NHL | Avalanche ML (1.28)"], odds: "2.75", stake: "1%", desc: "Cuatro favoritos sólidos" },
        { name: "MILLONARIO TODOS", type: "gold", picks: ["Real Madrid ML", "West Ham DNB", "Roma ML", "Hoffenheim DNB", "Monaco ML", "Marseille ML", "Twente ML", "Cubs ML", "Diamondbacks ML", "Tigers ML", "Reds ML", "Blue Jays ML", "Mets ML", "Yankees ML", "Braves ML", "Orioles ML", "Royals ML", "Brewers ML", "Cardinals ML", "Padres ML", "Mariners ML", "Dodgers ML", "Pistons ML", "Heat ML", "Cavaliers ML", "Celtics ML", "76ers ML", "Knicks ML", "Magic ML", "Bucks ML", "Spurs ML", "Thunder ML", "Rockets ML", "Grizzlies ML", "Clippers ML", "Warriors ML", "Lakers ML", "Sabres ML", "Lightning ML", "Senators ML", "Red Wings ML", "Devils ML", "Jets ML", "Hurricanes ML", "Avalanche ML", "Mammoth ML", "Ducks ML", "Golden Knights ML", "Kings ML"], odds: "> 10000", stake: "0.1%", desc: "Combinada de 49 picks, solo entretenimiento" }
    ];

    const mejoras = [
        "✅ R77: No apostar ML solo por altura extrema",
        "✅ R78: Champions: Over 2.5 si ambos tienen poder ofensivo",
        "✅ R79: Cautela con brasileños visitantes en Libertadores",
        "✅ R80: No apostar contra SP visitante con ERA<2.00 últimas 2",
        "✅ R81: Coors Field: Over solo si SP local no está en forma",
        "✅ R83: Duelo de ases = Under",
        "✅ R84: Tanking vs playoffs = no ML del débil",
        "✅ R85: Wild card pressure = no favorecer local automáticamente",
        "✅ R90: Evitar Yankees en abril",
        "✅ R91: Regreso de Embiid = Over automático",
        "✅ R93: Evitar Leafs favoritos en abril"
    ];

    let currentSport = "futbol";
    let currentMain = "picks";

    function renderGames() {
        let games = [];
        if (currentSport === "futbol") games = futbolPicks;
        else if (currentSport === "mlb") games = mlbPicks;
        else if (currentSport === "nba") games = nbaPicks;
        else games = nhlPicks;
        const container = document.getElementById('gamesContainer');
        const acceso = currentUser !== null;
        if (!games.length) { container.innerHTML = '<div style="text-align:center; padding:2rem;">No hay juegos disponibles.</div>'; return; }
        let html = '';
        for (let g of games) {
            const awayEmoji = getTeamEmoji(g.awayTeam, currentSport);
            const homeEmoji = getTeamEmoji(g.homeTeam, currentSport);
            // Mostrar prop si existe
            const propText = g.prop ? `<div class="pick-item pick-prop"><strong>🎲 PROP DESTACADO:</strong> ${g.prop}</div>` : '';
            html += `<div class="game-card">
                <div class="card-header">
                    <span class="league-badge">${currentSport.toUpperCase()}</span>
                    <span><i class="far fa-clock"></i> ${g.time}</span>
                </div>
                <div style="display: flex; align-items: center; justify-content: space-between; padding: 0.8rem 1rem;">
                    <div class="team-container">
                        <div class="team-emoji">${awayEmoji}</div>
                        <div class="team-name">${g.awayTeam}</div>
                    </div>
                    <div class="vs">VS</div>
                    <div class="team-container">
                        <div class="team-emoji">${homeEmoji}</div>
                        <div class="team-name">${g.homeTeam}</div>
                    </div>
                </div>
                <div class="premium-block">${!acceso ? `<div style="background:#1e293b; padding:0.8rem; text-align:center; border-radius:12px;"><i class="fas fa-lock"></i> Inicia sesión para ver los picks</div>` : `
                    <div class="pick-item pick-main"><strong>🎯 JUGADA PRINCIPAL:</strong> ${g.principal}</div>
                    ${propText}
                `}</div>
            </div>`;
        }
        container.innerHTML = html;
    }

    function renderResults() {
        // Placeholder de resultados
        document.getElementById('statsSummary').innerHTML = `<div class="stat-card"><div class="stat-value">0</div><div>HITS ✅</div></div><div class="stat-card"><div class="stat-value">0</div><div>FAILS ❌</div></div><div class="stat-card"><div class="stat-value">0%</div><div>EFECT.</div></div>`;
        const tbody = document.getElementById('resultsTableBody');
        tbody.innerHTML = '<tr><td colspan="3">No hay resultados registrados todavía. Edita desde admin.</td></tr>';
        document.getElementById('leccionesList').innerHTML = mejoras.map(l => `<div>• ${l}</div>`).join('');
    }

    function renderParlays() {
        const container = document.getElementById('parlaysContainer');
        let html = '';
        parlaysData.forEach(p => {
            let colorClass = p.type === 'gold' ? 'parlay-gold' : (p.type === 'green' ? 'parlay-green' : (p.type === 'orange' ? 'parlay-orange' : 'parlay-purple'));
            html += `<div class="parlay-card ${colorClass}">
                <div class="font-black text-center text-lg mb-2" style="color:${p.type==='gold'?'#eab308':p.type==='green'?'#22c55e':p.type==='orange'?'#f97316':'#a855f7'}">${p.name}</div>
                <div class="bg-green-500 rounded-lg py-1.5 text-center text-black font-black text-xl mb-2">${p.odds}</div>
                <div class="text-center text-gray-400 text-xs">Stake: ${p.stake}</div>
                ${p.picks.map(pk => `<div class="bg-black/30 rounded px-2 py-1 my-1 text-sm">${pk}</div>`).join('')}
                <p class="text-gray-400 text-xs mt-2">${p.desc}</p>
            </div>`;
        });
        container.innerHTML = html;
    }

    function renderCurrentView() {
        if (currentMain === 'picks') {
            document.getElementById('picksSection').classList.remove('hidden');
            document.getElementById('resultsSection').classList.add('hidden');
            document.getElementById('parlaysSection').classList.add('hidden');
            renderGames();
        } else if (currentMain === 'resultados') {
            document.getElementById('picksSection').classList.add('hidden');
            document.getElementById('resultsSection').classList.remove('hidden');
            document.getElementById('parlaysSection').classList.add('hidden');
            renderResults();
        } else {
            document.getElementById('picksSection').classList.add('hidden');
            document.getElementById('resultsSection').classList.add('hidden');
            document.getElementById('parlaysSection').classList.remove('hidden');
            renderParlays();
        }
    }

    function initSportTabs() {
        const container = document.getElementById('sportTabs');
        const sports = ['futbol', 'mlb', 'nba', 'nhl'];
        const names = { futbol:'⚽ Fútbol', mlb:'⚾ Béisbol', nba:'🏀 Baloncesto', nhl:'🏒 Hockey' };
        container.innerHTML = sports.map(s => `<button class="sport-tab ${s === currentSport ? 'active' : ''}" data-sport="${s}">${names[s]}</button>`).join('');
        document.querySelectorAll('.sport-tab').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.sport-tab').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentSport = btn.getAttribute('data-sport');
                renderGames();
            });
        });
    }

    document.getElementById('homeLink')?.addEventListener('click', () => { currentMain = 'picks'; document.querySelector('.main-tab[data-main="picks"]').click(); renderCurrentView(); });
    document.getElementById('resultsLink')?.addEventListener('click', () => { currentMain = 'resultados'; document.querySelector('.main-tab[data-main="resultados"]').click(); renderCurrentView(); });
    document.getElementById('parlaysLink')?.addEventListener('click', () => { currentMain = 'parlays'; document.querySelector('.main-tab[data-main="parlays"]').click(); renderCurrentView(); });
    document.querySelectorAll('.main-tab').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.main-tab').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentMain = btn.getAttribute('data-main');
            renderCurrentView();
        });
    });

    const savedUser = localStorage.getItem('thia_user');
    if (savedUser) { try { currentUser = JSON.parse(savedUser); } catch(e) {} }
    updateUserUI();
    initSportTabs();
    renderCurrentView();
</script>
</body>
