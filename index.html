            --orange-bg: rgba(251, 146, 60, 0.12);
            --blue: #67e8f9;
            --blue-bg: rgba(103, 232, 249, 0.1);
            --purple: #c084fc;
            --purple-bg: rgba(192, 132, 252, 0.1);
            --text-secondary: #a1a1aa;
            --border-subtle: rgba(250, 204, 21, 0.15);
            --border-medium: rgba(250, 204, 21, 0.35);

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--dark);
            color: #fff;
            min-height: 100vh;
            line-height: 1.5;

        /* TOP BAR */
        .top-bar {
            background: linear-gradient(180deg, #11131a 0%, #0d0f14 100%);
            border-bottom: 3px solid var(--gold);
            padding: 1.2rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(10px);
        }
        .logo {
            font-size: 2.2rem;
            font-weight: 900;
            letter-spacing: -1.5px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .logo .thia {
            color: var(--gold);
            text-shadow: 0 0 30px rgba(250, 204, 21, 0.4);
        }
        .logo .sports {
            color: #fff;
            font-weight: 700;
        }
        .date {
            color: #ccc;
            font-size: 1rem;
            background: rgba(255, 255, 255, 0.04);
            padding: 8px 18px;
            border-radius: 30px;
            font-weight: 500;
        }
        .date i {
            color: var(--gold);
            margin-right: 6px;
        }

        /* STATS BAR */
        .stats-bar {
            display: flex;
            gap: 16px;
            padding: 1rem 2rem;
            background: #11131a;
            overflow-x: auto;
            white-space: nowrap;
            border-bottom: 1px solid #222;
            flex-wrap: wrap;
        }
        .stat-chip {
            display: flex;
            align-items: center;
            gap: 8px;
            background: #1a1c23;
            padding: 8px 16px;
            border-radius: 30px;
            font-size: 0.9rem;
            font-weight: 500;
            color: #ccc;
            border: 1px solid #2a2d35;
        }
        .stat-chip i {
            color: var(--gold);
        }
        .stat-chip strong {
            color: #fff;
        }

        /* PARLAY SECTION */
        .parlay-section {
            max-width: 1480px;
            margin: 1.5rem auto 0.5rem;
            padding: 0 1rem;
        }
        .parlay-title {
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--gold-light);
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .parlay-title i {
            font-size: 1.3rem;
        }
        .parlay-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(400px, 1fr));
            gap: 1.2rem;
            margin-bottom: 1.5rem;
        }
        .parlay-card {
            background: linear-gradient(145deg, #1a1c23 0%, #14161c 100%);
            border-radius: 16px;
            border: 2px solid var(--border-medium);
            padding: 20px 22px;
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
        }
        .parlay-card:hover {
            border-color: var(--gold);
            box-shadow: 0 12px 35px rgba(250, 204, 21, 0.12);
            transform: translateY(-3px);
        }
        .parlay-card.conservador {
            border-color: var(--green);
            background: linear-gradient(145deg, #1a1c23 0%, #111a14 100%);
        }
        .parlay-card.balanceado {
            border-color: var(--gold);
            background: linear-gradient(145deg, #1a1c23 0%, #1a180e 100%);
        }
        .parlay-card.agresivo {
            border-color: var(--orange);
            background: linear-gradient(145deg, #1a1c23 0%, #1a1310 100%);
        }
        .parlay-badge {
            position: absolute;
            top: 16px;
            right: 16px;
            font-size: 0.75rem;
            font-weight: 700;
            padding: 5px 14px;
            border-radius: 20px;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }
        .conservador .parlay-badge {
            background: var(--green-bg);
            color: var(--green);
        }
        .balanceado .parlay-badge {
            background: var(--yellow-bg);
            color: var(--gold);
        }
        .agresivo .parlay-badge {
            background: var(--orange-bg);
            color: var(--orange);
        }
        .parlay-card h3 {
            font-size: 1.15rem;
            font-weight: 700;
            margin-bottom: 4px;
            color: #fff;
        }
        .parlay-card .parlay-subtitle {
            font-size: 0.82rem;
            color: #999;
            margin-bottom: 14px;
        }
        .parlay-legs {
            list-style: none;
            margin-bottom: 14px;
        }
        .parlay-legs li {
            padding: 7px 0;
            border-bottom: 1px solid #2a2d35;
            font-size: 0.88rem;
            color: #ddd;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .parlay-legs li:last-child {
            border-bottom: none;
        }
        .parlay-legs .leg-icon {
            font-size: 0.8rem;
            width: 20px;
            text-align: center;
        }
        .parlay-metrics {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            padding-top: 10px;
            border-top: 1px solid #2a2d35;
        }
        .parlay-metric {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }
        .parlay-metric .label {
            font-size: 0.7rem;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .parlay-metric .value {
            font-size: 1.1rem;
            font-weight: 700;
            color: #fff;
        }
        .parlay-metric .value.cuota-total {
            color: var(--gold-light);
            font-size: 1.3rem;
        }
        .parlay-metric .value.ev-positive {
            color: var(--green);
        }

        /* MAIN TABS */
        .main-tabs {
            display: flex;
            background: #11131a;
            padding: 0.8rem 1rem;
            gap: 8px;
            overflow-x: auto;
            white-space: nowrap;
            border-bottom: 1px solid #222;
            position: sticky;
            top: 88px;
            z-index: 99;
            backdrop-filter: blur(10px);
        }
        .main-tab {
            padding: 10px 22px;
            border-radius: 50px;
            background: #1f222a;
            border: 1px solid transparent;
            color: #bbb;
            font-weight: 600;
            cursor: pointer;
            font-size: 0.92rem;
            transition: all 0.2s ease;
            white-space: nowrap;
        }
        .main-tab:hover {
            background: #2a2d35;
            color: #fff;
        }
        .main-tab.active {
            background: var(--gold);
            color: #000;
            border-color: var(--gold);
            box-shadow: 0 4px 20px rgba(250, 204, 21, 0.3);
            font-weight: 700;
        }

        /* SUB TABS */
        .sub-tabs {
            display: flex;
            background: #15171c;
            padding: 0.8rem 1rem;
            gap: 8px;
            flex-wrap: wrap;
            border-bottom: 1px solid #222;
        }
        .sub-tab {
            padding: 8px 18px;
            border-radius: 25px;
            background: #252830;
            border: 1px solid transparent;
            color: #ccc;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 500;
            transition: all 0.2s ease;
        }
        .sub-tab:hover {
            background: #333;
            color: #fff;
        }
        .sub-tab.active {
            background: var(--gold);
            color: #000;
            font-weight: 700;
            border-color: var(--gold);
        }

        /* CONTAINER */
        .container {
            max-width: 1480px;
            margin: 1.5rem auto;
            padding: 0 1rem;
            animation: fadeIn 0.4s ease;
        }
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .section-title {
            color: var(--gold-light);
            font-size: 1.4rem;
            font-weight: 700;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* GRID */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
            gap: 1.5rem;
        }

        /* GAME CARD */
        .game-card {
            background: var(--card);
            border-radius: 18px;
            border: 1px solid var(--border-subtle);
            padding: 20px 22px;
            transition: all 0.3s ease;
            position: relative;
            animation: cardFadeIn 0.5s ease forwards;
            opacity: 0;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .game-card:nth-child(1) {
            animation-delay: 0.03s;
        }
        .game-card:nth-child(2) {
            animation-delay: 0.06s;
        }
        .game-card:nth-child(3) {
            animation-delay: 0.09s;
        }
        .game-card:nth-child(4) {
            animation-delay: 0.12s;
        }
        .game-card:nth-child(5) {
            animation-delay: 0.15s;
        }
        .game-card:nth-child(6) {
            animation-delay: 0.18s;
        }
        .game-card:nth-child(7) {
            animation-delay: 0.21s;
        }
        .game-card:nth-child(8) {
            animation-delay: 0.24s;
        }
        @keyframes cardFadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .game-card:hover {
            transform: translateY(-5px);
            border-color: var(--gold);
            box-shadow: 0 14px 35px rgba(250, 204, 21, 0.12);
            background: var(--card-hover);
        }
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: #999;
            font-size: 0.85rem;
        }
        .card-header .liga-badge {
            background: rgba(250, 204, 21, 0.1);
            color: var(--gold-light);
            padding: 4px 10px;
            border-radius: 12px;
            font-weight: 500;
            font-size: 0.78rem;
        }
        .card-header .hora {
            color: #aaa;
            font-size: 0.82rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .partido {
            font-size: 1.2rem;
            font-weight: 700;
            line-height: 1.3;
            color: #fff;
        }
        .tipo-jugada {
            display: inline-block;
            background: var(--blue-bg);
            color: var(--blue);
            padding: 3px 10px;
            border-radius: 10px;
            font-size: 0.7rem;
            font-weight: 600;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }
        .pick-principal {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 10px;
            padding: 10px 14px;
            border-left: 3px solid var(--gold);
        }
        .pick-principal .pick-label {
            font-size: 0.7rem;
            color: #999;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .pick-principal .pick-value {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--blue);
        }
        .cuota-row {
            display: flex;
            gap: 12px;
            align-items: center;
            font-size: 0.9rem;
        }
        .cuota-tag {
            background: #222;
            padding: 4px 10px;
            border-radius: 8px;
            color: var(--gold-light);
            font-weight: 600;
        }
        .secundario-row {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #ccc;
            font-size: 0.88rem;
            padding-top: 4px;
        }
        .secundario-row .sec-label {
            color: #888;
            font-size: 0.7rem;
            text-transform: uppercase;
        }
        .pitcher-info {
            background: #1f222a;
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 0.82rem;
            color: #ddd;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .pitcher-info i {
            color: var(--gold);
        }
        .confianza-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 2px;
        }
        .confianza-badge {
            padding: 6px 16px;
            border-radius: 20px;
            font-weight: 700;
            font-size: 0.85rem;
        }
        .confianza-alta {
            background: var(--green-bg);
            color: var(--green);
        }
        .confianza-media {
            background: var(--yellow-bg);
            color: var(--gold-light);
        }
        .confianza-baja {
            background: var(--orange-bg);
            color: var(--orange);
        }
        .ev-badge {
            font-weight: 700;
            font-size: 0.85rem;
            color: var(--green);
            background: var(--green-bg);
            padding: 6px 14px;
            border-radius: 20px;
        }
        .ev-negativo {
            color: #f87171;
            background: rgba(248, 113, 113, 0.1);
        }

        /* TOOLTIP */
        .razonamiento-trigger {
            cursor: help;
            color: #888;
            font-size: 0.78rem;
            display: flex;
            align-items: center;
            gap: 4px;
            margin-top: 2px;
            position: relative;
            text-decoration: underline dotted;
            text-underline-offset: 3px;
        }
        .razonamiento-trigger:hover .tooltip-content {
            display: block;
        }
        .tooltip-content {
            display: none;
            position: absolute;
            bottom: calc(100% + 10px);
            left: 50%;
            transform: translateX(-50%);
            background: #1f222a;
            color: #ddd;
            padding: 12px 16px;
            border-radius: 10px;
            font-size: 0.78rem;
            line-height: 1.5;
            width: 300px;
            max-width: 90vw;
            z-index: 200;
            border: 1px solid var(--border-medium);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.6);
            text-decoration: none;
            font-style: normal;
            text-align: left;
        }
        .tooltip-content::after {
            content: '';
            position: absolute;
            top: 100%;
            left: 50%;
            transform: translateX(-50%);
            border: 8px solid transparent;
            border-top-color: #1f222a;
        }

        /* RESPONSIVE */
        @media (max-width: 768px) {
            .grid {
                grid-template-columns: 1fr;
                gap: 1.2rem;
            }
            .parlay-grid {
                grid-template-columns: 1fr;
            }
            .game-card {
                padding: 16px 18px;
            }
            .partido {
                font-size: 1.1rem;
            }
            .stats-bar {
                gap: 8px;
                padding: 0.8rem;
            }
            .stat-chip {
                font-size: 0.78rem;
                padding: 6px 12px;
            }
            .top-bar {
                padding: 1rem;
            }
            .logo {
                font-size: 1.6rem;
            }
            .main-tabs {
                padding: 0.6rem;
                gap: 4px;
                top: 72px;
            }
            .main-tab {
                padding: 8px 16px;
                font-size: 0.82rem;
            }
            .tooltip-content {
                width: 250px;
                left: auto;
                right: 0;
                transform: none;
            }
            .tooltip-content::after {
                left: auto;
                right: 20px;
            }
        }
        @media (max-width: 480px) {
            .grid {
                grid-template-columns: 1fr;
                gap: 1rem;
            }
            .parlay-grid {
                grid-template-columns: 1fr;
            }
            .game-card {
                padding: 14px 16px;
            }
            .parlay-card {
                padding: 16px;
            }
            .cuota-row {
                flex-wrap: wrap;
                gap: 6px;
            }
        }

        /* SCROLLBAR */
        ::-webkit-scrollbar {
            height: 4px;
            width: 4px;
        }
        ::-webkit-scrollbar-track {
            background: #111;
        }
        ::-webkit-scrollbar-thumb {
            background: #333;
            border-radius: 4px;
        }
    </style>
</head>

        // ==================== FUNCIONES ====================

        function getConfianzaClass(confianza) {
            if (confianza >= 77) return 'confianza-alta';
            if (confianza >= 73) return 'confianza-media';
            return 'confianza-baja';
        }

        function getEVClass(evStr) {
            const val = parseFloat(evStr.replace('+', '').replace('%', ''));
            return val >= 8 ? 'ev-badge' : 'ev-badge ev-negativo';
        }

        function createGameCardHTML(game) {
            const pitcherHTML = game.pitchers ?
                `<div class="pitcher-info"><i class="fas fa-baseball-ball"></i> ${game.pitchers}</div>` : '';
            const confianzaClass = getConfianzaClass(game.confianza);
            const evClass = getEVClass(game.ev_estimado);

            return `
        <div class="game-card">
            <div class="card-header">
                <span class="liga-badge">${game.liga}</span>
                <span class="hora"><i class="far fa-clock"></i> ${game.hora}</span>
            </div>
            <div class="partido">${game.partido}</div>
            <span class="tipo-jugada">${game.tipo_jugada}</span>

            <div class="pick-principal">
                <div class="pick-label">🎯 Pick Principal</div>
                <div class="pick-value">${game.principal}</div>
                <div class="cuota-row">
                    <span class="cuota-tag">Cuota: ${game.cuota_p}</span>
                </div>
            </div>

            <div class="secundario-row">
                <span class="sec-label">📊 Secundario:</span> ${game.secundario}
                <span class="cuota-tag">${game.cuota_s}</span>
            </div>

            ${pitcherHTML}

            <div class="confianza-row">
                <span class="confianza-badge ${confianzaClass}">Confianza: ${game.confianza}%</span>
                <span class="${evClass}">EV: ${game.ev_estimado}</span>
            </div>

            <div class="razonamiento-trigger">
                <i class="fas fa-lightbulb"></i> Ver razonamiento ThIA
                <span class="tooltip-content">${game.razonamiento}</span>
            </div>
        </div>`;
        }

        function createGridHTML(games) {
            let html = '<div class="grid">';
            games.forEach(game => {
                html += createGameCardHTML(game);
            });
            html += '</div>';
            return html;
        }

        function updateStatsBar(games) {
            const total = games.length;
            const avgConf = total > 0 ? Math.round(games.reduce((s, g) => s + g.confianza, 0) / total) : 0;
            const avgEV = total > 0 ? (games.reduce((s, g) => s + parseFloat(g.ev_estimado.replace('+', '')
                .replace('%', '')), 0) / total).toFixed(1) : 0;
            const highConf = games.filter(g => g.confianza >= 75).length;

            document.getElementById('total-picks').textContent = total;
            document.getElementById('avg-confianza').textContent = avgConf + '%';
            document.getElementById('avg-ev').textContent = '+' + avgEV + '%';
            document.getElementById('high-conf-count').textContent = highConf;
        }

        function generateParlays(games) {
            // Filtrar solo picks principales con cuota razonable
            const allPicks = games.map(g => ({
                ...g,
                cuota: g.cuota_p,
                pick: g.principal,
                ev: parseFloat(g.ev_estimado.replace('+', '').replace('%', ''))
            }));

            // Ordenar por confianza
            const sorted = [...allPicks].sort((a, b) => b.confianza - a.confianza);

            // Parlay Conservador: 3 picks de confianza >= 78
            const conservador = sorted.filter(g => g.confianza >= 78).slice(0, 3);

            // Parlay Balanceado: 4 picks de confianza >= 74, mezclando deportes
            const balanceado = sorted.filter(g => g.confianza >= 74).slice(0, 4);

            // Parlay Agresivo: 3 picks con EV >= 10 o cuota >= 2.0
            const agresivo = allPicks
                .filter(g => g.ev >= 9 || g.cuota >= 2.0)
                .sort((a, b) => b.ev - a.ev)
                .slice(0, 3);

            const parlays = [];

            if (conservador.length >= 3) {
                const cuotaTotal = conservador.reduce((p, g) => p * g.cuota, 1).toFixed(2);
                const confProm = Math.round(conservador.reduce((s, g) => s + g.confianza, 0) / conservador.length);
                const evTotal = conservador.reduce((s, g) => s + g.ev, 0).toFixed(1);
                parlays.push({
                    tipo: 'conservador',
                    nombre: 'Conservador',
                    icono: '🛡️',
                    descripcion: 'Alta seguridad, picks de élite',
                    picks: conservador,
                    cuotaTotal,
                    confProm,
                    evTotal: '+' + evTotal + '%',
                    legs: conservador.map(g => ({ pick: g.pick, partido: g.partido, cuota: g.cuota,
                        confianza: g.confianza }))
                });
            }

            if (balanceado.length >= 4) {
                const cuotaTotal = balanceado.reduce((p, g) => p * g.cuota, 1).toFixed(2);
                const confProm = Math.round(balanceado.reduce((s, g) => s + g.confianza, 0) / balanceado.length);
                const evTotal = balanceado.reduce((s, g) => s + g.ev, 0).toFixed(1);
                parlays.push({
                    tipo: 'balanceado',
                    nombre: 'Balanceado',
                    icono: '⚖️',
                    descripcion: 'Equilibrio riesgo-recompensa',
                    picks: balanceado,
                    cuotaTotal,
                    confProm,
                    evTotal: '+' + evTotal + '%',
                    legs: balanceado.map(g => ({ pick: g.pick, partido: g.partido, cuota: g.cuota,
                        confianza: g.confianza }))
                });
            }

            if (agresivo.length >= 3) {
                const cuotaTotal = agresivo.reduce((p, g) => p * g.cuota, 1).toFixed(2);
                const confProm = Math.round(agresivo.reduce((s, g) => s + g.confianza, 0) / agresivo.length);
                const evTotal = agresivo.reduce((s, g) => s + g.ev, 0).toFixed(1);
                parlays.push({
                    tipo: 'agresivo',
                    nombre: 'Agresivo',
                    icono: '🚀',
                    descripcion: 'Máximo EV, alto riesgo',
                    picks: agresivo,
                    cuotaTotal,
                    confProm,
                    evTotal: '+' + evTotal + '%',
                    legs: agresivo.map(g => ({ pick: g.pick, partido: g.partido, cuota: g.cuota,
                        confianza: g.confianza }))
                });
            }

            return parlays;
        }

        function renderParlays(games) {
            const parlays = generateParlays(games);
            const container = document.getElementById('parlay-grid');
            if (parlays.length === 0) {
                container.innerHTML =
                    '<p style="color:#888; grid-column:1/-1; text-align:center;">No hay suficientes picks para generar parlays en esta categoría.</p>';
                return;
            }
            let html = '';
            parlays.forEach(parlay => {
                html += `
            <div class="parlay-card ${parlay.tipo}">
                <span class="parlay-badge">${parlay.nombre}</span>
                <h3>${parlay.icono} Parlay ${parlay.nombre}</h3>
                <p class="parlay-subtitle">${parlay.descripcion} · ${parlay.legs.length} selecciones</p>
                <ul class="parlay-legs">
                    ${parlay.legs.map(leg => `
                        <li>
                            <span class="leg-icon">✅</span>
                            <span><strong>${leg.pick}</strong> — ${leg.partido}</span>
                            <span style="color:#facc15;margin-left:auto;font-weight:600;">${leg.cuota}</span>
                        </li>
                    `).join('')}
                </ul>
                <div class="parlay-metrics">
                    <div class="parlay-metric">
                        <span class="label">Cuota Total</span>
                        <span class="value cuota-total">${parlay.cuotaTotal}</span>
                    </div>
                    <div class="parlay-metric">
                        <span class="label">Confianza Prom.</span>
                        <span class="value">${parlay.confProm}%</span>
                    </div>
                    <div class="parlay-metric">
                        <span class="label">EV Estimado</span>
                        <span class="value ev-positive">${parlay.evTotal}</span>
                    </div>
                </div>
            </div>`;
            });
            container.innerHTML = html;
        }

                    '<p style="text-align:center; color:#aaa; padding:3rem;">No hay picks disponibles para este deporte en esta fecha.</p>';
                document.getElementById('subtabs-futbol').style.display = 'none';
                updateStatsBar([]);
                renderParlays([]);
                return;
            }

            if (sport === "futbol") {
                const ligas = {};
                games.forEach(game => {
                    if (!ligas[game.liga]) ligas[game.liga] = [];
                    ligas[game.liga].push(game);
                });

                let subHTML = '';
                Object.keys(ligas).forEach((liga, i) => {
                    subHTML +=
                        `<button class="sub-tab ${i === 0 ? 'active' : ''}" data-liga="${liga}">${liga}</button>`;
                });
                document.getElementById('subtabs-futbol').innerHTML = subHTML;
                document.getElementById('subtabs-futbol').style.display = 'flex';

                const firstLigaGames = Object.values(ligas)[0];
                html = createGridHTML(firstLigaGames);
                updateStatsBar(firstLigaGames);
                renderParlays(firstLigaGames);
            } else {
                document.getElementById('subtabs-futbol').style.display = 'none';
                html = `<div class="section-title">${getSportEmoji(sport)} ${sport.toUpperCase()} Picks • 30 Abril 2026</div>`;
                html += createGridHTML(games);
                updateStatsBar(games);
                renderParlays(games);
            }
            container.innerHTML = html;
        }

        function getSportEmoji(sport) {
            const map = { futbol: '⚽', mlb: '⚾', nba: '🏀', nhl: '🏒' };
            return map[sport] || '';
        }

        // Eventos Tabs Principales
        document.querySelectorAll('.main-tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.main-tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                const sport = tab.getAttribute('data-sport');
                document.getElementById('content').innerHTML =
                    '<p style="text-align:center;color:#aaa;padding:2rem;">Cargando picks...</p>';
                setTimeout(() => renderGames(sport), 100);
            });
        });

        // Eventos Sub-tabs de Fútbol
        document.addEventListener('click', (e) => {
            if (e.target.classList.contains('sub-tab')) {
                document.querySelectorAll('.sub-tab').forEach(t => t.classList.remove('active'));
                e.target.classList.add('active');

                const ligaName = e.target.getAttribute('data-liga');
                const ligaGames = picksData.futbol.filter(g => g.liga === ligaName);
                document.getElementById('content').innerHTML = createGridHTML(ligaGames);
                updateStatsBar(ligaGames);
                renderParlays(ligaGames);
            }
        });

        // Fecha actual
        const hoy = new Date();
        document.getElementById('fecha-hoy').innerHTML =
            `<i class="far fa-calendar-alt"></i> ${hoy.toLocaleDateString('es-ES', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' })}`;

        // Cargar por defecto
        document.addEventListener('DOMContentLoaded', () => {
            renderGames('futbol');
        });
    </script>

</body>
</html>
