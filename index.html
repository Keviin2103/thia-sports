    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(145deg, #0a0f1a 0%, #0c1222 100%);
            color: #eef2ff;
            min-height: 100vh;
            padding-bottom: 2rem;
        }
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 2rem;
            background: rgba(10, 15, 26, 0.9);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(250, 204, 21, 0.25);
            flex-wrap: wrap;
            gap: 1rem;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .logo {
            font-size: 1.8rem;
            font-weight: 800;
            background: linear-gradient(135deg, #f97316, #facc15);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .nav-links {
            display: flex;
            gap: 1.5rem;
            align-items: center;
            flex-wrap: wrap;
        }
        .nav-links a {
            color: #cbd5e6;
            text-decoration: none;
            font-weight: 500;
            transition: 0.2s;
            font-size: 0.9rem;
            cursor: pointer;
        }
        .nav-links a:hover, .nav-links a.active { color: #facc15; }
        .btn-outline {
            background: transparent;
            border: 1px solid #facc15;
            padding: 0.4rem 1rem;
            border-radius: 40px;
            color: #facc15;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            font-size: 0.85rem;
        }
        .btn-outline:hover { background: #facc15; color: #0f172a; }
        .user-greeting {
            font-size: 0.85rem;
            background: #1e293b;
            padding: 0.3rem 1rem;
            border-radius: 40px;
            display: flex;
            align-items: center;
            gap: 0.6rem;
        }
        .container { max-width: 1400px; margin: 1.5rem auto; padding: 0 1.5rem; }

        /* Tabs principales */
        .main-tabs {
            display: flex;
            gap: 0.5rem;
            background: rgba(17, 24, 39, 0.7);
            border-radius: 60px;
            padding: 0.3rem;
            margin-bottom: 1.5rem;
            width: fit-content;
            flex-wrap: wrap;
        }
        .main-tab {
            background: transparent;
            border: none;
            padding: 0.5rem 1.2rem;
            border-radius: 40px;
            color: #cbd5e6;
            font-weight: bold;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.2s;
        }
        .main-tab.active {
            background: linear-gradient(95deg, #f97316, #facc15);
            color: #0f172a;
        }

        /* Subpestañas de deportes */
        .sport-tabs {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
            background: rgba(17, 24, 39, 0.5);
            border-radius: 60px;
            padding: 0.3rem;
            margin-bottom: 1.5rem;
        }
        .sport-tab {
            background: transparent;
            border: none;
            padding: 0.4rem 1rem;
            border-radius: 40px;
            color: #cbd5e6;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
        }
        .sport-tab.active {
            background: linear-gradient(95deg, #f97316, #facc15);
            color: #0f172a;
        }

        /* Grid de juegos */
        .games-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
            gap: 1.5rem;
        }
        .game-card {
            background: rgba(18, 25, 45, 0.85);
            backdrop-filter: blur(4px);
            border-radius: 24px;
            border: 1px solid rgba(250, 204, 21, 0.2);
            overflow: hidden;
            transition: transform 0.2s;
        }
        .game-card:hover { transform: translateY(-3px); border-color: rgba(250,204,21,0.4); }
        .card-header {
            display: flex;
            justify-content: space-between;
            padding: 0.8rem 1rem;
            background: rgba(0,0,0,0.3);
            border-bottom: 1px solid rgba(255,255,255,0.05);
            font-size: 0.7rem;
        }
        .league-badge {
            background: #0f766e;
            padding: 0.2rem 0.6rem;
            border-radius: 20px;
            font-weight: bold;
        }
        .prob-bar {
            display: flex;
            height: 20px;
            border-radius: 999px;
            overflow: hidden;
            margin: 0.5rem 0;
        }
        .metrics-table {
            background: rgba(0,0,0,0.3);
            border-radius: 16px;
            padding: 0.5rem;
            margin: 0.5rem 0;
            font-size: 0.7rem;
        }
        .metric-row {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            text-align: center;
            padding: 0.2rem 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .pick-item {
            background: rgba(0,0,0,0.3);
            border-radius: 14px;
            padding: 0.5rem;
            margin-top: 0.5rem;
            border-left: 3px solid;
        }
        .pick-main { border-left-color: #facc15; }
        .pick-secondary { border-left-color: #3b82f6; }
        .pick-prop { border-left-color: #a855f7; }

        /* Resultados (más ordenados) */
        .results-container {
            background: rgba(0,0,0,0.2);
            border-radius: 24px;
            padding: 1rem;
        }
        .stats-summary {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            margin-bottom: 1.5rem;
        }
        .stat-card {
            background: rgba(0,0,0,0.4);
            border-radius: 20px;
            padding: 0.8rem 1.2rem;
            text-align: center;
            flex: 1;
            min-width: 110px;
        }
        .stat-value { font-size: 1.6rem; font-weight: 800; color: #facc15; }
        .results-table {
            width: 100%;
            border-collapse: collapse;
        }
        .results-table th, .results-table td {
            padding: 0.7rem;
            text-align: left;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .results-table th { color: #facc15; font-weight: 600; font-size: 0.8rem; }
        .results-table td { font-size: 0.75rem; }
        .result-hit { color: #22c55e; font-weight: bold; }
        .result-fail { color: #ef4444; font-weight: bold; }

        /* Parlays */
        .parlays-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 1.5rem;
            margin-top: 1rem;
        }
        .parlay-card {
            background: rgba(0,0,0,0.4);
            border-radius: 20px;
            padding: 1rem;
            border: 1px solid;
        }
        .parlay-gold { border-color: #eab308; }
        .parlay-green { border-color: #22c55e; }
        .parlay-orange { border-color: #f97316; }
        .parlay-purple { border-color: #a855f7; }

        .hidden { display: none; }
        .footer { text-align: center; font-size: 0.7rem; color: #5b6e8c; margin-top: 2rem; }
        @media (max-width: 640px) {
            .navbar { flex-direction: column; text-align: center; }
            .games-grid { grid-template-columns: 1fr; }
            .results-table th, .results-table td { padding: 0.4rem; }
        }
    </style>
</head>
<body>

    <script>

        function handleGoogleCredential(response) {
            const idToken = response.credential;

            const payload = JSON.parse(atob(idToken.split('.')[1]));
            currentUser = { email: payload.email, name: payload.name, isAdmin: false };

            updateUserUI();
            renderCurrentView(); // refrescar picks

        function initGoogleSignIn() {
            if (typeof google === 'undefined') { setTimeout(initGoogleSignIn, 500); return; }

                callback: handleGoogleCredential,
                auto_select: false

            google.accounts.id.renderButton(document.getElementById("googleBtnContainer"), { theme: "outline", size: "large" });
        }

            currentUser = null;
            localStorage.removeItem('thia_user');

        // Helper: renderizar barra de probabilidad
        function renderProbBar(ph, pd, pa) {
            const total = ph + pd + pa;
            return `<div class="prob-bar">
                <div style="width:${(ph/total)*100}%; background:#22c55e; display:flex; align-items:center; justify-content:center; font-size:0.6rem;">${ph}%</div>
                <div style="width:${(pd/total)*100}%; background:#facc15;"></div>
                <div style="width:${(pa/total)*100}%; background:#ef4444; display:flex; align-items:center; justify-content:center; font-size:0.6rem;">${pa}%</div>
            </div>`;
        }

        // Renderizar picks según deporte seleccionado
        let currentSport = "mlb";
        function renderGames() {
            const games = sportsData[currentSport] || [];
            const container = document.getElementById('gamesContainer');

            if (!games.length) {
                container.innerHTML = '<div style="text-align:center; padding:2rem;">No hay juegos disponibles para este deporte.</div>';
                return;
            }
            let html = '';
            games.forEach(g => {
                const starClass = g.star ? 'star' : '';
                html += `<div class="game-card ${starClass}">
                    <div class="card-header">
                        <span class="league-badge">${g.league}</span>
                        <span><i class="far fa-clock"></i> ${g.time}</span>
                    </div>
                    <div style="display:flex; align-items:center; justify-content:space-between; padding:0.8rem 1rem 0 1rem;">

            });
            container.innerHTML = html;
        }

        // Renderizar resultados
        function renderResults() {
            const stats = saturdayResults;
            const hitRate = Math.round((stats.hits / stats.totalPicks) * 100);
            document.getElementById('statsSummary').innerHTML = `
                <div class="stat-card"><div class="stat-value">${stats.hits}</div><div>HITS ✅</div></div>
                <div class="stat-card"><div class="stat-value">${stats.fails}</div><div>FAILS ❌</div></div>
                <div class="stat-card"><div class="stat-value">${stats.blocked}</div><div>BLOQUEADOS ✓</div></div>
                <div class="stat-card"><div class="stat-value">${hitRate}%</div><div>EFECTIVIDAD</div></div>
            `;
            const tbody = document.getElementById('resultsTableBody');
            tbody.innerHTML = '';
            stats.picksList.forEach(p => {
                const row = tbody.insertRow();
                row.insertCell(0).innerText = p.league;
                row.insertCell(1).innerText = p.match;
                row.insertCell(2).innerText = p.pick;
                row.insertCell(3).innerHTML = p.result === '✅' ? '<span class="result-hit">✅ HIT</span>' : '<span class="result-fail">❌ FAIL</span>';
                row.insertCell(4).innerText = p.note;
            });
            document.getElementById('leccionesList').innerHTML = lecciones.map(l => `<div>• ${l}</div>`).join('');
        }

        function renderParlays() {
            const container = document.getElementById('parlaysContainer');
            let html = '';
            parlays.forEach(p => {
                let colorClass = p.color === 'gold' ? 'parlay-gold' : (p.color === 'green' ? 'parlay-green' : (p.color === 'orange' ? 'parlay-orange' : 'parlay-purple'));
                html += `<div class="parlay-card ${colorClass}">
                    <div class="font-black text-center text-lg mb-2" style="color:${p.color==='gold'?'#eab308':p.color==='green'?'#22c55e':p.color==='orange'?'#f97316':'#a855f7'}">${p.name}</div>
                    <div class="bg-green-500 rounded-lg py-1.5 text-center text-black font-black text-xl mb-2">${p.odds}</div>
                    <div class="text-center text-gray-400 text-xs">Stake: ${p.stake} · Prob: ${p.prob}</div>
                    ${p.picks.map(pk => `<div class="bg-black/30 rounded px-2 py-1 my-1 text-sm">${pk}</div>`).join('')}
                    <p class="text-gray-400 text-xs mt-2">${p.desc}</p>
                </div>`;
            });
            container.innerHTML = html;
        }

        // Navegación entre pestañas principales
        let currentMain = 'picks';
        function renderCurrentView() {
            if (currentMain === 'picks') {
                document.getElementById('picksSection').classList.remove('hidden');
                document.getElementById('resultsSection').classList.add('hidden');
                document.getElementById('parlaysSection').classList.add('hidden');
                renderGames();
            } else if (currentMain === 'resultados') {
                document.getElementById('picksSection').classList.add('hidden');
                document.getElementById('resultsSection').classList.remove('hidden');
                document.getElementById('parlaysSection').classList.add('hidden');
                renderResults();
            } else if (currentMain === 'parlays') {
                document.getElementById('picksSection').classList.add('hidden');
                document.getElementById('resultsSection').classList.add('hidden');
                document.getElementById('parlaysSection').classList.remove('hidden');
                renderParlays();
            }
        }

        // Inicializar pestañas de deportes
        function initSportTabs() {
            const container = document.getElementById('sportTabs');
            const sports = ['mlb', 'nba', 'nhl', 'soccer'];
            const sportNames = { mlb: '⚾ MLB', nba: '🏀 NBA', nhl: '🏒 NHL', soccer: '⚽ Fútbol' };
            container.innerHTML = sports.map(s => `<button class="sport-tab ${s === currentSport ? 'active' : ''}" data-sport="${s}">${sportNames[s]}</button>`).join('');
            document.querySelectorAll('.sport-tab').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.sport-tab').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    currentSport = btn.getAttribute('data-sport');
                    if (currentMain === 'picks') renderGames();
                });
            });
        }

        // Eventos principales
        document.getElementById('homeLink')?.addEventListener('click', () => { currentMain = 'picks'; document.querySelector('.main-tab[data-main="picks"]').click(); renderCurrentView(); });
        document.getElementById('resultsLink')?.addEventListener('click', () => { currentMain = 'resultados'; document.querySelector('.main-tab[data-main="resultados"]').click(); renderCurrentView(); });
        document.getElementById('parlaysLink')?.addEventListener('click', () => { currentMain = 'parlays'; document.querySelector('.main-tab[data-main="parlays"]').click(); renderCurrentView(); });
        document.querySelectorAll('.main-tab').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.main-tab').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentMain = btn.getAttribute('data-main');
                renderCurrentView();
            });
        });

        // Cargar usuario guardado
        const savedUser = localStorage.getItem('thia_user');
        if (savedUser) {
            try { currentUser = JSON.parse(savedUser); } catch(e) {}
            updateUserUI();
        }
        initSportTabs();
        renderCurrentView();
    </script>
</body>
</html>
