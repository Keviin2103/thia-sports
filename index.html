                currentUser = { email };
                localStorage.setItem('thia_user', JSON.stringify(currentUser));
                updateUserUI(); renderCurrentView(); closeModal();
            });
            initGoogleSignIn();
        }
        modal.style.display = 'flex';

    // Parlays
    const parlays = [
        { name:"PARLAY SEGURO", color:"green", picks:["Lyon X2 (1.80)","Porto Over 2.5 (1.55)","Cruz Azul 1X (1.65)","América X2 (1.88)"], odds:"~8.66", stake:"2%", prob:"35%", desc:"Núcleo sólido Europa + México." },
        { name:"PARLAY MILLONARIO", color:"purple", picks:["Lyon X2","Over Pisa-Torino","Porto Over","BTTS Monaco","Cruz Azul 1X","América X2"], odds:"~19.8", stake:"0.5%", prob:"13%", desc:"6 picks, alta varianza." },
        { name:"PARLAY MIXTO (RECOMENDADO)", color:"orange", picks:["Over Pisa-Torino (1.80)","Under Inter-Roma (1.85)","BTTS Monaco (1.72)","Cruz Azul 1X (1.65)","América X2 (1.88)"], odds:"~15.7", stake:"1%", prob:"27%", desc:"Equilibrio perfecto." }
    ];

    let currentSport = "mlb";
    let currentLeague = "La Liga";
    let currentMain = "picks";

    function renderProbBar(ph, pd, pa) {
        const total = ph + pd + pa;
        if (total === 0) return '<div class="prob-bar"></div>';
        return `<div class="prob-bar"><div style="width:${(ph/total)*100}%; background:#22c55e; display:flex; align-items:center; justify-content:center; font-size:0.6rem;">${ph}%</div><div style="width:${(pd/total)*100}%; background:#facc15;"></div><div style="width:${(pa/total)*100}%; background:#ef4444; display:flex; align-items:center; justify-content:center; font-size:0.6rem;">${pa}%</div></div>`;
    }

    function renderGames() {
        let games = [];
        let showLeagueTabs = false;
        if (currentSport === "mlb") games = mlbGames;
        else if (currentSport === "nba") games = nbaGames;
        else if (currentSport === "nhl") games = nhlGames;
        else {
            games = soccerByLeague[currentLeague] || [];
            showLeagueTabs = true;
        }
        const container = document.getElementById('gamesContainer');
        const acceso = currentUser !== null;
        if (!games.length) { container.innerHTML = '<div style="text-align:center; padding:2rem;">No hay juegos disponibles.</div>'; return; }
        let html = '';
        games.forEach(g => {
            const starClass = g.star ? 'star' : '';
            const prob_d = g.prob_d || 5;
            html += `<div class="game-card ${starClass}">
                <div class="card-header"><span class="league-badge">${currentSport === 'soccer' ? currentLeague : currentSport.toUpperCase()}</span><span><i class="far fa-clock"></i> ${g.time} VEN</span></div>
                <div style="display:flex; align-items:center; justify-content:space-between; padding:0.8rem 1rem 0 1rem;">
                    <div style="text-align:center; flex:1;"><strong style="font-size:1.1rem;">${g.away}</strong><div style="font-size:0.65rem; color:#9ca3af;">${g.prob_a}%</div></div>
                    <span style="background:#facc15; width:36px; height:36px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-weight:bold; color:#000;">VS</span>
                    <div style="text-align:center; flex:1;"><strong style="font-size:1.1rem;">${g.home}</strong><div style="font-size:0.65rem; color:#22c55e;">${g.prob_h}%</div></div>
                </div>
                ${renderProbBar(g.prob_h, prob_d, g.prob_a)}
                <div class="metrics-table"><div class="metric-row"><div>${g.away}</div><div>PROB</div><div>${g.home}</div></div><div class="metric-row"><div>${g.prob_a}%</div><div>Victoria</div><div>${g.prob_h}%</div></div></div>
                <div class="premium-block">${!acceso ? `<div style="background:#1e293b; padding:0.8rem; text-align:center; border-radius:12px;"><i class="fas fa-lock"></i> Inicia sesión para ver los picks</div>` : `<div class="pick-item pick-main"><strong>🎯 JUGADA PRINCIPAL:</strong> ${g.pick_main}</div>${g.pick_sec ? `<div class="pick-item pick-secondary"><strong>🔄 JUGADA SECUNDARIA:</strong> ${g.pick_sec}</div>` : ''}`}</div>
            </div>`;
        });
        container.innerHTML = html;
        if (showLeagueTabs) renderLeagueTabs();
    }

    function renderLeagueTabs() {
        const container = document.getElementById('leagueTabsContainer');
        const leagues = Object.keys(soccerByLeague);
        if (leagues.length === 0) { container.innerHTML = ''; return; }
        container.innerHTML = `<div class="league-tabs">${leagues.map(l => `<button class="league-tab ${l === currentLeague ? 'active' : ''}" data-league="${l}">${l}</button>`).join('')}</div>`;
        document.querySelectorAll('.league-tab').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.league-tab').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentLeague = btn.getAttribute('data-league');
                renderGames();
            });
        });
    }

    function renderResults() {
        const stats = saturdayResults;
        const hitRate = Math.round((stats.hits / stats.totalPicks) * 100);
        document.getElementById('statsSummary').innerHTML = `<div class="stat-card"><div class="stat-value">${stats.hits}</div><div>HITS</div></div><div class="stat-card"><div class="stat-value">${stats.fails}</div><div>FAILS</div></div><div class="stat-card"><div class="stat-value">${stats.blocked}</div><div>BLOQ</div></div><div class="stat-card"><div class="stat-value">${hitRate}%</div><div>EFECT.</div></div>`;
        const tbody = document.getElementById('resultsTableBody');
        tbody.innerHTML = '';
        stats.picksList.forEach(p => {
            const row = tbody.insertRow();
            row.insertCell(0).innerText = p.league;
            row.insertCell(1).innerText = p.match;
            row.insertCell(2).innerText = p.pick;
            row.insertCell(3).innerHTML = p.result === '✅' ? '<span class="result-hit">✅ HIT</span>' : '<span class="result-fail">❌ FAIL</span>';
            row.insertCell(4).innerText = p.note;
        });
        document.getElementById('leccionesList').innerHTML = lecciones.map(l => `<div>• ${l}</div>`).join('');
    }

    function renderParlays() {
        const container = document.getElementById('parlaysContainer');
        let html = '';
        parlays.forEach(p => {
            let colorClass = p.color === 'gold' ? 'parlay-gold' : (p.color === 'green' ? 'parlay-green' : (p.color === 'orange' ? 'parlay-orange' : 'parlay-purple'));
            html += `<div class="parlay-card ${colorClass}"><div class="font-black text-center text-lg mb-2" style="color:${p.color==='gold'?'#eab308':p.color==='green'?'#22c55e':p.color==='orange'?'#f97316':'#a855f7'}">${p.name}</div>
            <div class="bg-green-500 rounded-lg py-1.5 text-center text-black font-black text-xl mb-2">${p.odds}</div>
            <div class="text-center text-gray-400 text-xs">Stake: ${p.stake} · Prob: ${p.prob}</div>${p.picks.map(pk => `<div class="bg-black/30 rounded px-2 py-1 my-1 text-sm">${pk}</div>`).join('')}<p class="text-gray-400 text-xs mt-2">${p.desc}</p></div>`;
        });
        container.innerHTML = html;
    }

    function renderCurrentView() {
        if (currentMain === 'picks') {
            document.getElementById('picksSection').classList.remove('hidden');
            document.getElementById('resultsSection').classList.add('hidden');
            document.getElementById('parlaysSection').classList.add('hidden');
            renderGames();
        } else if (currentMain === 'resultados') {
            document.getElementById('picksSection').classList.add('hidden');
            document.getElementById('resultsSection').classList.remove('hidden');
            document.getElementById('parlaysSection').classList.add('hidden');
            renderResults();
        } else {
            document.getElementById('picksSection').classList.add('hidden');
            document.getElementById('resultsSection').classList.add('hidden');
            document.getElementById('parlaysSection').classList.remove('hidden');
            renderParlays();
        }
    }

    function initSportTabs() {
        const container = document.getElementById('sportTabs');
        const sports = ['mlb', 'nba', 'nhl', 'soccer'];
        const sportNames = { mlb:'⚾ MLB', nba:'🏀 NBA', nhl:'🏒 NHL', soccer:'⚽ Fútbol' };
        container.innerHTML = sports.map(s => `<button class="sport-tab ${s === currentSport ? 'active' : ''}" data-sport="${s}">${sportNames[s]}</button>`).join('');
        document.querySelectorAll('.sport-tab').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.sport-tab').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentSport = btn.getAttribute('data-sport');
                if (currentSport === 'soccer') currentLeague = "La Liga";
                renderGames();
            });
        });
    }

    document.getElementById('homeLink')?.addEventListener('click', () => { currentMain = 'picks'; document.querySelector('.main-tab[data-main="picks"]').click(); renderCurrentView(); });
    document.getElementById('resultsLink')?.addEventListener('click', () => { currentMain = 'resultados'; document.querySelector('.main-tab[data-main="resultados"]').click(); renderCurrentView(); });
    document.getElementById('parlaysLink')?.addEventListener('click', () => { currentMain = 'parlays'; document.querySelector('.main-tab[data-main="parlays"]').click(); renderCurrentView(); });
    document.querySelectorAll('.main-tab').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.main-tab').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentMain = btn.getAttribute('data-main');
            renderCurrentView();
        });
    });

    const savedUser = localStorage.getItem('thia_user');
    if (savedUser) { try { currentUser = JSON.parse(savedUser); } catch(e) {} }
    updateUserUI();
    initSportTabs();
    renderCurrentView();
</script>
</body>
</html>
