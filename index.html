        :root {

            --dark: #0a0c10;
            --card: #1a1c23;

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--dark);
            color: #fff;
            min-height: 100vh;
        }
        .top-bar {
            background: #11131a;
            border-bottom: 4px solid var(--gold);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo { font-size: 2.2rem; font-weight: 800; letter-spacing: -1px; }
        .logo span:first-child { color: var(--gold); }
        .date { color: #ccc; font-size: 1.05rem; }

        .main-tabs {
            display: flex;
            background: #15171c;
            padding: 1rem;
            gap: 12px;
            overflow-x: auto;
            border-bottom: 1px solid #333;
        }
        .main-tab {
            padding: 12px 26px;
            border-radius: 50px;
            background: #1f222a;
            border: none;
            color: #aaa;
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
        }
        .main-tab.active {
            background: var(--gold);
            color: #000;
        }

        .sub-tabs {
            display: flex;
            background: #1a1c23;
            padding: 1rem 1.5rem;
            gap: 10px;
            flex-wrap: wrap;
        }
        .sub-tab {
            padding: 10px 18px;
            border-radius: 30px;
            background: #2a2d35;
            border: none;
            color: #ccc;
            cursor: pointer;
            font-size: 0.95rem;
        }
        .sub-tab.active {
            background: var(--gold);
            color: #000;
        }

        .container {
            max-width: 1450px;
            margin: 2rem auto;
            padding: 0 1.5rem;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
            gap: 1.8rem;
        }
        .game-card {
            background: var(--card);
            border-radius: 20px;
            border: 1px solid rgba(250, 204, 21, 0.3);
            padding: 20px;
            transition: all 0.25s ease;
        }
        .game-card:hover {
            transform: translateY(-6px);
            border-color: var(--gold);
            box-shadow: 0 10px 25px rgba(250,204,21,0.15);
        }
        .header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 14px;
            color: var(--gold);
            font-size: 0.95rem;
        }
        .partido {
            font-size: 1.28rem;
            font-weight: 700;
            margin: 10px 0 16px;
            line-height: 1.3;
        }
        .principal {
            color: #67e8f9;
            font-size: 1.18rem;
            font-weight: 700;
            margin-bottom: 6px;
        }
        .cuota { color: var(--gold); font-weight: 600; }
        .secundario {
            margin-top: 14px;
            color: #ddd;
            border-top: 1px solid #333;
            padding-top: 14px;
        }
        .pitcher {
            margin-top: 14px;
            color: #facc15;
            background: #222;
            padding: 10px 14px;
            border-radius: 10px;
            font-size: 0.96rem;
        }
        .confidence {
            background: rgba(250,204,21,0.2);
            color: var(--gold);
            padding: 6px 16px;
            border-radius: 30px;
            display: inline-block;
            margin-top: 14px;
            font-size: 0.92rem;
        }
    </style>
</head>

// ==================== FUNCIONES ====================
function renderGames(sport) {
    const container = document.getElementById('content');
    let html = '';

    if (sport === "futbol") {
        // Agrupar por liga
        const ligas = {};
        picksData.futbol.forEach(game => {
            if (!ligas[game.liga]) ligas[game.liga] = [];
            ligas[game.liga].push(game);
        });

        // Crear sub-tabs
        let subHTML = '';
        Object.keys(ligas).forEach((liga, i) => {
            subHTML += `<button class="sub-tab ${i === 0 ? 'active' : ''}" data-liga="${liga}">${liga}</button>`;
        });
        document.getElementById('subtabs-futbol').innerHTML = subHTML;
        document.getElementById('subtabs-futbol').style.display = 'flex';

        // Mostrar primera liga
        html = createLigaHTML(Object.values(ligas)[0]);
    } else {
        document.getElementById('subtabs-futbol').style.display = 'none';
        const games = picksData[sport] || [];
        html = `<h2 style="color:#facc15; margin-bottom:25px;">${sport.toUpperCase()} Picks - 30 Abril 2026</h2>`;
        html += createGridHTML(games);
    }

    container.innerHTML = html;
}

function createLigaHTML(games) {
    return `<h2 style="color:#facc15; margin-bottom:20px;">${games[0].liga}</h2>` + createGridHTML(games);
}

function createGridHTML(games) {
    let html = '<div class="grid">';
    games.forEach(game => {
        const pitcherHTML = game.pitchers ? `<div class="pitcher">🧢 ${game.pitchers}</div>` : '';
        html += `
        <div class="game-card">
            <div class="header">
                <span>${game.liga}</span>
                <span>${game.hora}</span>
            </div>
            <div class="partido">${game.partido}</div>
            <div class="principal">🎯 ${game.principal}</div>
            <div><span class="cuota">Cuota: ${game.cuota_p}</span></div>
            <div class="secundario">
                📊 Secundario: ${game.secundario} <span class="cuota">(${game.cuota_s})</span>
            </div>
            ${pitcherHTML}
            <div class="confidence">Confianza ThIA: ${game.confianza}%</div>
        </div>`;
    });
    html += '</div>';
    return html;
}

// Eventos Tabs Principales
document.querySelectorAll('.main-tab').forEach(tab => {
    tab.addEventListener('click', () => {
        document.querySelectorAll('.main-tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        renderGames(tab.getAttribute('data-sport'));
    });
});

// Eventos Sub-tabs (Fútbol)
document.addEventListener('click', (e) => {
    if (e.target.classList.contains('sub-tab')) {
        document.querySelectorAll('.sub-tab').forEach(t => t.classList.remove('active'));
        e.target.classList.add('active');
        
        const ligaName = e.target.getAttribute('data-liga');
        const ligaGames = picksData.futbol.filter(g => g.liga === ligaName);
        document.getElementById('content').innerHTML = createLigaHTML(ligaGames);
    }
});
