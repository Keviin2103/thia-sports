<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ThIA Sports | Picks 30 Abril 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root { --gold: #facc15; --dark: #0a0c10; --card: #1a1c23; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--dark);
            color: #fff;
            min-height: 100vh;
        }
        .top-bar {
            background: #11131a;
            border-bottom: 5px solid var(--gold);
            padding: 1.2rem 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo { font-size: 2.2rem; font-weight: 800; }
        .logo span:first-child { color: var(--gold); }
        .date { color: #ddd; }

        .main-tabs, .sub-tabs {
            display: flex;
            background: #15171c;
            padding: 1rem;
            gap: 10px;
            overflow-x: auto;
            flex-wrap: wrap;
        }
        .main-tab, .sub-tab {
            padding: 12px 22px;
            border-radius: 50px;
            background: #1f222a;
            border: none;
            color: #ccc;
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
        }
        .main-tab.active, .sub-tab.active {
            background: var(--gold);
            color: #000;
        }

        .container {
            max-width: 1450px;
            margin: 2rem auto;
            padding: 0 1rem;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
            gap: 1.6rem;
        }
        .game-card {
            background: var(--card);
            border-radius: 20px;
            border: 1px solid rgba(250,204,21,0.35);
            padding: 20px;
            transition: all 0.3s;
        }
        .game-card:hover {
            transform: translateY(-6px);
            border-color: var(--gold);
        }
        .header {
            display: flex;
            justify-content: space-between;
            color: var(--gold);
            margin-bottom: 12px;
        }
        .partido {
            font-size: 1.25rem;
            font-weight: 700;
            margin: 12px 0 16px;
        }
        .principal { color: #67e8f9; font-size: 1.18rem; font-weight: 700; }
        .cuota { color: var(--gold); font-weight: 600; }
        .secundario {
            margin-top: 14px;
            color: #ddd;
            border-top: 1px solid #444;
            padding-top: 14px;
        }
        .pitcher {
            margin-top: 14px;
            background: #222;
            padding: 10px 14px;
            border-radius: 10px;
            color: #facc15;
        }
        .confidence {
            background: rgba(250,204,21,0.2);
            color: var(--gold);
            padding: 6px 16px;
            border-radius: 30px;
            display: inline-block;
            margin-top: 14px;
        }
        @media (max-width: 480px) {
            .grid { grid-template-columns: 1fr; gap: 1.3rem; }
        }
    </style>
</head>
<body>

<div class="top-bar">
    <div class="logo"><span>ThIA</span> Sports</div>
    <div class="date" id="fecha-hoy"></div>
</div>

<div class="main-tabs">
    <button class="main-tab active" data-sport="futbol">⚽ Fútbol</button>
    <button class="main-tab" data-sport="mlb">⚾ MLB</button>
    <button class="main-tab" data-sport="nba">🏀 NBA</button>
    <button class="main-tab" data-sport="nhl">🏒 NHL</button>
</div>

<div class="container">
    <div id="subtabs-futbol" class="sub-tabs"></div>
    <div id="content"></div>
</div>

<script>
// ==================== DATOS COMPLETOS ====================

  futbol: [

    {"liga":"Copa Libertadores","partido":"Corinthians vs Peñarol","hora":"21:00","principal":"Corinthians ML","cuota_p":1.65,"secundario":"Under 2.5 Goles","cuota_s":1.72,"confianza":78,"pitchers":""},
    {"liga":"Copa Libertadores","partido":"Independiente Medellín vs Cusco FC","hora":"23:00","principal":"Independiente Medellín ML","cuota_p":1.70,"secundario":"Under 2.5 Goles","cuota_s":1.85,"confianza":75,"pitchers":""},
    {"liga":"Premier League","partido":"Leeds United vs Burnley","hora":"15:00","principal":"Leeds United ML","cuota_p":1.68,"secundario":"Under 2.5 Goles","cuota_s":1.82,"confianza":76,"pitchers":""},
    {"liga":"La Liga","partido":"Girona vs Mallorca","hora":"16:00","principal":"Under 2.5 Goles","cuota_p":1.75,"secundario":"Mallorca +0.5 Asian Handicap","cuota_s":1.65,"confianza":74,"pitchers":""},
    {"liga":"Serie A","partido":"Pisa vs Lecce","hora":"15:45","principal":"Under 2.5 Goles","cuota_p":1.70,"secundario":"Lecce Empate No Apuesta","cuota_s":1.68,"confianza":73,"pitchers":""}
  ],
  mlb: [
    {"liga":"MLB","partido":"New York Yankees vs Baltimore Orioles","hora":"19:05","principal":"New York Yankees ML","cuota_p":1.74,"secundario":"Under 8.5 Runs","cuota_s":1.82,"confianza":79,"pitchers":"Will Warren vs Cade Povich"},
    {"liga":"MLB","partido":"Colorado Rockies vs Atlanta Braves","hora":"20:40","principal":"Over 10.5 Runs","cuota_p":1.85,"secundario":"Atlanta Braves ML","cuota_s":1.55,"confianza":80,"pitchers":"Grant Holmes vs José Quintana"},
    {"liga":"MLB","partido":"Los Angeles Angels vs New York Mets","hora":"21:38","principal":"Over 8.5 Runs","cuota_p":1.83,"secundario":"New York Mets ML","cuota_s":1.60,"confianza":76,"pitchers":"Walbert Urena vs Christian Scott"},
    {"liga":"MLB","partido":"Milwaukee Brewers vs Washington Nationals","hora":"18:45","principal":"Milwaukee Brewers ML","cuota_p":1.72,"secundario":"Under 8.5 Runs","cuota_s":1.88,"confianza":74,"pitchers":"Jacob Misiorowski vs Jake Irvin"},
    {"liga":"MLB","partido":"St. Louis Cardinals vs Los Angeles Dodgers","hora":"20:15","principal":"Los Angeles Dodgers ML","cuota_p":1.78,"secundario":"Under 8.5 Runs","cuota_s":1.90,"confianza":73,"pitchers":"Matthew Liberatore vs Emmet Sheehan"},
    {"liga":"MLB","partido":"Pittsburgh Pirates vs Cincinnati Reds","hora":"18:45","principal":"Pittsburgh Pirates ML","cuota_p":1.68,"secundario":"Under 7.5 Runs","cuota_s":1.90,"confianza":85,"pitchers":"Mitch Keller vs Brady Singer"},
    {"liga":"MLB","partido":"Philadelphia Phillies vs Miami Marlins","hora":"19:10","principal":"Philadelphia Phillies -1.5 Run Line","cuota_p":2.46,"secundario":"Under 7.5 Runs","cuota_s":1.85,"confianza":78,"pitchers":"Zack Wheeler vs Eury Pérez"}
  ],
  nba: [
    {"liga":"NBA Playoffs 2026 – Game 6","partido":"Orlando Magic vs Detroit Pistons","hora":"19:00","principal":"Under 209.5 Puntos","cuota_p":1.91,"secundario":"Detroit Pistons -3.5","cuota_s":1.91,"confianza":78,"pitchers":""},
    {"liga":"NBA Playoffs 2026 – Game 6","partido":"Los Angeles Lakers vs Houston Rockets","hora":"21:30","principal":"Houston Rockets ML","cuota_p":1.70,"secundario":"Under 212.5 Puntos","cuota_s":1.85,"confianza":80,"pitchers":""}
  ],
  nhl: [
    {"liga":"NHL Playoffs 2026 – Game 6","partido":"Tampa Bay Lightning vs Montreal Canadiens","hora":"19:00","principal":"Under 5.5 Goles","cuota_p":1.90,"secundario":"Montreal Canadiens ML","cuota_s":1.95,"confianza":82,"pitchers":""},
    {"liga":"NHL Playoffs 2026 – Game 6","partido":"Utah Mammoth vs Vegas Golden Knights","hora":"22:00","principal":"Under 5.5 Goles","cuota_p":1.91,"secundario":"Vegas Golden Knights ML","cuota_s":1.87,"confianza":80,"pitchers":""}
  ]
};

// ==================== RENDERIZACIÓN ====================
function renderGames(sport) {
    const container = document.getElementById('content');
    let html = '';

    if (sport === "futbol") {
        const ligas = {};
        picksData.futbol.forEach(g => {
            if (!ligas[g.liga]) ligas[g.liga] = [];
            ligas[g.liga].push(g);
        });

        let subHTML = '';
        Object.keys(ligas).forEach((liga, i) => {
            subHTML += `<button class="sub-tab ${i===0?'active':''}" data-liga="${liga}">${liga}</button>`;
        });
        document.getElementById('subtabs-futbol').innerHTML = subHTML;
        document.getElementById('subtabs-futbol').style.display = 'flex';

        html = createGridHTML(Object.values(ligas)[0]);
    } else {
        document.getElementById('subtabs-futbol').style.display = 'none';
        html = `<h2 style="color:#facc15; margin-bottom:25px;">${sport.toUpperCase()} Picks • 30 Abril 2026</h2>`;
        html += createGridHTML(picksData[sport]);
    }
    container.innerHTML = html;
}

function createGridHTML(games) {
    let html = '<div class="grid">';
    games.forEach(game => {
        const pitcherHTML = game.pitchers ? `<div class="pitcher">🧢 ${game.pitchers}</div>` : '';
        html += `
        <div class="game-card">
            <div class="header">
                <span>${game.liga}</span>
                <span>${game.hora}</span>
            </div>
            <div class="partido">${game.partido}</div>
            <div class="principal">🎯 ${game.principal}</div>
            <div><span class="cuota">Cuota: ${game.cuota_p}</span></div>
            <div class="secundario">
                📊 Secundario: ${game.secundario} <span class="cuota">(${game.cuota_s})</span>
            </div>
            ${pitcherHTML}
            <div class="confidence">Confianza: ${game.confianza}%</div>
        </div>`;
    });
    html += '</div>';
    return html;
}

// Eventos
document.querySelectorAll('.main-tab').forEach(tab => {
    tab.addEventListener('click', () => {
        document.querySelectorAll('.main-tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        renderGames(tab.getAttribute('data-sport'));
    });
});

document.addEventListener('click', e => {
    if (e.target.classList.contains('sub-tab')) {
        document.querySelectorAll('.sub-tab').forEach(t => t.classList.remove('active'));
        e.target.classList.add('active');
        const liga = e.target.getAttribute('data-liga');
        const games = picksData.futbol.filter(g => g.liga === liga);
        document.getElementById('content').innerHTML = createGridHTML(games);
    }
});

// Fecha
document.getElementById('fecha-hoy').innerHTML = new Date().toLocaleDateString('es-ES', {
    weekday:'long', day:'numeric', month:'long', year:'numeric'
});

renderGames('futbol');
</script>
</body>
</html>
