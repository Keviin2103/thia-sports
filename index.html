<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>ThIA Sports - MLB Hoy</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(145deg, #0b1120 0%, #111827 100%);
            color: #eef2ff;
            padding: 1rem;
        }
        .logo {
            font-size: 1.8rem;
            font-weight: bold;
            text-align: center;
            background: linear-gradient(135deg, #f97316, #facc15);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin: 1rem 0;
        }
        .game-card {
            background: rgba(18, 25, 45, 0.9);
            border-radius: 24px;
            border: 1px solid rgba(250, 204, 21, 0.3);
            margin-bottom: 1rem;
            padding: 1rem;
        }
        .teams {
            display: flex;
            justify-content: space-between;
            align-items: center;
            text-align: center;
            gap: 0.5rem;
        }
        .team-name {
            font-weight: bold;
            font-size: 1.2rem;
        }
        .vs {
            background: #facc15;
            color: #0f172a;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }
        .game-info {
            display: flex;
            justify-content: space-between;
            margin-top: 0.5rem;
            font-size: 0.8rem;
            color: #9ca3af;
        }
        .prediction {
            background: #0f172a;
            border-left: 4px solid #10b981;
            border-radius: 16px;
            padding: 0.8rem;
            margin-top: 0.8rem;
        }
        .footer {
            text-align: center;
            font-size: 0.7rem;
            color: #5b6e8c;
            margin-top: 2rem;
        }
        @media (max-width: 640px) {
            .teams { flex-direction: column; gap: 0.3rem; }
            .vs { margin: 0 auto; }
        }
    </style>
</head>
