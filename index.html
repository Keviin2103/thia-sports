<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>ThIA Sports | ESPN Style | Picks y Resultados en Vivo</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        /* (estilos ya conocidos, no los repito por espacio, pero debes mantener los que tienes) */
    </style>
</head>
<body class="sport-futbol">
<div class="top-bar">
    <div class="logo"><span>ThIA</span><span> Sports</span></div>
    <div class="date-badge" id="dateBadge"><i class="far fa-calendar-alt"></i> Cargando...</div>
    <div class="user-area" id="authArea"><button id="showAuthBtn"><i class="fas fa-lock"></i> Acceder</button></div>
</div>
<div class="nav-tabs">
    <button class="nav-tab active" data-main="picks"><i class="fas fa-chart-line"></i> PICKS HOY</button>
    <button class="nav-tab" data-main="resultados"><i class="fas fa-trophy"></i> RESULTADOS</button>
    <button class="nav-tab" data-main="parlays"><i class="fas fa-layer-group"></i> PARLAYS</button>
</div>
<div class="container">
    <div id="picksSection">
        <div class="sport-filters" id="sportFilters"></div>
        <div id="gamesContainer"></div>
    </div>
    <div id="resultsSection" class="hidden">
        <div class="stats-row" id="statsSummary"></div>
        <h3 style="color:#facc15; margin-bottom:1rem;">📋 Resultados en vivo</h3>
        <div style="overflow-x: auto;"><table class="results-table"><thead><tr><th>Partido</th><th>Estado</th><th>Marcador</th></tr></thead><tbody id="resultsTableBody"><tr><td colspan="3">Cargando...</td></tr></tbody></table></div>
        <div style="margin-top: 2rem; background: rgba(250,204,21,0.1); border-radius: 20px; padding: 1rem;"><h4><i class="fas fa-brain"></i> Mejoras ThIA-SA v6.3</h4><div id="leccionesList" style="font-size:0.75rem; color:#ccc;"></div></div>
    </div>
    <div id="parlaysSection" class="hidden"><div id="parlaysContainer" class="parlays-grid"></div></div>
</div>
<footer>ThIA Sports · Sistema ThIA-SA v6.3 · Picks y resultados actualizados automáticamente</footer>

<script src="data.js"></script>
<script>
    // ========== FUNCIONES DE LOGOS Y RENDERIZADO ==========
    function getTeamLogo(teamName, sport) {
        const logos = {
            "Orioles": "https://a.espncdn.com/combiner/i?img=/i/teamlogos/mlb/500/bal.png",
            "Red Sox": "https://a.espncdn.com/combiner/i?img=/i/teamlogos/mlb/500/bos.png",
            "Braves": "https://a.espncdn.com/combiner/i?img=/i/teamlogos/mlb/500/atl.png",
            "Phillies": "https://a.espncdn.com/combiner/i?img=/i/teamlogos/mlb/500/phi.png",
            "Blue Jays": "https://a.espncdn.com/combiner/i?img=/i/teamlogos/mlb/500/tor.png",
            "Guardians": "https://a.espncdn.com/combiner/i?img=/i/teamlogos/mlb/500/cle.png",
            "Mets": "https://a.espncdn.com/combiner/i?img=/i/teamlogos/mlb/500/nym.png",
            "Rockies": "https://a.espncdn.com/combiner/i?img=/i/teamlogos/mlb/500/col.png",
            "Reds": "https://a.espncdn.com/combiner/i?img=/i/teamlogos/mlb/500/cin.png",
            "Tigers": "https://a.espncdn.com/combiner/i?img=/i/teamlogos/mlb/500/det.png",
            "Rays": "https://a.espncdn.com/combiner/i?img=/i/teamlogos/mlb/500/tb.png",
            "Twins": "https://a.espncdn.com/combiner/i?img=/i/teamlogos/mlb/500/min.png",
            "Astros": "https://a.espncdn.com/combiner/i?img=/i/teamlogos/mlb/500/hou.png",
            "Yankees": "https://a.espncdn.com/combiner/i?img=/i/teamlogos/mlb/500/nyy.png",
            "Brewers": "https://a.espncdn.com/combiner/i?img=/i/teamlogos/mlb/500/mil.png",
            "Pirates": "https://a.espncdn.com/combiner/i?img=/i/teamlogos/mlb/500/pit.png",
            "White Sox": "https://a.espncdn.com/combiner/i?img=/i/teamlogos/mlb/500/chw.png",
            "Nationals": "https://a.espncdn.com/combiner/i?img=/i/teamlogos/mlb/500/wsh.png",
            "Cardinals": "https://a.espncdn.com/combiner/i?img=/i/teamlogos/mlb/500/stl.png",
            "Mariners": "https://a.espncdn.com/combiner/i?img=/i/teamlogos/mlb/500/sea.png",
            "Rangers": "https://a.espncdn.com/combiner/i?img=/i/teamlogos/mlb/500/tex.png",
            "Athletics": "https://a.espncdn.com/combiner/i?img=/i/teamlogos/mlb/500/oak.png",
            "Giants": "https://a.espncdn.com/combiner/i?img=/i/teamlogos/mlb/500/sf.png",
            "Marlins": "https://a.espncdn.com/combiner/i?img=/i/teamlogos/mlb/500/mia.png",
            "Diamondbacks": "https://a.espncdn.com/combiner/i?img=/i/teamlogos/mlb/500/ari.png",
            "Padres": "https://a.espncdn.com/combiner/i?img=/i/teamlogos/mlb/500/sd.png",
            "Dodgers": "https://a.espncdn.com/combiner/i?img=/i/teamlogos/mlb/500/lad.png",
            "Cubs": "https://a.espncdn.com/combiner/i?img=/i/teamlogos/mlb/500/chc.png",
            "Royals": "https://a.espncdn.com/combiner/i?img=/i/teamlogos/mlb/500/kc.png",
            "Angels": "https://a.espncdn.com/combiner/i?img=/i/teamlogos/mlb/500/laa.png"
        };
        return logos[teamName] || null;
    }

    let currentUser = null;
    let currentSport = "futbol";
    let currentMain = "picks";

    function renderGames() {
        const container = document.getElementById('gamesContainer');
        const acceso = currentUser !== null;

        if (currentSport === "futbol") {
            const leagues = (typeof leaguesData !== 'undefined') ? leaguesData : [];
            if (leagues.length === 0) {
                container.innerHTML = '<div style="text-align:center; padding:2rem;">No hay partidos de fútbol hoy.</div>';
                return;
            }
            let html = '';
            for (const league of leagues) {
                if (league.games.length === 0) continue;
                html += `<div class="league-section">
                            <div class="league-title">🏆 ${league.name}</div>
                            <div class="scroll-container">
                                <div class="games-horizontal">`;
                for (let g of league.games) {
                    const parts = g.partido.split(' vs ');
                    const awayTeam = parts[0];
                    const homeTeam = parts[1];
                    const awayLogo = getTeamLogo(awayTeam, 'futbol');
                    const homeLogo = getTeamLogo(homeTeam, 'futbol');
                    const evText = g.principal.ev ? `<span class="ev-badge">EV ${g.principal.ev}</span>` : '';
                    html += `<div class="game-card">
                                <div class="card-header"><span class="league">${league.name}</span><span><i class="far fa-clock"></i> ${g.hora}</span></div>
                                <div class="matchup">
                                    <div class="team">${awayLogo ? `<img src="${awayLogo}" class="team-logo" loading="lazy" onerror="this.style.display='none'">` : ''}<div class="team-name">${awayTeam}</div></div>
                                    <div class="vs-circle">VS</div>
                                    <div class="team">${homeLogo ? `<img src="${homeLogo}" class="team-logo" loading="lazy" onerror="this.style.display='none'">` : ''}<div class="team-name">${homeTeam}</div></div>
                                </div>
                                ${!acceso ? `<div class="premium-lock"><i class="fas fa-lock"></i> Inicia sesión</div>` : `<div class="pick-card pick-main"><strong>🎯 JUGADA PRINCIPAL:</strong> ${g.principal.pick} (${g.principal.cuota}) stake ${g.principal.stake} ${evText}</div>`}
                            </div>`;
                }
                html += `</div></div></div>`;
            }
            container.innerHTML = html;
        } else if (currentSport === "mlb") {
            let mlbData = (typeof mlbPicks !== 'undefined') ? mlbPicks : [];
            if (mlbData.length === 0) {
                container.innerHTML = '<div class="league-section"><div class="league-title">⚾ MLB</div><div class="scroll-container"><div class="games-horizontal">No hay partidos de MLB hoy.</div></div></div>';
                return;
            }
            let html = `<div class="league-section"><div class="league-title">⚾ MLB</div><div class="scroll-container"><div class="games-horizontal">`;
            for (let g of mlbData) {
                const parts = g.partido.split(' vs ');
                const awayTeam = parts[0];
                const homeTeam = parts[1];
                const awayLogo = getTeamLogo(awayTeam, 'mlb');
                const homeLogo = getTeamLogo(homeTeam, 'mlb');
                const evText = g.principal.ev ? `<span class="ev-badge">EV ${g.principal.ev}</span>` : '';
                html += `<div class="game-card">
                            <div class="card-header"><span class="league">MLB</span><span><i class="far fa-clock"></i> ${g.hora}</span></div>
                            <div class="matchup">
                                <div class="team">${awayLogo ? `<img src="${awayLogo}" class="team-logo" loading="lazy" onerror="this.style.display='none'">` : ''}<div class="team-name">${awayTeam}</div>${g.away_pitcher ? `<div class="pitcher">${g.away_pitcher}</div>` : ''}</div>
                                <div class="vs-circle">VS</div>
                                <div class="team">${homeLogo ? `<img src="${homeLogo}" class="team-logo" loading="lazy" onerror="this.style.display='none'">` : ''}<div class="team-name">${homeTeam}</div>${g.home_pitcher ? `<div class="pitcher">${g.home_pitcher}</div>` : ''}</div>
                            </div>
                            ${!acceso ? `<div class="premium-lock"><i class="fas fa-lock"></i> Inicia sesión</div>` : `
                            <div class="pick-card pick-main"><strong>🎯 JUGADA PRINCIPAL:</strong> ${g.principal.pick} (${g.principal.cuota}) stake ${g.principal.stake} ${evText}</div>
                            ${g.secundaria ? `<div class="pick-card pick-secondary"><strong>📊 SECUNDARIA:</strong> ${g.secundaria.pick} (${g.secundaria.cuota}) stake ${g.secundaria.stake} ${g.secundaria.ev ? `<span class="ev-badge">EV ${g.secundaria.ev}</span>` : ''}</div>` : ''}
                            ${g.prop_jugador ? `<div class="pick-card pick-prop"><strong>🎲 PROP ${g.prop_jugador.jugador}:</strong> ${g.prop_jugador.prop} (${g.prop_jugador.cuota}) stake ${g.prop_jugador.stake} ${g.prop_jugador.ev ? `<span class="ev-badge">EV ${g.prop_jugador.ev}</span>` : ''}</div>` : ''}
                            `}
                        </div>`;
            }
            html += `</div></div></div>`;
            container.innerHTML = html;
        } else {
            container.innerHTML = '<div class="league-section"><div class="league-title">Próximamente</div><div class="games-horizontal">No hay datos disponibles para este deporte.</div></div>';
        }
    }

    function renderResults() { /* igual que antes */ }
    function renderParlays() { /* igual que antes */ }
    function updateBodySportClass() { document.body.className = `sport-${currentSport}`; }
    function renderCurrentView() { /* igual */ }
    function initSportFilters() { /* igual */ }
    // Funciones de login (debes copiar las que ya tienes)
    // ...

    // Inicialización
    document.querySelectorAll('.nav-tab').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.nav-tab').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentMain = btn.getAttribute('data-main');
            renderCurrentView();
        });
    });
    const today = new Date();
    const formattedDate = today.toLocaleDateString('es-ES', { day: '2-digit', month: '2-digit', year: 'numeric' }).replace(/\//g, '/');
    document.getElementById('dateBadge').innerHTML = `<i class="far fa-calendar-alt"></i> ${formattedDate} | ${today.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}`;
    const savedUser = localStorage.getItem('thia_user');
    if (savedUser) { try { currentUser = JSON.parse(savedUser); } catch(e) {} }
    updateUserUI();
    initSportFilters();
    renderCurrentView();
</script>
</body>
</html>
