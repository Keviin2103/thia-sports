<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>ThIA Sports | Sistema Profesional</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #0a0c10;
            color: #fff;
            min-height: 100vh;
            position: relative;
        }
        .top-bar {
            background: #1e1f24;
            border-bottom: 4px solid #facc15;
            padding: 0.5rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }
        .logo { font-size: 1.8rem; font-weight: 800; letter-spacing: -1px; }
        .logo span:first-child { color: #facc15; }
        .logo span:last-child { color: #fff; font-weight: 400; }
        .date-badge { background: #2c2e36; padding: 0.3rem 1rem; border-radius: 40px; font-size: 0.8rem; color: #ccc; }
        .user-area button {
            background: transparent;
            border: 1px solid #facc15;
            padding: 0.4rem 1.2rem;
            border-radius: 40px;
            color: #facc15;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }
        .user-area button:hover { background: #facc15; color: #000; }
        .user-greeting {
            background: #2c2e36;
            padding: 0.3rem 1rem;
            border-radius: 40px;
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        .nav-tabs {
            display: flex;
            justify-content: center;
            gap: 0.2rem;
            background: #15171c;
            padding: 0.5rem 1rem;
            border-bottom: 1px solid #2c2e36;
        }
        .nav-tab {
            background: transparent;
            border: none;
            padding: 0.6rem 1.8rem;
            font-weight: 700;
            font-size: 0.9rem;
            color: #aaa;
            cursor: pointer;
            border-radius: 40px;
            transition: 0.2s;
        }
        .nav-tab i { margin-right: 8px; }
        .nav-tab.active { background: #facc15; color: #0a0c10; }
        .container {
            max-width: 1400px;
            margin: 2rem auto;
            padding: 0 1.5rem;
            min-height: 60vh;
        }
        .sport-filters {
            display: flex;
            gap: 0.8rem;
            flex-wrap: wrap;
            margin-bottom: 2rem;
            justify-content: center;
        }
        .sport-chip {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 0.5rem 1.5rem;
            border-radius: 60px;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.2s;
        }
        .sport-chip.active { background: #facc15; color: #0a0c10; border-color: #facc15; }
        .game-card {
            background: rgba(20, 22, 28, 0.95);
            border-radius: 24px;
            border: 1px solid rgba(250, 204, 21, 0.3);
            width: 380px;
            padding: 1rem;
            margin: 0.5rem;
            display: inline-block;
        }
        .matchup { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem; }
        .team { text-align: center; flex: 1; }
        .team-name { font-weight: 700; }
        .vs-circle {
            background: #facc15;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            color: #0a0c10;
        }
        .pick-card {
            padding: 0.8rem;
            background: rgba(0,0,0,0.4);
            margin: 0.5rem 0;
            border-radius: 16px;
            border-left: 4px solid;
        }
        .pick-main { border-left-color: #facc15; }
        .pick-secondary { border-left-color: #3b82f6; }
        .pick-prop { border-left-color: #a855f7; }
        .ev-badge {
            display: inline-block;
            font-size: 0.7rem;
            background: #10b981;
            padding: 0.2rem 0.5rem;
            border-radius: 20px;
            margin-left: 0.5rem;
        }
        .premium-lock { text-align: center; padding: 1rem; background: rgba(0,0,0,0.6); border-radius: 16px; color: #aaa; }
        .hidden { display: none; }
        footer { text-align: center; padding: 2rem; font-size: 0.7rem; color: #5b6e8c; }
        @media (max-width: 640px) { .game-card { width: 320px; } }
    </style>
</head>
<body>
<div class="top-bar">
    <div class="logo"><span>ThIA</span><span> Sports</span></div>
    <div class="date-badge" id="dateBadge"><i class="far fa-calendar-alt"></i> Cargando...</div>
    <div class="user-area" id="authArea"><button id="showAuthBtn"><i class="fas fa-lock"></i> Acceder</button></div>
</div>
<div class="nav-tabs">
    <button class="nav-tab active" data-main="picks"><i class="fas fa-chart-line"></i> PICKS HOY</button>
    <button class="nav-tab" data-main="resultados"><i class="fas fa-trophy"></i> RESULTADOS</button>
    <button class="nav-tab" data-main="parlays"><i class="fas fa-layer-group"></i> PARLAYS</button>
</div>
<div class="container">
    <div id="picksSection">
        <div class="sport-filters" id="sportFilters"></div>
        <div id="gamesContainer">Cargando datos...</div>
    </div>
    <div id="resultsSection" class="hidden"><div id="resultsContainer">Sección de resultados</div></div>
    <div id="parlaysSection" class="hidden"><div id="parlaysContainer">Próximamente</div></div>
</div>
<footer>ThIA Sports · Sistema Profesional</footer>
<script>
    // Funciones de login (sin cambios, funcionan siempre)
    let currentUser = null;
    function handleGoogleCredential(response) {
        const payload = JSON.parse(atob(response.credential.split('.')[1]));
        currentUser = { email: payload.email, name: payload.name };
        localStorage.setItem('thia_user', JSON.stringify(currentUser));
        updateUserUI();
        renderGames();
        closeModal();
    }
    function initGoogleSignIn() {
        if (typeof google === 'undefined') { setTimeout(initGoogleSignIn, 500); return; }
        google.accounts.id.initialize({
            client_id: "613468909873-vu4nc6ugbm5cpdovfmb5vfo3m2h2mu2u.apps.googleusercontent.com",
            callback: handleGoogleCredential,
            auto_select: false
        });
        const btn = document.getElementById("googleBtnContainer");
        if (btn) google.accounts.id.renderButton(btn, { theme: "outline", size: "large" });
    }
    function showLoginModal() {
        let modal = document.getElementById('authModal');
        if (!modal) {
            modal = document.createElement('div');
            modal.id = 'authModal';
            modal.className = 'modal';
            modal.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.9);display:flex;align-items:center;justify-content:center;z-index:2000;';
            modal.innerHTML = `<div style="background:#1a1c23;padding:2rem;border-radius:32px;width:90%;max-width:400px;text-align:center;border:1px solid #facc15;">
                <h2 style="color:#facc15">ThIA Sports</h2>
                <p>Accede con tu cuenta</p>
                <input type="email" id="loginEmail" placeholder="Email" style="width:100%;padding:0.7rem;margin:0.5rem 0;background:#2c2e36;border:none;border-radius:40px;color:white;">
                <input type="password" id="loginPassword" placeholder="Contraseña" style="width:100%;padding:0.7rem;margin:0.5rem 0;background:#2c2e36;border:none;border-radius:40px;color:white;">
                <button id="doLoginBtn" style="background:#facc15;color:#000;border:none;padding:0.6rem 1.2rem;border-radius:40px;font-weight:bold;cursor:pointer;margin:0.3rem;">Iniciar sesión</button>
                <button id="doRegisterBtn" style="background:transparent;border:1px solid #facc15;color:#facc15;padding:0.5rem 1rem;border-radius:40px;cursor:pointer;margin:0.3rem;">Registrarse</button>
                <div style="margin:1rem 0;">━━━━━ o ━━━━━</div>
                <div id="googleBtnContainer"></div>
                <button id="closeModalBtn" style="background:transparent;border:1px solid #facc15;color:#facc15;padding:0.5rem 1rem;border-radius:40px;margin-top:1rem;cursor:pointer;">Cerrar</button>
            </div>`;
            document.body.appendChild(modal);
            document.getElementById('closeModalBtn')?.addEventListener('click', closeModal);
            document.getElementById('doLoginBtn')?.addEventListener('click', () => {
                const email = document.getElementById('loginEmail').value;
                const pass = document.getElementById('loginPassword').value;
                const users = JSON.parse(localStorage.getItem('thia_local_users') || '[]');
                const user = users.find(u => u.email === email && u.password === pass);
                if (user) { currentUser = { email: user.email }; localStorage.setItem('thia_user', JSON.stringify(currentUser)); updateUserUI(); renderGames(); closeModal(); }
                else alert("Credenciales incorrectas");
            });
            document.getElementById('doRegisterBtn')?.addEventListener('click', () => {
                const email = document.getElementById('loginEmail').value;
                const pass = document.getElementById('loginPassword').value;
                if (!email || !pass) return alert("Completa ambos campos");
                const users = JSON.parse(localStorage.getItem('thia_local_users') || '[]');
                if (users.find(u => u.email === email)) return alert("Email ya registrado");
                users.push({ email, password: pass });
                localStorage.setItem('thia_local_users', JSON.stringify(users));
                currentUser = { email };
                localStorage.setItem('thia_user', JSON.stringify(currentUser));
                updateUserUI(); renderGames(); closeModal();
            });
            initGoogleSignIn();
        }
        modal.style.display = 'flex';
    }
    function closeModal() { const m = document.getElementById('authModal'); if (m) m.style.display = 'none'; }
    function logout() { currentUser = null; localStorage.removeItem('thia_user'); updateUserUI(); renderGames(); }
    function updateUserUI() {
        const area = document.getElementById('authArea');
        if (currentUser) area.innerHTML = `<div class="user-greeting"><i class="fas fa-user-circle"></i> ${currentUser.email.split('@')[0]} <button id="logoutBtn" style="background:#facc15;color:#000;border:none;">Salir</button></div>`;
        else area.innerHTML = `<button id="showAuthBtn"><i class="fas fa-key"></i> Acceder</button>`;
        document.getElementById('logoutBtn')?.addEventListener('click', logout);
        document.getElementById('showAuthBtn')?.addEventListener('click', showLoginModal);
    }

    let currentSport = "futbol";
    let currentMain = "picks";
    let mlbPicks = [];
    let leaguesData = [];

    function renderGames() {
        const container = document.getElementById('gamesContainer');
        const acceso = currentUser !== null;
        if (!container) return;
        if (currentSport === "futbol") {
            if (!leaguesData || leaguesData.length === 0) {
                container.innerHTML = '<div style="text-align:center; padding:2rem;">No hay partidos de fútbol hoy.</div>';
                return;
            }
            let html = '';
            for (const league of leaguesData) {
                if (league.games.length === 0) continue;
                html += `<div class="league-section"><h3 style="color:#facc15;">${league.name}</h3><div style="display:flex; flex-wrap:wrap; gap:1rem;">`;
                for (let g of league.games) {
                    const parts = g.partido.split(' vs ');
                    const awayTeam = parts[0];
                    const homeTeam = parts[1];
                    html += `<div class="game-card">
                                <div class="matchup">
                                    <div class="team"><div class="team-name">${awayTeam}</div></div>
                                    <div class="vs-circle">VS</div>
                                    <div class="team"><div class="team-name">${homeTeam}</div></div>
                                </div>
                                ${!acceso ? `<div class="premium-lock"><i class="fas fa-lock"></i> Inicia sesión</div>` : `
                                <div class="pick-card pick-main"><strong>🎯 PRINCIPAL:</strong> ${g.principal.pick} (${g.principal.cuota}) stake ${g.principal.stake} ${g.principal.ev ? `<span class="ev-badge">EV ${g.principal.ev}</span>` : ''}</div>
                                ${g.secundaria ? `<div class="pick-card pick-secondary"><strong>📊 SECUNDARIA:</strong> ${g.secundaria.pick} (${g.secundaria.cuota}) stake ${g.secundaria.stake}</div>` : ''}
                                ${g.prop_jugador ? `<div class="pick-card pick-prop"><strong>🎲 PROP ${g.prop_jugador.jugador}:</strong> ${g.prop_jugador.prop} (${g.prop_jugador.cuota}) stake ${g.prop_jugador.stake}</div>` : ''}
                                `}
                            </div>`;
                }
                html += `</div></div><br>`;
            }
            container.innerHTML = html;
        } else if (currentSport === "mlb") {
            if (!mlbPicks || mlbPicks.length === 0) {
                container.innerHTML = '<div style="text-align:center; padding:2rem;">No hay partidos de MLB hoy.</div>';
                return;
            }
            let html = '<div style="display:flex; flex-wrap:wrap; gap:1rem;">';
            for (let g of mlbPicks) {
                const parts = g.partido.split(' vs ');
                const awayTeam = parts[0];
                const homeTeam = parts[1];
                html += `<div class="game-card">
                            <div class="matchup">
                                <div class="team"><div class="team-name">${awayTeam}</div>${g.away_pitcher ? `<div style="font-size:0.7rem;color:#aaa;">${g.away_pitcher}</div>` : ''}</div>
                                <div class="vs-circle">VS</div>
                                <div class="team"><div class="team-name">${homeTeam}</div>${g.home_pitcher ? `<div style="font-size:0.7rem;color:#aaa;">${g.home_pitcher}</div>` : ''}</div>
                            </div>
                            ${!acceso ? `<div class="premium-lock"><i class="fas fa-lock"></i> Inicia sesión</div>` : `
                            <div class="pick-card pick-main"><strong>🎯 PRINCIPAL:</strong> ${g.principal.pick} (${g.principal.cuota}) stake ${g.principal.stake} ${g.principal.ev ? `<span class="ev-badge">EV ${g.principal.ev}</span>` : ''}</div>
                            ${g.secundaria ? `<div class="pick-card pick-secondary"><strong>📊 SECUNDARIA:</strong> ${g.secundaria.pick} (${g.secundaria.cuota}) stake ${g.secundaria.stake}</div>` : ''}
                            ${g.prop_jugador ? `<div class="pick-card pick-prop"><strong>🎲 PROP ${g.prop_jugador.jugador}:</strong> ${g.prop_jugador.prop} (${g.prop_jugador.cuota}) stake ${g.prop_jugador.stake}</div>` : ''}
                            `}
                        </div>`;
            }
            html += `</div>`;
            container.innerHTML = html;
        } else {
            container.innerHTML = '<div style="text-align:center; padding:2rem;">Próximamente disponible.</div>';
        }
    }

    function initSportFilters() {
        const container = document.getElementById('sportFilters');
        if (!container) return;
        const sports = ['futbol', 'mlb', 'nba', 'nhl'];
        const names = { futbol:'⚽ Fútbol', mlb:'⚾ Béisbol', nba:'🏀 Baloncesto', nhl:'🏒 Hockey' };
        container.innerHTML = sports.map(s => `<div class="sport-chip ${s === currentSport ? 'active' : ''}" data-sport="${s}">${names[s]}</div>`).join('');
        document.querySelectorAll('.sport-chip').forEach(chip => {
            chip.addEventListener('click', () => {
                document.querySelectorAll('.sport-chip').forEach(c => c.classList.remove('active'));
                chip.classList.add('active');
                currentSport = chip.getAttribute('data-sport');
                renderGames();
            });
        });
    }

    function loadDataAndRender() {
        // Esperar a que existan los datos globales (si no, no hacer nada)
        setTimeout(() => {
            if (typeof mlbPicks !== 'undefined') window.mlbPicks = mlbPicks;
            if (typeof leaguesData !== 'undefined') window.leaguesData = leaguesData;
            renderGames();
        }, 500);
    }

    document.querySelectorAll('.nav-tab').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.nav-tab').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentMain = btn.getAttribute('data-main');
            document.getElementById('picksSection').classList.toggle('hidden', currentMain !== 'picks');
            document.getElementById('resultsSection').classList.toggle('hidden', currentMain !== 'resultados');
            document.getElementById('parlaysSection').classList.toggle('hidden', currentMain !== 'parlays');
            if (currentMain === 'picks') renderGames();
        });
    });
    const today = new Date();
    document.getElementById('dateBadge').innerHTML = `<i class="far fa-calendar-alt"></i> ${today.toLocaleDateString('es-ES')} | ${today.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}`;
    const savedUser = localStorage.getItem('thia_user');
    if (savedUser) { try { currentUser = JSON.parse(savedUser); } catch(e) {} }
    updateUserUI();
    initSportFilters();
    loadDataAndRender();
</script>
<script src="data.js"></script>
</body>
</html>
