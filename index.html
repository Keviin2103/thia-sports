<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>ThIA Sports | ESPN Style | Picks y Resultados en Vivo</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #0a0c10;
            color: #fff;
            min-height: 100vh;
            position: relative;
        }
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            opacity: 0.15;
            z-index: -2;
            transition: background-image 0.3s ease;
        }
        body.sport-futbol::before { background-image: url('https://images.unsplash.com/photo-1529900748604-07564a03e7a6?q=80&w=2070&auto=format'); }
        body.sport-mlb::before { background-image: url('https://images.unsplash.com/photo-1471295253337-3ceaaedca402?q=80&w=2070&auto=format'); }
        body.sport-nhl::before { background-image: url('https://images.unsplash.com/photo-1515704089429-fd06e6661ddd?q=80&w=2070&auto=format'); }
        body.sport-nba::before { background-image: url('https://images.unsplash.com/photo-1546519638-68e109498ffc?q=80&w=2090&auto=format'); }
        body::after {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 30%, rgba(0,0,0,0.7), #0a0c10);
            z-index: -1;
        }

        .top-bar {
            background: #1e1f24;
            border-bottom: 4px solid #facc15;
            padding: 0.5rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }
        .logo {
            font-size: 1.8rem;
            font-weight: 800;
            letter-spacing: -1px;
        }
        .logo span:first-child { color: #facc15; }
        .logo span:last-child { color: #fff; font-weight: 400; }
        .date-badge {
            background: #2c2e36;
            padding: 0.3rem 1rem;
            border-radius: 40px;
            font-size: 0.8rem;
            color: #ccc;
        }
        .user-area button {
            background: transparent;
            border: 1px solid #facc15;
            padding: 0.4rem 1.2rem;
            border-radius: 40px;
            color: #facc15;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }
        .user-area button:hover { background: #facc15; color: #000; }
        .user-greeting {
            background: #2c2e36;
            padding: 0.3rem 1rem;
            border-radius: 40px;
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .nav-tabs {
            display: flex;
            justify-content: center;
            gap: 0.2rem;
            background: #15171c;
            padding: 0.5rem 1rem;
            border-bottom: 1px solid #2c2e36;
        }
        .nav-tab {
            background: transparent;
            border: none;
            padding: 0.6rem 1.8rem;
            font-weight: 700;
            font-size: 0.9rem;
            color: #aaa;
            cursor: pointer;
            border-radius: 40px;
            transition: 0.2s;
        }
        .nav-tab i { margin-right: 8px; }
        .nav-tab.active {
            background: #facc15;
            color: #0a0c10;
        }
        .nav-tab:not(.active):hover { color: #facc15; background: #2c2e36; }

        .container {
            max-width: 1400px;
            margin: 2rem auto;
            padding: 0 1.5rem;
        }

        .sport-filters {
            display: flex;
            gap: 0.8rem;
            flex-wrap: wrap;
            margin-bottom: 2rem;
            justify-content: center;
        }
        .sport-chip {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 0.5rem 1.5rem;
            border-radius: 60px;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .sport-chip.active {
            background: #facc15;
            color: #0a0c10;
            border-color: #facc15;
        }

        .league-section {
            margin-bottom: 2.5rem;
        }
        .league-title {
            font-size: 1.4rem;
            font-weight: 700;
            color: #facc15;
            margin-bottom: 1rem;
            padding-bottom: 0.5rem;
            border-bottom: 2px solid #facc15;
            display: inline-block;
        }
        .scroll-container {
            overflow-x: auto;
            overflow-y: hidden;
            white-space: nowrap;
            padding-bottom: 1rem;
            scrollbar-width: thin;
            scrollbar-color: #facc15 #2c2e36;
            -webkit-overflow-scrolling: touch;
        }
        .scroll-container::-webkit-scrollbar { height: 6px; }
        .scroll-container::-webkit-scrollbar-track { background: #2c2e36; border-radius: 10px; }
        .scroll-container::-webkit-scrollbar-thumb { background: #facc15; border-radius: 10px; }
        .games-horizontal {
            display: inline-flex;
            gap: 1.5rem;
            padding-right: 1rem;
        }
        .game-card {
            background: rgba(20, 22, 28, 0.95);
            backdrop-filter: blur(8px);
            border-radius: 24px;
            border: 1px solid rgba(250, 204, 21, 0.3);
            width: 380px;
            flex-shrink: 0;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
            white-space: normal;
        }
        .game-card:hover {
            transform: translateY(-5px);
            border-color: #facc15;
            box-shadow: 0 15px 30px rgba(250,204,21,0.2);
        }
        .card-header {
            display: flex;
            justify-content: space-between;
            padding: 0.8rem 1rem;
            background: rgba(0,0,0,0.5);
            font-size: 0.7rem;
            font-weight: 500;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .league {
            background: #facc15;
            color: #000;
            padding: 0.2rem 0.7rem;
            border-radius: 20px;
            font-weight: bold;
        }
        .matchup {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1rem 1.2rem;
            gap: 0.5rem;
        }
        .team {
            text-align: center;
            flex: 1;
        }
        .team-logo {
            width: 60px;
            height: 60px;
            object-fit: contain;
            margin-bottom: 0.5rem;
        }
        .team-name {
            font-weight: 700;
            font-size: 0.9rem;
        }
        .pitcher {
            font-size: 0.65rem;
            color: #aaa;
            margin-top: 4px;
        }
        .vs-circle {
            background: #facc15;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            color: #0a0c10;
            font-size: 0.8rem;
        }
        .pick-card {
            padding: 0.8rem 1rem;
            background: rgba(0,0,0,0.4);
            margin: 0.5rem 1rem 1rem;
            border-radius: 16px;
            border-left: 4px solid;
        }
        .pick-main { border-left-color: #facc15; }
        .pick-secondary { border-left-color: #3b82f6; }
        .pick-prop { border-left-color: #a855f7; }
        .ev-badge {
            display: inline-block;
            font-size: 0.7rem;
            background: #10b981;
            padding: 0.2rem 0.5rem;
            border-radius: 20px;
            margin-left: 0.5rem;
        }
        .premium-lock {
            text-align: center;
            padding: 1rem;
            background: rgba(0,0,0,0.6);
            margin: 0.5rem 1rem 1rem;
            border-radius: 16px;
            color: #aaa;
        }
        .stats-row {
            display: flex;
            gap: 1.5rem;
            margin-bottom: 2rem;
            flex-wrap: wrap;
        }
        .stat-card {
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(4px);
            border-radius: 20px;
            padding: 1rem 1.5rem;
            text-align: center;
            flex: 1;
            min-width: 120px;
            border: 1px solid rgba(250,204,21,0.3);
        }
        .stat-number {
            font-size: 2rem;
            font-weight: 800;
            color: #facc15;
        }
        .results-table {
            width: 100%;
            background: rgba(0,0,0,0.4);
            border-radius: 20px;
            overflow-x: auto;
            margin-bottom: 2rem;
        }
        .results-table th, .results-table td {
            padding: 0.8rem;
            text-align: left;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .results-table th { color: #facc15; }
        .result-hit { color: #22c55e; font-weight: bold; }
        .result-fail { color: #ef4444; font-weight: bold; }

        .parlays-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 1.5rem;
        }
        .parlay-card {
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(8px);
            border-radius: 24px;
            padding: 1.2rem;
            border: 1px solid;
        }
        .parlay-gold { border-color: #eab308; }
        .parlay-green { border-color: #22c55e; }
        .parlay-orange { border-color: #f97316; }
        .parlay-purple { border-color: #a855f7; }

        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(12px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }
        .modal-content {
            background: #1a1c23;
            padding: 2rem;
            border-radius: 32px;
            width: 90%;
            max-width: 400px;
            text-align: center;
            border: 1px solid #facc15;
        }
        .modal-content input {
            width: 100%;
            padding: 0.7rem;
            margin: 0.5rem 0;
            background: #2c2e36;
            border: none;
            border-radius: 40px;
            color: white;
        }
        .btn {
            background: #facc15;
            color: #0a0c10;
            border: none;
            padding: 0.6rem 1.2rem;
            border-radius: 40px;
            font-weight: bold;
            cursor: pointer;
            margin: 0.3rem;
        }
        .btn-outline-light {
            background: transparent;
            border: 1px solid #facc15;
            color: #facc15;
            padding: 0.5rem 1rem;
            border-radius: 40px;
        }
        .hidden { display: none; }
        footer {
            text-align: center;
            padding: 2rem;
            font-size: 0.7rem;
            color: #5b6e8c;
        }
        @media (max-width: 640px) {
            .game-card { width: 320px; }
            .team-logo { width: 45px; height: 45px; }
            .vs-circle { width: 35px; height: 35px; font-size: 0.7rem; }
        }
    </style>
</head>
<body class="sport-futbol">
<div class="top-bar">
    <div class="logo"><span>ThIA</span><span> Sports</span></div>
    <div class="date-badge" id="dateBadge"><i class="far fa-calendar-alt"></i> Cargando...</div>
    <div class="user-area" id="authArea"><button id="showAuthBtn"><i class="fas fa-lock"></i> Acceder</button></div>
</div>
<div class="nav-tabs">
    <button class="nav-tab active" data-main="picks"><i class="fas fa-chart-line"></i> PICKS HOY</button>
    <button class="nav-tab" data-main="resultados"><i class="fas fa-trophy"></i> RESULTADOS</button>
    <button class="nav-tab" data-main="parlays"><i class="fas fa-layer-group"></i> PARLAYS</button>
</div>
<div class="container">
    <div id="picksSection">
        <div class="sport-filters" id="sportFilters"></div>
        <div id="gamesContainer"></div>
    </div>
    <div id="resultsSection" class="hidden">
        <div class="stats-row" id="statsSummary"></div>
        <h3 style="color:#facc15; margin-bottom:1rem;">📋 Resultados en vivo</h3>
        <div style="overflow-x: auto;"><table class="results-table"><thead><tr><th>Partido</th><th>Estado</th><th>Marcador</th></tr></thead><tbody id="resultsTableBody"><tr><td colspan="3">Cargando...<\/td><\/tr><\/tbody><\/table><\/div>
        <div style="margin-top: 2rem; background: rgba(250,204,21,0.1); border-radius: 20px; padding: 1rem;"><h4><i class="fas fa-brain"></i> Mejoras ThIA-SA v6.3</h4><div id="leccionesList" style="font-size:0.75rem; color:#ccc;"><\/div><\/div>

<\/div>
<footer>ThIA Sports · Sistema ThIA-SA v6.3 · Picks y resultados actualizados automáticamente<\/footer>

<script src="data.js"><\/script>
<script>

    let currentUser = null;
    let currentSport = "futbol";
    let currentMain = "picks";

    function renderGames() {
        const container = document.getElementById('gamesContainer');
        const acceso = currentUser !== null;

        if (currentSport === "futbol") {
            const leagues = (typeof leaguesData !== 'undefined') ? leaguesData : [];
            if (leagues.length === 0) {
                container.innerHTML = '<div style="text-align:center; padding:2rem;">No hay partidos de fútbol hoy.</div>';
                return;
            }
            let html = '';
            for (const league of leagues) {
                if (league.games.length === 0) continue;
                html += `<div class="league-section">
                            <div class="league-title">🏆 ${league.name}</div>
                            <div class="scroll-container">
                                <div class="games-horizontal">`;
                for (let g of league.games) {
                    const parts = g.partido.split(' vs ');
                    const awayTeam = parts[0];
                    const homeTeam = parts[1];
                    const awayLogo = getTeamLogo(awayTeam, 'futbol');
                    const homeLogo = getTeamLogo(homeTeam, 'futbol');
                    const evText = g.principal.ev ? `<span class="ev-badge">EV ${g.principal.ev}</span>` : '';
                    html += `<div class="game-card">
                                <div class="card-header">
                                    <span class="league">${league.name}</span>
                                    <span><i class="far fa-clock"></i> ${g.hora}</span>
                                </div>
                                <div class="matchup">
                                    <div class="team">
                                        ${awayLogo ? `<img src="${awayLogo}" class="team-logo" alt="${awayTeam}" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">` : ''}
                                        <div class="team-logo" style="font-size:2rem; display:${awayLogo ? 'none' : 'flex'}; align-items:center; justify-content:center;">⚽</div>
                                        <div class="team-name">${awayTeam}</div>
                                    </div>
                                    <div class="vs-circle">VS</div>
                                    <div class="team">
                                        ${homeLogo ? `<img src="${homeLogo}" class="team-logo" alt="${homeTeam}" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">` : ''}
                                        <div class="team-logo" style="font-size:2rem; display:${homeLogo ? 'none' : 'flex'}; align-items:center; justify-content:center;">⚽</div>
                                        <div class="team-name">${homeTeam}</div>
                                    </div>
                                </div>
                                ${!acceso ? `<div class="premium-lock"><i class="fas fa-lock"></i> Inicia sesión para ver los picks</div>` : `
                                <div class="pick-card pick-main"><strong>🎯 JUGADA PRINCIPAL:</strong> ${g.principal.pick} (${g.principal.cuota}) stake ${g.principal.stake} ${evText}</div>
                                ${g.secundaria ? `<div class="pick-card pick-secondary"><strong>📊 SECUNDARIA:</strong> ${g.secundaria.pick} (${g.secundaria.cuota}) stake ${g.secundaria.stake} ${g.secundaria.ev ? `<span class="ev-badge">EV ${g.secundaria.ev}</span>` : ''}</div>` : ''}
                                ${g.prop_jugador ? `<div class="pick-card pick-prop"><strong>🎲 PROP ${g.prop_jugador.jugador}:</strong> ${g.prop_jugador.prop} (${g.prop_jugador.cuota}) stake ${g.prop_jugador.stake} ${g.prop_jugador.ev ? `<span class="ev-badge">EV ${g.prop_jugador.ev}</span>` : ''}</div>` : ''}
                                `}
                            </div>`;
                }
                html += `</div></div></div>`;
            }
            container.innerHTML = html;
        } else if (currentSport === "mlb") {
            let mlbData = (typeof mlbPicks !== 'undefined') ? mlbPicks : [];
            if (mlbData.length === 0) {
                container.innerHTML = '<div class="league-section"><div class="league-title">⚾ MLB</div><div class="scroll-container"><div class="games-horizontal">No hay partidos de MLB hoy.</div></div></div>';
                return;
            }
            let html = `<div class="league-section"><div class="league-title">⚾ MLB</div><div class="scroll-container"><div class="games-horizontal">`;
            for (let g of mlbData) {
                const parts = g.partido.split(' vs ');
                const awayTeam = parts[0];
                const homeTeam = parts[1];
                const awayLogo = getTeamLogo(awayTeam, 'mlb');
                const homeLogo = getTeamLogo(homeTeam, 'mlb');
                const evText = g.principal.ev ? `<span class="ev-badge">EV ${g.principal.ev}</span>` : '';
                html += `<div class="game-card">
                            <div class="card-header">
                                <span class="league">MLB</span>
                                <span><i class="far fa-clock"></i> ${g.hora}</span>
                            </div>
                            <div class="matchup">
                                <div class="team">
                                    ${awayLogo ? `<img src="${awayLogo}" class="team-logo" loading="lazy" onerror="this.style.display='none'">` : ''}
                                    <div class="team-name">${awayTeam}</div>
                                    ${g.away_pitcher ? `<div class="pitcher">${g.away_pitcher}</div>` : ''}
                                </div>
                                <div class="vs-circle">VS</div>
                                <div class="team">
                                    ${homeLogo ? `<img src="${homeLogo}" class="team-logo" loading="lazy" onerror="this.style.display='none'">` : ''}
                                    <div class="team-name">${homeTeam}</div>
                                    ${g.home_pitcher ? `<div class="pitcher">${g.home_pitcher}</div>` : ''}
                                </div>
                            </div>
                            ${!acceso ? `<div class="premium-lock"><i class="fas fa-lock"></i> Inicia sesión</div>` : `
                            <div class="pick-card pick-main"><strong>🎯 JUGADA PRINCIPAL:</strong> ${g.principal.pick} (${g.principal.cuota}) stake ${g.principal.stake} ${evText}</div>
                            ${g.secundaria ? `<div class="pick-card pick-secondary"><strong>📊 SECUNDARIA:</strong> ${g.secundaria.pick} (${g.secundaria.cuota}) stake ${g.secundaria.stake} ${g.secundaria.ev ? `<span class="ev-badge">EV ${g.secundaria.ev}</span>` : ''}</div>` : ''}
                            ${g.prop_jugador ? `<div class="pick-card pick-prop"><strong>🎲 PROP ${g.prop_jugador.jugador}:</strong> ${g.prop_jugador.prop} (${g.prop_jugador.cuota}) stake ${g.prop_jugador.stake} ${g.prop_jugador.ev ? `<span class="ev-badge">EV ${g.prop_jugador.ev}</span>` : ''}</div>` : ''}
                            `}
                        </div>`;
            }
            html += `</div></div></div>`;
            container.innerHTML = html;
        } else if (currentSport === "nba") {
            container.innerHTML = '<div class="league-section"><div class="league-title">🏀 NBA Playoffs</div><div class="scroll-container"><div class="games-horizontal">No hay partidos de NBA disponibles.</div></div></div>';
        } else if (currentSport === "nhl") {
            container.innerHTML = '<div class="league-section"><div class="league-title">🏒 NHL Playoffs</div><div class="scroll-container"><div class="games-horizontal">No hay partidos de NHL disponibles.</div></div></div>';
        }
    }

    function renderResults() {
        const tableBody = document.getElementById('resultsTableBody');
        if (!tableBody) return;
        if (typeof todayResultsArray === 'undefined' || !todayResultsArray) {
            tableBody.innerHTML = '<tr><td colspan="3">No hay datos de resultados disponibles.</td></tr>';
            document.getElementById('leccionesList').innerHTML = (typeof mejores !== 'undefined' ? mejores.map(m => `<div>• ${m}</div>`).join('') : '<div>• Sistema ThIA-SA v6.3</div>');
            return;
        }
        let html = '';
        const deportes = ['nba', 'mlb', 'nhl', 'soccer'];
        for (const dep of deportes) {
            const partidos = todayResultsArray[dep] || [];
            for (const p of partidos) {
                html += `<tr>
                            <td>${p.matchup || ''}</td>
                            <td class="${p.is_live ? 'result-hit' : ''}">${p.status || ''}</td>
                            <td>${p.score || ''}</td>
                         </tr>`;
            }
        }
        if (html === '') html = '<tr><td colspan="3">No hay partidos hoy o no se pudieron cargar resultados.</td></tr>';
        tableBody.innerHTML = html;
        const mejorasArray = (typeof mejores !== 'undefined' && mejores.length) ? mejores : ['✅ Sistema ThIA-SA v6.3'];
        document.getElementById('leccionesList').innerHTML = mejorasArray.map(m => `<div>• ${m}</div>`).join('');
        document.getElementById('statsSummary').innerHTML = `<div class="stat-card"><div class="stat-number">--</div><div>HITS ✅</div></div><div class="stat-card"><div class="stat-number">--</div><div>FAILS ❌</div></div><div class="stat-card"><div class="stat-number">--</div><div>EFECT.</div></div>`;
    }

    function renderParlays() {
        document.getElementById('parlaysContainer').innerHTML = '<div class="parlay-card parlay-green"><div style="font-weight:800;">PARLAYS DISPONIBLES PRONTO</div><div>Próximamente incluiremos combinadas automáticas basadas en picks con mayor EV+.</div></div>';
    }

    function updateBodySportClass() { document.body.className = `sport-${currentSport}`; }
    function renderCurrentView() {
        if (currentMain === 'picks') {
            document.getElementById('picksSection').classList.remove('hidden');
            document.getElementById('resultsSection').classList.add('hidden');
            document.getElementById('parlaysSection').classList.add('hidden');
            renderGames();
        } else if (currentMain === 'resultados') {
            document.getElementById('picksSection').classList.add('hidden');
            document.getElementById('resultsSection').classList.remove('hidden');
            document.getElementById('parlaysSection').classList.add('hidden');
            renderResults();
        } else {
            document.getElementById('picksSection').classList.add('hidden');
            document.getElementById('resultsSection').classList.add('hidden');
            document.getElementById('parlaysSection').classList.remove('hidden');
            renderParlays();
        }
        updateBodySportClass();
    }

    function initSportFilters() {
        const container = document.getElementById('sportFilters');
        const sports = ['futbol', 'mlb', 'nba', 'nhl'];
        const names = { futbol:'⚽ Fútbol', mlb:'⚾ Béisbol', nba:'🏀 Baloncesto', nhl:'🏒 Hockey' };
        container.innerHTML = sports.map(s => `<div class="sport-chip ${s === currentSport ? 'active' : ''}" data-sport="${s}"><i class="fas ${s==='futbol'?'fa-futbol':s==='mlb'?'fa-baseball-ball':s==='nhl'?'fa-hockey-puck':'fa-basketball-ball'}"></i> ${names[s]}</div>`).join('');
        document.querySelectorAll('.sport-chip').forEach(chip => {
            chip.addEventListener('click', () => {
                document.querySelectorAll('.sport-chip').forEach(c => c.classList.remove('active'));
                chip.classList.add('active');
                currentSport = chip.getAttribute('data-sport');
                renderGames();
                updateBodySportClass();
            });
        });
    }

    // ========== LOGIN (funciones completas) ==========
    function handleGoogleCredential(response) {
        const payload = JSON.parse(atob(response.credential.split('.')[1]));
        currentUser = { email: payload.email, name: payload.name };
        localStorage.setItem('thia_user', JSON.stringify(currentUser));
        updateUserUI();
        renderCurrentView();
        closeModal();
    }
    function initGoogleSignIn() {
        if (typeof google === 'undefined') { setTimeout(initGoogleSignIn, 500); return; }
        google.accounts.id.initialize({
            client_id: "613468909873-vu4nc6ugbm5cpdovfmb5vfo3m2h2mu2u.apps.googleusercontent.com",
            callback: handleGoogleCredential,
            auto_select: false
        });
        const btnContainer = document.getElementById("googleBtnContainer");
        if (btnContainer) google.accounts.id.renderButton(btnContainer, { theme: "outline", size: "large" });
    }
    function showLoginModal() {
        let modal = document.getElementById('authModal');
        if (!modal) {
            modal = document.createElement('div');
            modal.id = 'authModal';
            modal.className = 'modal';
            modal.innerHTML = `<div class="modal-content"><h2 style="color:#facc15">ThIA Sports</h2><p>Accede con tu cuenta</p><input type="email" id="loginEmail" placeholder="Email"><input type="password" id="loginPassword" placeholder="Contraseña"><button id="doLoginBtn" class="btn">Iniciar sesión</button><button id="doRegisterBtn" class="btn-outline-light">Registrarse</button><div style="margin:1rem 0;">━━━━━ o ━━━━━</div><div id="googleBtnContainer"></div><button class="btn-outline-light" style="margin-top:1rem;" id="closeModalBtn">Cerrar</button></div>`;
            document.body.appendChild(modal);
            document.getElementById('closeModalBtn')?.addEventListener('click', closeModal);
            document.getElementById('doLoginBtn')?.addEventListener('click', () => {
                const email = document.getElementById('loginEmail').value;
                const pass = document.getElementById('loginPassword').value;
                const users = JSON.parse(localStorage.getItem('thia_local_users') || '[]');
                const user = users.find(u => u.email === email && u.password === pass);
                if (user) { currentUser = { email: user.email }; localStorage.setItem('thia_user', JSON.stringify(currentUser)); updateUserUI(); renderCurrentView(); closeModal(); }
                else alert("Credenciales incorrectas");
            });
            document.getElementById('doRegisterBtn')?.addEventListener('click', () => {
                const email = document.getElementById('loginEmail').value;
                const pass = document.getElementById('loginPassword').value;
                if (!email || !pass) return alert("Completa ambos campos");
                const users = JSON.parse(localStorage.getItem('thia_local_users') || '[]');
                if (users.find(u => u.email === email)) return alert("Email ya registrado");
                users.push({ email, password: pass });
                localStorage.setItem('thia_local_users', JSON.stringify(users));
                currentUser = { email };
                localStorage.setItem('thia_user', JSON.stringify(currentUser));
                updateUserUI(); renderCurrentView(); closeModal();
            });
            initGoogleSignIn();
        }
        modal.style.display = 'flex';
    }
    function closeModal() { const m = document.getElementById('authModal'); if (m) m.style.display = 'none'; }
    function logout() { currentUser = null; localStorage.removeItem('thia_user'); updateUserUI(); renderCurrentView(); }
    function updateUserUI() {
        const area = document.getElementById('authArea');
        if (currentUser) area.innerHTML = `<div class="user-greeting"><i class="fas fa-user-circle"></i> ${currentUser.email.split('@')[0]} <button id="logoutBtn" style="background:#facc15;color:#000;border:none;">Salir</button></div>`;
        else area.innerHTML = `<button id="showAuthBtn"><i class="fas fa-key"></i> Acceder</button>`;
        document.getElementById('logoutBtn')?.addEventListener('click', logout);
        document.getElementById('showAuthBtn')?.addEventListener('click', showLoginModal);
    }

    // ========== INICIALIZACIÓN ==========
    document.querySelectorAll('.nav-tab').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.nav-tab').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentMain = btn.getAttribute('data-main');
            renderCurrentView();
        });
    });
    const today = new Date();
    const formattedDate = today.toLocaleDateString('es-ES', { day: '2-digit', month: '2-digit', year: 'numeric' }).replace(/\//g, '/');
    document.getElementById('dateBadge').innerHTML = `<i class="far fa-calendar-alt"></i> ${formattedDate} | ${today.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}`;
    const savedUser = localStorage.getItem('thia_user');
    if (savedUser) { try { currentUser = JSON.parse(savedUser); } catch(e) {} }
    updateUserUI();
    initSportFilters();
    renderCurrentView();
<\/script>
<\/body>
<\/html>
