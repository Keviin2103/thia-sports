    </style>

    // Ordenar por hora
    function parseTimeToMinutes(timeStr) {
        const parts = timeStr.split(' ');
        const timePart = parts[0];
        const ampm = parts[1];
        const [hourStr, minuteStr] = timePart.split(':');
        let hour = parseInt(hourStr);
        const minute = parseInt(minuteStr);
        if (ampm === 'PM' && hour !== 12) hour += 12;
        if (ampm === 'AM' && hour === 12) hour = 0;
        return hour * 60 + minute;
    }
    for (let sport in picksData) {
        picksData[sport].sort((a, b) => parseTimeToMinutes(a.hora) - parseTimeToMinutes(b.hora));
    }

    function getConfianzaClass(conf) {
        if (conf >= 77) return 'confianza-alta';
        if (conf >= 73) return 'confianza-media';
        return 'confianza-baja';
    }
    function getEVClass(evStr) {
        const val = parseFloat(evStr.replace('+','').replace('%',''));
        return val >= 8 ? 'ev-badge' : 'ev-badge ev-negativo';
    }

    function createGameCardHTML(game) {
        const pitcherHTML = game.pitchers ? `<div class="pitcher-info"><i class="fas fa-baseball-ball"></i> ${game.pitchers}</div>` : '';
        const confianzaClass = getConfianzaClass(game.confianza);
        const evClass = getEVClass(game.ev_estimado);
        return `
        <div class="game-card">
            <div class="card-header">
                <span class="liga-badge">${game.liga}</span>
                <span class="hora"><i class="far fa-clock"></i> ${game.hora}</span>
            </div>
            <div class="partido">${game.partido}</div>
            <span class="tipo-jugada">${game.tipo_jugada}</span>
            <div class="pick-principal">
                <div class="pick-label">🎯 Pick Principal</div>
                <div class="pick-value">${game.principal}</div>
                <div class="cuota-row"><span class="cuota-tag">Cuota: ${game.cuota_p}</span></div>
            </div>
            <div class="secundario-row">
                <span class="sec-label">📊 Secundario:</span> ${game.secundario}
                <span class="cuota-tag">${game.cuota_s}</span>
            </div>
            ${pitcherHTML}
            <div class="confianza-row">
                <span class="confianza-badge ${confianzaClass}">Confianza: ${game.confianza}%</span>
                <span class="${evClass}">EV: ${game.ev_estimado}</span>

            <div class="razonamiento-trigger">
                <i class="fas fa-lightbulb"></i> Ver razonamiento ThIA

        </div>`;
    }

    function createGridHTML(games) {
        return '<div class="grid">' + games.map(g => createGameCardHTML(g)).join('') + '</div>';
    }

    function updateStatsBar(games) {
        if (!games || games.length === 0) {
            document.getElementById('total-picks').textContent = '0';
            document.getElementById('avg-confianza').textContent = '0%';
            document.getElementById('avg-ev').textContent = '0%';
            document.getElementById('high-conf-count').textContent = '0';
            return;
        }
        const total = games.length;
        const avgConf = Math.round(games.reduce((s,g) => s + g.confianza, 0) / total);
        const avgEV = (games.reduce((s,g) => s + parseFloat(g.ev_estimado.replace('+','').replace('%','')), 0) / total).toFixed(1);
        const highConf = games.filter(g => g.confianza >= 75).length;
        document.getElementById('total-picks').textContent = total;
        document.getElementById('avg-confianza').textContent = avgConf + '%';
        document.getElementById('avg-ev').textContent = '+' + avgEV + '%';
        document.getElementById('high-conf-count').textContent = highConf;
    }

    function generateParlays(games) {
        if (!games || games.length < 3) return [];
        const allPicks = games.map(g => ({...g, cuota: g.cuota_p, pick: g.principal, ev: parseFloat(g.ev_estimado.replace('+','').replace('%',''))}));
        const sorted = [...allPicks].sort((a,b) => b.confianza - a.confianza);
        const parlays = [];

        const conservador = sorted.filter(g => g.confianza >= 78).slice(0,3);
        if (conservador.length >= 3) {
            const cuotaTotal = conservador.reduce((p,g) => p * g.cuota, 1).toFixed(2);
            const confProm = Math.round(conservador.reduce((s,g) => s + g.confianza, 0)/conservador.length);
            const evTotal = conservador.reduce((s,g) => s + g.ev, 0).toFixed(1);
            parlays.push({ tipo:'conservador', nombre:'Conservador', icono:'🛡️', descripcion:'Alta seguridad', picks:conservador, cuotaTotal, confProm, evTotal:'+'+evTotal+'%', legs: conservador.map(g => ({...g})) });
        }
        const balanceado = sorted.filter(g => g.confianza >= 74).slice(0,4);
        if (balanceado.length >= 4) {
            const cuotaTotal = balanceado.reduce((p,g) => p * g.cuota, 1).toFixed(2);
            const confProm = Math.round(balanceado.reduce((s,g) => s + g.confianza, 0)/balanceado.length);
            const evTotal = balanceado.reduce((s,g) => s + g.ev, 0).toFixed(1);
            parlays.push({ tipo:'balanceado', nombre:'Balanceado', icono:'⚖️', descripcion:'Equilibrio riesgo-recompensa', picks:balanceado, cuotaTotal, confProm, evTotal:'+'+evTotal+'%', legs: balanceado.map(g => ({...g})) });
        }
        const agresivo = allPicks.filter(g => g.ev >= 9 || g.cuota >= 2.0).sort((a,b) => b.ev - a.ev).slice(0,3);
        if (agresivo.length >= 3) {
            const cuotaTotal = agresivo.reduce((p,g) => p * g.cuota, 1).toFixed(2);
            const confProm = Math.round(agresivo.reduce((s,g) => s + g.confianza, 0)/agresivo.length);
            const evTotal = agresivo.reduce((s,g) => s + g.ev, 0).toFixed(1);
            parlays.push({ tipo:'agresivo', nombre:'Agresivo', icono:'🚀', descripcion:'Máximo EV, alto riesgo', picks:agresivo, cuotaTotal, confProm, evTotal:'+'+evTotal+'%', legs: agresivo.map(g => ({...g})) });
        }
        return parlays;
    }

    function renderParlaysAll() {
        const container = document.getElementById('content');
        document.getElementById('subtabs-futbol').style.display = 'none';
        let html = '<div class="section-title"><i class="fas fa-layer-group"></i> Parlays Recomendados por Deporte</div>';
        const allGames = [];
        for (let sport in picksData) {
            const games = picksData[sport];
            allGames.push(...games);
            const parlays = generateParlays(games);
            if (parlays.length === 0) continue;
            const sportEmoji = { futbol:'⚽', mlb:'⚾', nba:'🏀', nhl:'🏒' }[sport] || '';
            html += `<h3 style="color:var(--electric-light); margin-top:2rem;">${sportEmoji} ${sport.toUpperCase()}</h3>`;
            parlays.forEach(parlay => {
                html += `
                <div class="parlay-card ${parlay.tipo}">
                    <span class="parlay-badge">${parlay.nombre}</span>
                    <h3>${parlay.icono} Parlay ${parlay.nombre}</h3>
                    <p class="parlay-subtitle">${parlay.descripcion} · ${parlay.legs.length} selecciones</p>
                    <ul class="parlay-legs">
                        ${parlay.legs.map(leg => `
                            <li>
                                <span class="leg-icon">✅</span>
                                <span><strong>${leg.pick}</strong> — ${leg.partido}</span>
                                <span style="color:var(--electric-light);margin-left:auto;font-weight:600;">${leg.cuota}</span>
                            </li>
                        `).join('')}
                    </ul>
                    <div class="parlay-metrics">
                        <div class="parlay-metric"><span class="label">Cuota Total</span><span class="value cuota-total">${parlay.cuotaTotal}</span></div>
                        <div class="parlay-metric"><span class="label">Confianza</span><span class="value">${parlay.confProm}%</span></div>
                        <div class="parlay-metric"><span class="label">EV Est.</span><span class="value ev-positive">${parlay.evTotal}</span></div>
                    </div>
                </div>`;
            });
        }
        if (html.indexOf('parlay-card') === -1) html += '<p style="color:#888; text-align:center;">No hay suficientes picks para generar parlays.</p>';
        container.innerHTML = html;
        updateStatsBar(allGames);
    }

    function renderGames(sport) {
        const container = document.getElementById('content');
        if (sport === 'parlays') {
            renderParlaysAll();
            return;
        }
        const games = picksData[sport];
        if (!games || games.length === 0) {
            container.innerHTML = '<p style="text-align:center;color:#aaa;padding:3rem;">No hay picks para este deporte.</p>';
            document.getElementById('subtabs-futbol').style.display = 'none';
            updateStatsBar([]);
            return;
        }

        if (sport === 'futbol') {
            const ligas = {};
            games.forEach(game => {
                if (!ligas[game.liga]) ligas[game.liga] = [];
                ligas[game.liga].push(game);
            });
            let subHTML = '';
            Object.keys(ligas).forEach((liga, i) => {
                subHTML += `<button class="sub-tab ${i===0?'active':''}" data-liga="${liga}">${liga}</button>`;
            });
            document.getElementById('subtabs-futbol').innerHTML = subHTML;
            document.getElementById('subtabs-futbol').style.display = 'flex';
            const firstLiga = Object.values(ligas)[0];
            container.innerHTML = createGridHTML(firstLiga);
            updateStatsBar(firstLiga);
        } else {
            document.getElementById('subtabs-futbol').style.display = 'none';
            container.innerHTML = `<div class="section-title">${ {futbol:'⚽',mlb:'⚾',nba:'🏀',nhl:'🏒'}[sport]||''} ${sport.toUpperCase()} Picks • 2 Mayo 2026</div>` + createGridHTML(games);
            updateStatsBar(games);
        }
    }

    document.querySelectorAll('.main-tab').forEach(tab => {
        tab.addEventListener('click', () => {
            document.querySelectorAll('.main-tab').forEach(t => t.classList.remove('active'));
            tab.classList.add('active');
            renderGames(tab.getAttribute('data-sport'));
        });
    });

    document.addEventListener('click', (e) => {
        if (e.target.classList.contains('sub-tab')) {
            document.querySelectorAll('.sub-tab').forEach(t => t.classList.remove('active'));
            e.target.classList.add('active');
            const liga = e.target.getAttribute('data-liga');
            const ligaGames = picksData.futbol.filter(g => g.liga === liga);
            document.getElementById('content').innerHTML = createGridHTML(ligaGames);
            updateStatsBar(ligaGames);
        }
    });

    const hoy = new Date(2026, 4, 2);
    document.getElementById('fecha-hoy').innerHTML = `<i class="far fa-calendar-alt"></i> ${hoy.toLocaleDateString('es-ES', { weekday:'long', day:'numeric', month:'long', year:'numeric' })}`;

    document.addEventListener('DOMContentLoaded', () => renderGames('futbol'));
</script>
</body>
</html>
