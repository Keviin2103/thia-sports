        body {
            font-family: 'Inter', sans-serif;
            background: #0a0c10;
            color: #fff;
            min-height: 100vh;
            position: relative;
        }
        /* Fondo dinámico por deporte (se aplica clase al body según deporte activo) */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            opacity: 0.15;
            z-index: -2;
            transition: background-image 0.3s ease;
        }
        body.sport-futbol::before {
            background-image: url('https://images.unsplash.com/photo-1529900748604-07564a03e7a6?q=80&w=2070&auto=format');
        }
        body.sport-mlb::before {
            background-image: url('https://images.unsplash.com/photo-1471295253337-3ceaaedca402?q=80&w=2070&auto=format');
        }
        body.sport-nba::before {
            background-image: url('https://images.unsplash.com/photo-1546519638-68e109498ffc?q=80&w=2090&auto=format');
        }

            background-image: url('https://images.unsplash.com/photo-1515704089429-fd06e6661ddd?q=80&w=2070&auto=format');
        }
        body::after {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 30%, rgba(0,0,0,0.7), #0a0c10);
            z-index: -1;
        }

        /* Barra superior tipo ESPN */
        .top-bar {
            background: #1e1f24;
            border-bottom: 4px solid #facc15;
            padding: 0.5rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }
        .logo {
            font-size: 1.8rem;
            font-weight: 800;
            letter-spacing: -1px;
        }
        .logo span:first-child { color: #facc15; }
        .logo span:last-child { color: #fff; font-weight: 400; }
        .date-badge {
            background: #2c2e36;
            padding: 0.3rem 1rem;
            border-radius: 40px;
            font-size: 0.8rem;
            color: #ccc;
        }
        .user-area button {
            background: transparent;
            border: 1px solid #facc15;
            padding: 0.4rem 1.2rem;
            border-radius: 40px;
            color: #facc15;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }
        .user-area button:hover { background: #facc15; color: #000; }
        .user-greeting {
            background: #2c2e36;
            padding: 0.3rem 1rem;
            border-radius: 40px;
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        /* Navegación principal tipo pestañas ESPN */
        .nav-tabs {
            display: flex;
            justify-content: center;
            gap: 0.2rem;
            background: #15171c;
            padding: 0.5rem 1rem;
            border-bottom: 1px solid #2c2e36;
        }
        .nav-tab {
            background: transparent;
            border: none;
            padding: 0.6rem 1.8rem;
            font-weight: 700;
            font-size: 0.9rem;
            color: #aaa;
            cursor: pointer;
            border-radius: 40px;
            transition: 0.2s;
        }
        .nav-tab i { margin-right: 8px; }
        .nav-tab.active {
            background: #facc15;
            color: #0a0c10;
        }
        .nav-tab:not(.active):hover { color: #facc15; background: #2c2e36; }

        /* Contenedor principal */
        .container {
            max-width: 1400px;
            margin: 2rem auto;
            padding: 0 1.5rem;
        }

        /* Filtros deportivos (chip style) */
        .sport-filters {
            display: flex;
            gap: 0.8rem;
            flex-wrap: wrap;
            margin-bottom: 2rem;
            justify-content: center;
        }
        .sport-chip {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 0.5rem 1.5rem;
            border-radius: 60px;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .sport-chip i { font-size: 1rem; }
        .sport-chip.active {
            background: #facc15;
            color: #0a0c10;
            border-color: #facc15;
        }

        /* Grid de tarjetas */
        .games-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
            gap: 1.8rem;
        }
        .game-card {
            background: rgba(20, 22, 28, 0.85);
            backdrop-filter: blur(8px);
            border-radius: 24px;
            border: 1px solid rgba(250, 204, 21, 0.3);

            border-color: #facc15;

        }

            justify-content: space-between;

            background: rgba(0,0,0,0.5);
            font-size: 0.7rem;

        }

            align-items: center;
            justify-content: center;
            font-weight: 800;
            color: #0a0c10;

            margin: 0.5rem 1rem 1rem;
            border-radius: 16px;

            gap: 1.5rem;
            margin-bottom: 2rem;
            flex-wrap: wrap;
        }
        .stat-card {
            background: rgba(0,0,0,0.5);

            border-radius: 20px;
            padding: 1rem 1.5rem;
            text-align: center;

            border: 1px solid rgba(250,204,21,0.3);

            border-bottom: 1px solid rgba(255,255,255,0.1);

        .parlay-card {

        .modal {

            left: 0;

            border-radius: 40px;

        .btn {
            background: #facc15;

            font-weight: bold;

</head>

<script>
    // ---------- AUTENTICACIÓN ----------
    let currentUser = null;
    function handleGoogleCredential(response) {
        const payload = JSON.parse(atob(response.credential.split('.')[1]));
        currentUser = { email: payload.email, name: payload.name };
        localStorage.setItem('thia_user', JSON.stringify(currentUser));
        updateUserUI();
        renderCurrentView();
        closeModal();
    }
    function initGoogleSignIn() {
        if (typeof google === 'undefined') { setTimeout(initGoogleSignIn, 500); return; }
        google.accounts.id.initialize({
            client_id: "613468909873-vu4nc6ugbm5cpdovfmb5vfo3m2h2mu2u.apps.googleusercontent.com",
            callback: handleGoogleCredential,
            auto_select: false
        });
        google.accounts.id.renderButton(document.getElementById("googleBtnContainer"), { theme: "outline", size: "large" });
    }
    function showLoginModal() {
        let modal = document.getElementById('authModal');
        if (!modal) {
            modal = document.createElement('div');
            modal.id = 'authModal';
            modal.className = 'modal';
            modal.innerHTML = `<div class="modal-content">
                <h2 style="color:#facc15">ThIA Sports</h2>
                <p>Accede con tu cuenta</p>
                <input type="email" id="loginEmail" placeholder="Email">
                <input type="password" id="loginPassword" placeholder="Contraseña">
                <button id="doLoginBtn" class="btn">Iniciar sesión</button>
                <button id="doRegisterBtn" class="btn-outline-light">Registrarse</button>
                <div style="margin:1rem 0;">━━━━━ o ━━━━━</div>
                <div id="googleBtnContainer"></div>
                <button class="btn-outline-light" style="margin-top:1rem;" id="closeModalBtn">Cerrar</button>
            </div>`;
            document.body.appendChild(modal);
            document.getElementById('closeModalBtn')?.addEventListener('click', closeModal);
            document.getElementById('doLoginBtn')?.addEventListener('click', () => {
                const email = document.getElementById('loginEmail').value;
                const pass = document.getElementById('loginPassword').value;
                const users = JSON.parse(localStorage.getItem('thia_local_users') || '[]');
                const user = users.find(u => u.email === email && u.password === pass);
                if (user) { currentUser = { email: user.email }; localStorage.setItem('thia_user', JSON.stringify(currentUser)); updateUserUI(); renderCurrentView(); closeModal(); }
                else alert("Credenciales incorrectas");
            });
            document.getElementById('doRegisterBtn')?.addEventListener('click', () => {
                const email = document.getElementById('loginEmail').value;
                const pass = document.getElementById('loginPassword').value;
                if (!email || !pass) return alert("Completa ambos campos");
                const users = JSON.parse(localStorage.getItem('thia_local_users') || '[]');
                if (users.find(u => u.email === email)) return alert("Email ya registrado");
                users.push({ email, password: pass });
                localStorage.setItem('thia_local_users', JSON.stringify(users));
                currentUser = { email };
                localStorage.setItem('thia_user', JSON.stringify(currentUser));
                updateUserUI(); renderCurrentView(); closeModal();
            });
            initGoogleSignIn();
        }
        modal.style.display = 'flex';
    }
    function closeModal() { const m = document.getElementById('authModal'); if (m) m.style.display = 'none'; }
    function logout() { currentUser = null; localStorage.removeItem('thia_user'); updateUserUI(); renderCurrentView(); }
    function updateUserUI() {
        const area = document.getElementById('authArea');
        if (currentUser) area.innerHTML = `<div class="user-greeting"><i class="fas fa-user-circle"></i> ${currentUser.email.split('@')[0]} <button id="logoutBtn" style="background:#facc15;color:#000;border:none;">Salir</button></div>`;
        else area.innerHTML = `<button id="showAuthBtn"><i class="fas fa-key"></i> Acceder</button>`;
        document.getElementById('logoutBtn')?.addEventListener('click', logout);
        document.getElementById('showAuthBtn')?.addEventListener('click', showLoginModal);
    }

        { partido: "Grizzlies vs Jazz", awayTeam: "Jazz", homeTeam: "Grizzlies", time: "9:00 PM", principal: "Grizzlies ML (1.47) stake 2%", confianza: "Alta" },
        { partido: "Clippers vs Blazers", awayTeam: "Blazers", homeTeam: "Clippers", time: "10:00 PM", principal: "Clippers ML (1.61) stake 1.5%", confianza: "Media-Alta" },
        { partido: "Warriors vs Kings", awayTeam: "Kings", homeTeam: "Warriors", time: "10:00 PM", principal: "Warriors ML (1.85) stake 1.5%", confianza: "Media" },
        { partido: "Suns vs Lakers", awayTeam: "Lakers", homeTeam: "Suns", time: "10:30 PM", principal: "Lakers ML (1.64) stake 1.5%", confianza: "Media-Alta" }
    ];
    const nhlPicks = [
        { partido: "Maple Leafs vs Islanders", awayTeam: "Islanders", homeTeam: "Maple Leafs", time: "7:00 PM", principal: "Over 5.5 goles (1.85) stake 1.5%", confianza: "Media", prop: "Nylander over 0.5 puntos (1.75)" },
        { partido: "Blue Jackets vs Sabres", awayTeam: "Sabres", homeTeam: "Blue Jackets", time: "7:00 PM", principal: "Sabres ML (1.43) stake 2%", confianza: "Alta" },
        { partido: "Lightning vs Canadiens", awayTeam: "Canadiens", homeTeam: "Lightning", time: "7:00 PM", principal: "Lightning ML (1.54) stake 1.5%", confianza: "Media-Alta" },
        { partido: "Panthers vs Senators", awayTeam: "Senators", homeTeam: "Panthers", time: "7:00 PM", principal: "Senators ML (1.85) stake 1.5%", confianza: "Media" },
        { partido: "Flyers vs Red Wings", awayTeam: "Red Wings", homeTeam: "Flyers", time: "7:00 PM", principal: "Red Wings ML (1.75) stake 1.5%", confianza: "Media" },
        { partido: "Penguins vs Devils", awayTeam: "Devils", homeTeam: "Penguins", time: "7:00 PM", principal: "Devils ML (1.89) stake 1.5%", confianza: "Media" },
        { partido: "Jets vs Blues", awayTeam: "Blues", homeTeam: "Jets", time: "8:00 PM", principal: "Jets ML (1.64) stake 1.5%", confianza: "Media-Alta" },
        { partido: "Hurricanes vs Blackhawks", awayTeam: "Blackhawks", homeTeam: "Hurricanes", time: "7:00 PM", principal: "Hurricanes ML (1.27) stake 2%", confianza: "Muy Alta" },
        { partido: "Wild vs Stars", awayTeam: "Stars", homeTeam: "Wild", time: "8:00 PM", principal: "Under 6.0 goles (1.85) stake 1.5%", confianza: "Media", prop: "Robertson over 0.5 goles (2.00)" },
        { partido: "Flames vs Avalanche", awayTeam: "Avalanche", homeTeam: "Flames", time: "9:00 PM", principal: "Avalanche ML (1.28) stake 2%", confianza: "Muy Alta" },
        { partido: "Predators vs Mammoth", awayTeam: "Mammoth", homeTeam: "Predators", time: "8:00 PM", principal: "Mammoth ML (1.69) stake 1.5%", confianza: "Media" },
        { partido: "Sharks vs Ducks", awayTeam: "Ducks", homeTeam: "Sharks", time: "10:30 PM", principal: "Ducks ML (1.79) stake 1.5%", confianza: "Media" },
        { partido: "Golden Knights vs Kraken", awayTeam: "Kraken", homeTeam: "Golden Knights", time: "10:00 PM", principal: "Golden Knights ML (1.59) stake 1.5%", confianza: "Media-Alta" },
        { partido: "Canucks vs Kings", awayTeam: "Kings", homeTeam: "Canucks", time: "10:00 PM", principal: "Kings ML (1.39) stake 2%", confianza: "Alta" }
    ];

    const parlaysData = [
        { name: "DIRECTA DEL DÍA", type: "green", picks: ["MLB | Padres vs Rockies | Padres ML (1.30)"], odds: "1.30", stake: "2-3%", desc: "Máxima confianza del día" },
        { name: "MOROCHA 2 PICKS", type: "orange", picks: ["NBA | Celtics ML (1.22)", "NHL | Hurricanes ML (1.27)"], odds: "1.55", stake: "1.5%", desc: "Dos picks muy seguros" },
        { name: "PARLEY SEGURO 4 PICKS", type: "purple", picks: ["Fútbol | Real Madrid ML (1.28)", "MLB | Brewers ML (1.22)", "NBA | Bucks ML (1.32)", "NHL | Avalanche ML (1.28)"], odds: "2.75", stake: "1%", desc: "Favoritos sólidos" },
        { name: "MILLONARIO TODOS", type: "gold", picks: ["Real Madrid ML", "Celtics ML", "Brewers ML", "Avalanche ML", "Padres ML"], odds: "> 10000", stake: "0.1%", desc: "Entretenimiento" }
    ];
    const mejoras = ["✅ R77: No apostar ML solo por altura extrema", "✅ R78: Champions Over 2.5", "✅ R79: Cautela con brasileños visitantes", "✅ R80: No apostar contra SP visitante con ERA<2.00", "✅ R83: Duelo de ases = Under"];

    let currentSport = "futbol";
    let currentMain = "picks";

    function renderGames() {
        let games = [];
        if (currentSport === "futbol") games = futbolPicks;
        else if (currentSport === "mlb") games = mlbPicks;
        else if (currentSport === "nba") games = nbaPicks;
        else games = nhlPicks;
        const container = document.getElementById('gamesContainer');
        const acceso = currentUser !== null;
        if (!games.length) { container.innerHTML = '<div style="text-align:center;">Sin juegos</div>'; return; }
        let html = '';
        for (let g of games) {
            const awayIcon = getTeamIcon(g.awayTeam, currentSport);
            const homeIcon = getTeamIcon(g.homeTeam, currentSport);
            html += `<div class="game-card">
                <div class="card-header">
                    <span class="league">${currentSport.toUpperCase()}</span>
                    <span><i class="far fa-clock"></i> ${g.time} VEN</span>
                </div>
                <div class="matchup">
                    <div class="team"><div class="team-logo">${awayIcon}</div><div class="team-name">${g.awayTeam}</div></div>
                    <div class="vs-circle">VS</div>
                    <div class="team"><div class="team-logo">${homeIcon}</div><div class="team-name">${g.homeTeam}</div></div>
                </div>
                ${!acceso ? `<div class="premium-lock"><i class="fas fa-lock"></i> Inicia sesión para ver los picks</div>` : `
                    <div class="pick-card pick-main"><strong>🎯 JUGADA PRINCIPAL:</strong> ${g.principal}<br><span class="confidence">Confianza: ${g.confianza}</span></div>
                    ${g.prop ? `<div class="pick-card pick-prop"><strong>🎲 PROP:</strong> ${g.prop}</div>` : ''}
                `}
            </div>`;
        }
        container.innerHTML = html;
    }

    function renderResults() {
        document.getElementById('statsSummary').innerHTML = `<div class="stat-card"><div class="stat-number">0</div><div>HITS</div></div><div class="stat-card"><div class="stat-number">0</div><div>FAILS</div></div><div class="stat-card"><div class="stat-number">0%</div><div>EFECT.</div></div>`;
        document.getElementById('resultsTableBody').innerHTML = '<tr><td colspan="3">Resultados en actualización (sistema en simulación)</td></tr>';
        document.getElementById('leccionesList').innerHTML = mejoras.map(l => `<div>• ${l}</div>`).join('');
    }

    function renderParlays() {
        const container = document.getElementById('parlaysContainer');
        let html = '';
        parlaysData.forEach(p => {
            let colorClass = p.type === 'gold' ? 'parlay-gold' : (p.type === 'green' ? 'parlay-green' : (p.type === 'orange' ? 'parlay-orange' : 'parlay-purple'));
            html += `<div class="parlay-card ${colorClass}">
                <div style="font-weight:800; font-size:1.2rem; margin-bottom:0.5rem;">${p.name}</div>
                <div style="background:#facc15; color:#000; border-radius:20px; padding:0.3rem; text-align:center; font-weight:800; margin-bottom:0.5rem;">${p.odds}</div>
                <div style="font-size:0.7rem; margin-bottom:0.5rem;">Stake: ${p.stake}</div>
                ${p.picks.map(pk => `<div style="background:rgba(0,0,0,0.5); padding:0.3rem; border-radius:12px; margin:0.2rem 0;">${pk}</div>`).join('')}
                <div style="font-size:0.7rem; margin-top:0.5rem;">${p.desc}</div>
            </div>`;
        });
        container.innerHTML = html;
    }

    function updateBodySportClass() {
        document.body.className = `sport-${currentSport}`;
    }

    function renderCurrentView() {
        if (currentMain === 'picks') {
            document.getElementById('picksSection').classList.remove('hidden');
            document.getElementById('resultsSection').classList.add('hidden');
            document.getElementById('parlaysSection').classList.add('hidden');
            renderGames();
        } else if (currentMain === 'resultados') {
            document.getElementById('picksSection').classList.add('hidden');
            document.getElementById('resultsSection').classList.remove('hidden');
            document.getElementById('parlaysSection').classList.add('hidden');
            renderResults();
        } else {
            document.getElementById('picksSection').classList.add('hidden');
            document.getElementById('resultsSection').classList.add('hidden');
            document.getElementById('parlaysSection').classList.remove('hidden');
            renderParlays();
        }
        updateBodySportClass();
    }

    function initSportFilters() {
        const container = document.getElementById('sportFilters');
        const sports = ['futbol', 'mlb', 'nba', 'nhl'];
        const names = { futbol:'⚽ Fútbol', mlb:'⚾ Béisbol', nba:'🏀 Baloncesto', nhl:'🏒 Hockey' };
        container.innerHTML = sports.map(s => `<div class="sport-chip ${s === currentSport ? 'active' : ''}" data-sport="${s}"><i class="fas ${s==='futbol'?'fa-futbol':s==='mlb'?'fa-baseball-ball':s==='nba'?'fa-basketball-ball':'fa-hockey-puck'}"></i> ${names[s]}</div>`).join('');
        document.querySelectorAll('.sport-chip').forEach(chip => {
            chip.addEventListener('click', () => {
                document.querySelectorAll('.sport-chip').forEach(c => c.classList.remove('active'));
                chip.classList.add('active');
                currentSport = chip.getAttribute('data-sport');
                renderGames();
                updateBodySportClass();
            });
        });
    }

    // Eventos navegación
    document.querySelectorAll('.nav-tab').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.nav-tab').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentMain = btn.getAttribute('data-main');
            renderCurrentView();
        });
    });

    const savedUser = localStorage.getItem('thia_user');
    if (savedUser) { try { currentUser = JSON.parse(savedUser); } catch(e) {} }
    updateUserUI();
    initSportFilters();
    renderCurrentView();
</script>
</body>
</html>
